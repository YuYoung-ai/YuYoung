<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BAZ BIOMEDIC — 병원 데이터 센터 (PC)</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2F5E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BAZ CS">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --navy:#1B2F5E; --navy2:#16264D; --teal:#2E7D9E; --teal-soft:#EAF4F8;
    --gray-bg:#F5F7FA; --gray-line:#DDE3EE; --text:#1A1A2E; --text-muted:#6B7A99;
    --red:#C0392B; --green:#1E7E4E; --amber:#B8860B; --purple:#534AB7;
    --st-normal:#1E7E4E; --st-target:#2E7D9E; --st-warn:#B8860B; --st-danger:#C0392B; --st-none:#6B7A99;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--gray-bg);color:var(--text);-webkit-text-size-adjust:100%;padding-bottom:24px;}
  .wrap{max-width:560px;margin:0 auto;transition:max-width .18s ease;}

  /* ===== Window(PC) 모드 : 넓은 화면 활용 레이아웃 ===== */
  .mode-toggle{display:flex;gap:2px;background:rgba(202,220,252,.15);border:1px solid rgba(202,220,252,.4);border-radius:8px;padding:2px;margin-right:8px;}
  .mode-toggle button{background:transparent;border:0;color:#CADCFC;font-size:11px;font-weight:700;padding:5px 9px;border-radius:6px;cursor:pointer;line-height:1;}
  .mode-toggle button.on{background:#CADCFC;color:#16264D;}
  body.mode-window .wrap{max-width:1360px;}
  body.mode-window .body{padding:20px 26px;}
  body.mode-window #mapBox{height:480px;}
  body.mode-window .tabs{max-width:520px;}
  body.mode-window #cardList{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;align-items:start;}
  body.mode-window #cardList .h-card{margin-bottom:0;}
  body.mode-window .load-more{max-width:520px;margin-left:auto;margin-right:auto;}
  @media(max-width:720px){ body.mode-window .wrap{max-width:560px;} body.mode-window #cardList{grid-template-columns:1fr;} body.mode-window .body{padding:14px;} }

  /* ===== Window 전용: 카드/표 + 지도/상세 2-pane ===== */
  #pcPane{display:none;}
  body.mode-window #pcPane{display:block;}
  body.mode-window #cardList{display:none !important;}
  body.mode-window #mapBox{display:none !important;}
  body.mode-window #loadMore{display:none !important;}
  #pcToolbar{display:flex;align-items:center;gap:10px;margin:2px 0 12px;flex-wrap:wrap;}
  .pc-viewtoggle{display:flex;gap:2px;background:#fff;border:1px solid var(--gray-line);border-radius:9px;padding:3px;}
  .pc-viewtoggle button{background:transparent;border:0;color:var(--text-muted);font-size:12.5px;font-weight:700;padding:6px 13px;border-radius:6px;cursor:pointer;font-family:inherit;line-height:1.1;}
  .pc-viewtoggle button.on{background:var(--navy);color:#fff;}
  #pcToolbar .pc-hint{font-size:11.5px;color:var(--text-muted);}
  /* Window: 지도(상단 전폭) → 툴바 → 카드/표 세로 스택 */
  body.mode-window #viewList>.result-count{display:none !important;}   /* '417곳' 표기 제거 */
  #pcLeft{min-width:0;}
  #pcRight{background:#fff;border:1px solid var(--gray-line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 2px 10px rgba(27,47,94,.05);}
  body.mode-window #pcRight{height:400px;margin-bottom:14px;position:sticky;top:calc(var(--hdr-h,56px) + 12px);z-index:20;}
  /* 좌측 필터 하단: 담당자 오늘 완료 카드 */
  #pcRecentCard{display:none;}
  body.mode-window #pcRecentCard{display:block;background:#fff;border:1px solid var(--gray-line);border-radius:12px;padding:11px 12px;box-shadow:0 2px 8px rgba(27,47,94,.05);}
  .rrc-head{font-size:12.5px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:6px;margin-bottom:9px;}
  .rrc-head .rrc-cnt{font-size:11px;font-weight:700;color:#1B7A47;background:#E8F5EE;border-radius:7px;padding:1px 7px;}
  .rrc-empty{font-size:11.5px;color:var(--text-muted);padding:4px 2px;}
  .rrc-list{display:flex;flex-direction:column;gap:7px;max-height:300px;overflow:auto;}
  .rrc-item{border:1px solid var(--gray-line);border-radius:9px;padding:8px 9px;cursor:pointer;transition:border-color .12s,box-shadow .12s;}
  .rrc-item:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(27,47,94,.08);}
  .rrc-item.sel{border-color:var(--navy);box-shadow:0 0 0 2px var(--navy) inset;}
  .rrc-nm{font-size:12.5px;font-weight:800;color:var(--navy);line-height:1.35;margin-bottom:3px;word-break:break-all;}
  .rrc-meta{display:flex;flex-wrap:wrap;align-items:center;gap:4px 8px;font-size:11px;color:var(--text-muted);}
  .rrc-meta .fse{color:#1B7A47;font-weight:700;}
  .rrc-g{font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;background:var(--gray-bg);color:var(--text-muted);}
  #pcRightHead{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 13px;border-bottom:1px solid var(--gray-line);background:var(--gray-bg);flex:0 0 auto;}
  #pcRightHead .ttl{font-size:12.5px;font-weight:800;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #pcRightBody{flex:1 1 auto;position:relative;min-height:0;}
  #pcMapPane{position:absolute;inset:0;background:#E9EEF3;}
  .pc-mapfail{display:flex;align-items:center;justify-content:center;height:100%;padding:24px;text-align:center;color:var(--text-muted);font-size:12.5px;line-height:1.6;}
  /* 최근 완료(현장) 리스트 */
  .pc-recent-list{display:flex;flex-direction:column;gap:9px;}
  .pc-recent-item{background:#fff;border:1px solid var(--gray-line);border-radius:11px;padding:11px 13px;cursor:pointer;transition:border-color .12s,box-shadow .12s;}
  .pc-recent-item:hover{border-color:var(--teal);box-shadow:0 3px 12px rgba(27,47,94,.08);}
  .pc-recent-item.sel{border-color:var(--navy);box-shadow:0 0 0 2px var(--navy) inset;}
  .pc-recent-item.noloc{opacity:.72;}
  .pc-recent-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
  .pc-recent-top .nm{font-size:13.5px;font-weight:800;color:var(--navy);}
  .pc-recent-g{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;}
  .pc-recent-g.insp{background:var(--teal-soft);color:#1B5FAF;}
  .pc-recent-g.as{background:#F3EEFA;color:#8A5FC0;}
  .pc-recent-meta{display:flex;flex-wrap:wrap;gap:4px 12px;font-size:12px;color:var(--text-muted);}
  .pc-recent-meta .fse{color:#1B7A47;font-weight:700;}
  /* 지도 커스텀 마커(최근 완료: 초록 점 + FSE 라벨) */
  .pc-cmk{display:flex;align-items:center;gap:4px;transform:translateY(-4px);cursor:pointer;}
  .pc-cmk .dot{width:13px;height:13px;border-radius:50%;background:#1E7E4E;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.35);flex:0 0 auto;}
  .pc-cmk .lb{background:#1E7E4E;color:#fff;font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:8px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.25);}
  #pcDetail{position:absolute;inset:0;overflow:auto;padding:15px 16px;display:none;background:#fff;}
  #pcRight.detail #pcMapPane{visibility:hidden;}
  #pcRight.detail #pcDetail{display:block;}
  .pc-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}
  .pc-cardwrap{cursor:pointer;position:relative;}
  .pc-cardwrap .h-card{margin-bottom:0;height:100%;transition:box-shadow .12s,border-color .12s;}
  .pc-cardwrap:hover .h-card{border-color:var(--teal);box-shadow:0 3px 12px rgba(27,47,94,.10);}
  .pc-cardwrap.sel .h-card{border-color:var(--navy);box-shadow:0 0 0 2px var(--navy) inset;}
  .pc-cardwrap.prog .h-card{border-color:var(--teal);box-shadow:0 0 0 2px var(--teal) inset;}
  /* 우측 카드 진행중 토글 칩(호버 시 노출, 진행중이면 상시) */
  .pc-progchip{position:absolute;top:-8px;right:12px;z-index:3;border:1px solid var(--teal);background:#fff;color:var(--teal);
    font-size:10px;font-weight:800;padding:3px 8px;border-radius:8px;cursor:pointer;font-family:inherit;line-height:1.2;
    box-shadow:0 2px 6px rgba(27,47,94,.14);opacity:0;transition:opacity .12s;}
  .pc-cardwrap:hover .pc-progchip{opacity:1;}
  .pc-progchip.on{opacity:1;background:var(--teal);color:#fff;}
  .pc-progchip.tbl{position:static;opacity:1;box-shadow:none;padding:1px 5px;margin-right:5px;border-radius:6px;font-size:10.5px;vertical-align:1px;}
  .pc-progchip.tbl:not(.on){border-color:var(--gray-line);color:var(--text-muted);}
  body.dark .pc-progchip{background:var(--surface);}
  body.dark .pc-progchip.on{background:var(--teal);}
  .pc-table-wrap{overflow-x:auto;background:#fff;border:1px solid var(--gray-line);border-radius:12px;}
  table.pc-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  .pc-table th{position:sticky;top:0;background:var(--navy);color:#fff;font-weight:700;padding:9px 11px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;z-index:1;}
  .pc-table th .ar{opacity:.55;font-size:10px;margin-left:3px;}
  .pc-table td{padding:8px 11px;border-top:1px solid var(--gray-line);white-space:nowrap;color:var(--text);}
  .pc-table tbody tr{cursor:pointer;}
  .pc-table tbody tr:hover{background:var(--teal-soft);}
  .pc-table tbody tr.sel{background:#E8F0FB;}
  .pc-table tbody tr.prog{box-shadow:inset 3px 0 0 var(--teal);}
  body.dark .pc-table tbody tr.sel{background:rgba(94,130,200,.18);}
  .pc-badge{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;}
  .pc-dt-name{font-size:17px;font-weight:800;color:var(--navy);margin-bottom:3px;line-height:1.3;}
  .pc-dt-sub{font-size:12px;color:var(--text-muted);margin-bottom:12px;}
  .pc-dt-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:13px;}
  .pc-dt-rows{display:grid;grid-template-columns:auto 1fr;gap:7px 12px;font-size:12.5px;margin-bottom:14px;}
  .pc-dt-rows dt{color:var(--text-muted);font-weight:600;}
  .pc-dt-rows dd{color:var(--text);word-break:break-all;}
  .pc-dt-progflag{font-size:11px;font-weight:800;color:#fff;background:var(--teal);border-radius:7px;padding:2px 8px;vertical-align:2px;white-space:nowrap;}
  .pc-dt-prog{width:100%;margin:0 0 12px;padding:10px;border-radius:9px;border:1.5px solid var(--teal);background:#fff;color:var(--teal);font-weight:800;font-size:12.5px;cursor:pointer;font-family:inherit;}
  .pc-dt-prog:hover{background:var(--teal-soft);}
  .pc-dt-prog.on{background:var(--teal);color:#fff;}
  .pc-dt-prog.on:hover{opacity:.92;background:var(--teal);}
  body.dark .pc-dt-prog{background:var(--surface);}
  body.dark .pc-dt-prog.on{background:var(--teal);color:#fff;}
  .pc-dt-acts{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
  .pc-dt-acts button{flex:1;min-width:88px;padding:9px 6px;border-radius:8px;border:1px solid var(--gray-line);background:#fff;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;color:var(--navy);}
  .pc-dt-acts button:hover{background:var(--gray-bg);}
  .pc-dt-h3{font-size:12.5px;font-weight:800;color:var(--navy);margin:4px 0 9px;padding-bottom:6px;border-bottom:1px solid var(--gray-line);}
  .pc-backmap{background:#fff;border:1px solid var(--gray-line);border-radius:7px;padding:5px 11px;font-size:12px;font-weight:700;color:var(--navy);cursor:pointer;font-family:inherit;white-space:nowrap;}
  .pc-backmap:hover{background:#fff;border-color:var(--navy);}
  @media(max-width:980px){ body.mode-window #pcRight{height:340px;position:static;} }

  header{background:var(--navy);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  header .logo-area{display:flex;align-items:center;gap:10px;min-width:0;}
  header .logo-area svg{width:32px;height:32px;flex:0 0 auto;}
  header h1{color:#CADCFC;font-size:15px;font-weight:700;letter-spacing:.03em;}
  header .subtitle{color:rgba(202,220,252,.65);font-size:11px;margin-top:1px;}
  .home-link{background:rgba(202,220,252,.15);border:1px solid rgba(202,220,252,.4);color:#CADCFC;
    font-size:11px;font-weight:700;padding:6px 11px;border-radius:16px;text-decoration:none;white-space:nowrap;}
  .hublang{display:flex;gap:2px;background:rgba(255,255,255,.08);border-radius:8px;padding:2px;margin-left:8px;}
  .hublang button{background:transparent;border:none;color:#cfdbf0;font-size:11px;font-weight:700;
    padding:4px 7px;border-radius:6px;cursor:pointer;font-family:inherit;}

  .body{padding:14px;}

  /* ===== 필터: 모바일 상단 고정 / PC 좌측 사이드바 ===== */
  /* 모바일: filterRail은 레이아웃상 사라져(display:contents) filterSticky가
     긴 #viewList 기준으로 고정되어 카드 목록 내내 상단에 붙어 있음 */
  #filterRail{display:contents;}
  #filterSticky{position:sticky;top:var(--hdr-h,56px);z-index:30;background:var(--gray-bg);padding-top:8px;margin-bottom:2px;}
  #filterSticky::after{content:'';position:absolute;left:0;right:0;bottom:-8px;height:8px;background:linear-gradient(rgba(245,247,250,.9),rgba(245,247,250,0));pointer-events:none;}
  body.mode-window #viewList{display:grid;grid-template-columns:250px minmax(0,1fr);gap:20px;align-items:start;}
  body.mode-window #filterRail{grid-column:1;position:sticky;top:calc(var(--hdr-h,56px) + 10px);align-self:start;max-height:calc(100vh - var(--hdr-h,56px) - 24px);overflow:auto;display:flex;flex-direction:column;gap:10px;padding-right:2px;}
  body.mode-window #filterSticky{position:static;top:auto;background:transparent;padding-top:0;z-index:auto;}
  body.mode-window #filterSticky::after{display:none;}
  body.mode-window #viewList>.result-count,
  body.mode-window #viewList>#cardList,
  body.mode-window #viewList>#loadMore,
  body.mode-window #viewList>#pcPane{grid-column:2;min-width:0;}
  @media(max-width:980px){ body.mode-window #viewList{grid-template-columns:1fr;} body.mode-window #filterRail{position:static;max-height:none;overflow:visible;} }

  /* 탭 */
  .tabs{display:flex;gap:6px;margin-bottom:14px;background:#fff;border:1px solid var(--gray-line);border-radius:12px;padding:4px;}
  .tab{flex:1;text-align:center;padding:9px 6px;border-radius:9px;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;border:none;background:transparent;font-family:inherit;}
  .tab.on{background:var(--navy);color:#fff;}

  /* 검색 */
  .search-wrap{position:relative;margin-bottom:12px;}
  .search-wrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--text-muted);pointer-events:none;}
  #searchInput{width:100%;border:1.5px solid var(--gray-line);border-radius:10px;padding:13px 13px 13px 40px;
    font-size:16px;font-family:inherit;color:var(--text);background:#fff;outline:none;}
  #searchInput:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(46,125,158,.12);}
  .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--gray-line);
    border:none;border-radius:50%;width:22px;height:22px;font-size:13px;color:#fff;cursor:pointer;display:none;line-height:1;}

  /* 근처 조회 */
  .nearby-btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--teal),var(--navy));
    color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .nearby-btn:active{opacity:.9;}
  .nearby-btn.active{background:linear-gradient(135deg,#8A5FC0,#534AB7);}
  .nearby-status{font-size:11px;color:var(--text-muted);text-align:center;margin:-6px 0 12px;line-height:1.5;display:none;}

  /* 지도 */
  #mapBox{width:100%;height:340px;border-radius:12px;overflow:hidden;border:1px solid var(--gray-line);margin-bottom:12px;display:none;background:#E9EEF3;}

  /* 필터 */
  .filter-section{margin-bottom:12px;}
  .filter-label{font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px;padding-left:2px;}
  .filter-row{display:flex;gap:7px;flex-wrap:wrap;}
  .chip{border:1.5px solid var(--gray-line);background:#fff;color:var(--text-muted);font-size:12px;font-weight:600;
    padding:7px 12px;border-radius:18px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap;}
  .chip.on{border-color:var(--teal);background:var(--teal-soft);color:var(--navy);}
  .chip .cnt{font-size:10px;opacity:.7;}
  .chip.sm{padding:6px 10px;font-size:11px;}

  select.flt{border:1.5px solid var(--gray-line);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:var(--text);background:#fff;outline:none;width:100%;}
  select.flt:focus{border-color:var(--teal);}

  /* 통계 */
  .stats{display:flex;gap:8px;margin-bottom:12px;}
  .stats .s{flex:1;background:#fff;border:1px solid var(--gray-line);border-radius:10px;padding:9px 6px;text-align:center;}
  .stats .num{font-size:18px;font-weight:800;}
  .stats .lbl{font-size:10px;color:var(--text-muted);margin-top:1px;}

  .result-count{font-size:12px;color:var(--text-muted);margin-bottom:10px;padding-left:2px;}
  .result-count b{color:var(--navy);}

  /* 병원 카드 */
  .h-card{background:#fff;border:1px solid var(--gray-line);border-radius:12px;padding:13px 14px;margin-bottom:10px;}
  .h-card.urgent{border:1.5px solid #E59A9A;background:#FEF8F8;}
  .h-card.soon{border:1.5px solid #E8C98A;}
  .h-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
  .h-name{font-size:15px;font-weight:700;color:var(--navy);line-height:1.35;}
  .h-dist{font-size:11px;color:#8A5FC0;font-weight:700;margin-top:2px;display:none;}
  .h-dist.show{display:block;}
  .st-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;white-space:nowrap;flex:0 0 auto;}
  .st-badge.정상{background:#E8F5EE;color:var(--st-normal);}
  .st-badge.점검대상{background:var(--teal-soft);color:var(--st-target);}
  .st-badge.권고{background:#FBF3E0;color:var(--st-warn);}
  .st-badge.경고{background:#FBEAE8;color:var(--st-danger);}
  .st-badge.미점검{background:#EEF0F4;color:var(--st-none);}
  .st-badge.비대상{background:#F0F0F2;color:#9AA3B2;font-weight:600;}

  .warn-tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;margin-top:6px;}
  .warn-tag.over{background:#FBEAE8;color:var(--red);}
  .warn-tag.near{background:#FBF3E0;color:var(--amber);}

  .h-meta{font-size:12.5px;color:var(--text-muted);line-height:1.7;}
  .h-meta .line{display:flex;align-items:flex-start;gap:6px;}
  .h-meta .ico{font-size:13px;flex:0 0 auto;margin-top:2px;}

  .h-tags{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;}
  .h-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:7px;}
  .h-tag.ncare{background:var(--teal-soft);color:#0C447C;}
  .h-tag.ncare.none{background:#EEF0F4;color:var(--text-muted);}
  .h-tag.as{background:var(--gray-bg);color:var(--text-muted);}
  .h-tag.sales{background:#F3EEFA;color:#534AB7;}
  .h-tag.hpver{background:#E8F5EE;color:#1B7A47;border:1px solid #BFE6CF;}
  .h-tag.uiver{background:#E8F0FB;color:#1B5FAF;border:1px solid #C2D7F0;}
  .h-tag.vendor{background:#F1EFEA;color:#7A6A3A;border:1px solid #E3DCC9;}
  .h-tag.warranty{background:#E8F5EE;color:#1B7A47;border:1px solid #BFE6CF;}

  .h-actions{display:flex;gap:6px;margin-top:11px;}
  .h-actions button{flex:1;font-size:12px;font-weight:700;padding:9px 6px;border-radius:8px;cursor:pointer;font-family:inherit;border:1.5px solid var(--gray-line);background:#fff;color:var(--navy);display:flex;align-items:center;justify-content:center;gap:4px;}
  .h-actions button:active{background:var(--gray-bg);}
  .h-actions .nmap{border-color:#03C75A;color:#03C75A;}
  .h-actions .insp{border-color:var(--navy);background:var(--navy);color:#fff;}
  .h-actions .surv{border-color:var(--teal);color:var(--teal);}

  .empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px;line-height:1.7;}
  .empty .ico{font-size:40px;margin-bottom:10px;opacity:.4;}
  .load-more{width:100%;padding:12px;border:1.5px solid var(--gray-line);background:#fff;color:var(--text-muted);
    font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;font-family:inherit;margin-top:4px;}

  /* 대시보드 */
  .dash-card{background:#fff;border:1px solid var(--gray-line);border-radius:12px;padding:16px;margin-bottom:12px;}
  .dash-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bar-label{font-size:12px;color:var(--text);width:64px;flex:0 0 auto;}
  .bar-track{flex:1;height:22px;background:var(--gray-bg);border-radius:6px;overflow:hidden;position:relative;}
  .bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11px;font-weight:700;min-width:28px;}
  .donut-wrap{display:flex;align-items:center;gap:18px;}
  .legend{flex:1;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:7px;}
  .legend-dot{width:11px;height:11px;border-radius:3px;flex:0 0 auto;}
  .legend-val{margin-left:auto;font-weight:700;color:var(--navy);}

  /* 이력 버튼 */
  .h-actions .hist{border-color:#8A5FC0;color:#8A5FC0;}
  /* 이력 모달 */
  #histModal{position:fixed;inset:0;background:rgba(16,29,61,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
  #histModal.show{display:flex;}
  .hist-sheet{background:#fff;width:100%;max-width:560px;max-height:86vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;animation:slideUp .25s ease;}
  @keyframes slideUp{from{transform:translateY(40px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
  .hist-head{padding:16px 18px 12px;border-bottom:1px solid var(--gray-line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex:0 0 auto;}
  .hist-head .hn{font-size:16px;font-weight:700;color:var(--navy);line-height:1.35;}
  .hist-head .hsub{font-size:12px;color:var(--text-muted);margin-top:3px;}
  .hist-close{background:var(--gray-bg);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;color:var(--text-muted);cursor:pointer;flex:0 0 auto;}
  .hist-body{overflow-y:auto;padding:16px 18px 24px;}
  .tl-item{position:relative;padding-left:22px;padding-bottom:18px;}
  .tl-item:before{content:'';position:absolute;left:5px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--teal);border:2px solid #fff;box-shadow:0 0 0 1.5px var(--teal);}
  .tl-item.as:before{background:#8A5FC0;box-shadow:0 0 0 1.5px #8A5FC0;}
  .tl-item:after{content:'';position:absolute;left:9px;top:16px;bottom:0;width:1.5px;background:var(--gray-line);}
  .tl-item:last-child:after{display:none;}
  .tl-date{font-size:13px;font-weight:700;color:var(--navy);}
  .tl-type{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;margin-left:6px;vertical-align:1px;}
  .tl-type.점검{background:var(--teal-soft);color:var(--teal);}
  .tl-type.AS{background:#F3EEFA;color:#8A5FC0;}
  .tl-meta{font-size:12px;color:var(--text-muted);margin-top:3px;line-height:1.6;}
  .tl-cat{display:inline-block;font-size:11px;font-weight:600;color:#534AB7;background:#F3EEFA;padding:2px 8px;border-radius:6px;margin-top:5px;}
  .tl-memo{font-size:12.5px;color:var(--text);margin-top:6px;line-height:1.55;background:var(--gray-bg);border-radius:8px;padding:8px 10px;}
  .tl-part{font-size:11.5px;color:var(--text-muted);margin-top:5px;}
  .tl-empty{text-align:center;color:var(--text-muted);font-size:13px;padding:30px 0;}

  /* 최근 처리 탭 */
  .rc-range{display:flex;gap:7px;margin-bottom:12px;}
  .rc-range .chip{flex:1;justify-content:center;text-align:center;}
  .rc-summary{font-size:12px;color:var(--text-muted);text-align:center;margin-bottom:14px;font-weight:600;}
  .rc-day{margin-bottom:18px;}
  .rc-dayhead{font-size:12px;font-weight:800;color:var(--navy);background:var(--teal-soft);
    border-radius:8px;padding:6px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .rc-dayhead .rc-daycnt{font-size:11px;font-weight:700;color:var(--teal);}
  .rc-item{background:#fff;border:1px solid var(--gray-line);border-radius:11px;padding:12px 13px;margin-bottom:9px;cursor:pointer;transition:box-shadow .12s,border-color .12s;}
  .rc-item:active{box-shadow:0 2px 8px rgba(16,29,61,.12);border-color:var(--teal);}
  .rc-item-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
  .rc-hname{font-size:14px;font-weight:700;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rc-type{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;flex:0 0 auto;}
  .rc-type.점검{background:var(--teal-soft);color:var(--teal);}
  .rc-type.AS{background:#F3EEFA;color:#8A5FC0;}
  .rc-sym{font-size:12px;font-weight:600;color:#534AB7;margin-bottom:4px;}
  .rc-fx{font-size:12.5px;color:var(--text);line-height:1.5;}
  .rc-metaline{font-size:11px;color:var(--text-muted);margin-top:6px;display:flex;flex-wrap:wrap;gap:4px 10px;}
  .rc-metaline .rc-part{color:var(--amber);font-weight:600;}
  .rc-fsefilter{margin-bottom:12px;}
  .rc-fsefilter select{width:100%;border:1.5px solid var(--gray-line);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:var(--text);background:#fff;outline:none;}

  /* 이력 편집 */
  .hist-lock{background:var(--gray-bg);border:none;border-radius:50%;width:30px;height:30px;font-size:14px;color:var(--text-muted);cursor:pointer;flex:0 0 auto;margin-right:6px;}
  .hist-lock.on{background:#F3EEFA;color:#8A5FC0;}
  #histPwModal{position:fixed;inset:0;background:rgba(16,29,61,.55);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
  #histPwModal.show{display:flex;}
  .pw-box{background:#fff;border-radius:16px;width:100%;max-width:340px;padding:22px;box-shadow:0 12px 40px rgba(16,29,61,.4);}
  .pw-box h3{font-size:16px;font-weight:800;color:var(--navy);margin-bottom:6px;}
  .pw-box p{font-size:12px;color:var(--text-muted);margin-bottom:16px;line-height:1.5;}
  .pw-box input{width:100%;border:1.5px solid var(--gray-line);border-radius:9px;padding:11px 13px;font-size:15px;font-family:inherit;outline:none;}
  .pw-box input:focus{border-color:var(--teal);}
  .pw-err{color:var(--red);font-size:12px;min-height:16px;margin-top:6px;}
  .pw-btns{display:flex;gap:8px;margin-top:14px;}
  .pw-btns button{flex:1;padding:11px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid var(--gray-line);background:#fff;color:var(--text-muted);}
  .pw-btns button.primary{background:var(--navy);color:#fff;border-color:var(--navy);}

  .tl-edit{background:#FAFBFC;border:1.5px dashed #9cc4dc;border-radius:10px;padding:10px;margin-bottom:10px;}
  .tl-edit input,.tl-edit select,.tl-edit textarea{width:100%;border:1px solid var(--gray-line);border-radius:6px;padding:7px 9px;font-size:12px;font-family:inherit;margin-bottom:6px;outline:none;}
  .tl-edit input:focus,.tl-edit textarea:focus{border-color:var(--teal);}
  .tl-edit .row2{display:flex;gap:6px;}
  .tl-edit .row2>*{flex:1;}
  .tl-edit-del{background:#FDECEA;color:var(--red);border:1px solid #f5c6c0;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
  .hist-editbar{display:flex;gap:6px;padding:12px 18px;border-top:1px solid var(--gray-line);flex:0 0 auto;}
  .hist-editbar button{flex:1;padding:10px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;border:none;}
  .hist-editbar .add{background:var(--teal-soft);color:var(--teal);}
  .hist-editbar .save{background:var(--navy);color:#fff;}
  .hist-editbar .cancel{background:var(--gray-bg);color:var(--text-muted);}

  /* ===== 주변 이동 소요시간 카드 (좌측 필터 하단) ===== */
  #pcRouteCard{display:none;}
  body.mode-window #pcRouteCard{display:block;background:#fff;border:1px solid var(--gray-line);border-radius:12px;padding:11px 12px;box-shadow:0 2px 8px rgba(27,47,94,.05);}
  .prc-head{font-size:12.5px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:6px;margin-bottom:9px;}
  .prc-head .prc-sub{font-size:10px;font-weight:700;color:var(--teal);background:var(--teal-soft);border-radius:7px;padding:1px 7px;}
  .prc-empty{font-size:11.5px;color:var(--text-muted);padding:4px 2px;}
  .prc-fse{padding:8px 0;border-top:1px dashed var(--gray-line);}
  .prc-fse:first-of-type{border-top:0;padding-top:0;}
  .prc-fse-h{font-size:12px;font-weight:800;color:#1B7A47;margin-bottom:6px;display:flex;flex-wrap:wrap;align-items:center;gap:4px 7px;}
  .prc-fse-h .prc-cur{font-size:10.5px;font-weight:600;color:var(--text-muted);}
  .prc-item{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:8px;cursor:pointer;transition:background .12s;}
  .prc-item:hover{background:var(--teal-soft);}
  .prc-rank{flex:0 0 auto;width:16px;height:16px;border-radius:50%;background:var(--navy);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;}
  .prc-nm{flex:1;min-width:0;font-size:11.5px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .prc-dt{flex:0 0 auto;font-size:10.5px;font-weight:700;color:var(--teal);white-space:nowrap;}
  .prc-prog{flex:0 0 auto;border:1px solid var(--gray-line);background:transparent;color:var(--text-muted);font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:6px;cursor:pointer;font-family:inherit;line-height:1.3;white-space:nowrap;}
  .prc-prog:hover{border-color:var(--teal);color:var(--teal);}
  .prc-item.prog{background:rgba(46,125,158,.12);}
  .prc-item.prog .prc-nm{color:var(--teal);}
  .prc-item.prog .prc-prog{background:var(--teal);border-color:var(--teal);color:#fff;}
  .prc-prog-cur{font-size:10.5px;font-weight:800;color:var(--teal);background:var(--teal-soft);border-radius:7px;padding:4px 9px;margin-bottom:7px;cursor:pointer;display:inline-block;}
  body.dark .prc-item.prog{background:rgba(84,170,208,.16);}

  /* 지도: 검색 반경 5km 주변 병원 마커 */
  .pc-nmk{width:12px;height:12px;border-radius:50%;background:rgba(46,125,158,.6);border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3);cursor:pointer;}
  .pc-nmk:hover{background:rgba(46,125,158,.95);}

  /* 헤더 다크모드 토글 */
  .theme-toggle{background:rgba(202,220,252,.15);border:1px solid rgba(202,220,252,.4);color:#CADCFC;font-size:13px;line-height:1;
    padding:6px 9px;border-radius:8px;cursor:pointer;margin-left:8px;font-family:inherit;}
  .theme-toggle:hover{background:rgba(202,220,252,.28);}
  #refreshBtn.spin{animation:bazSpin .8s linear infinite;pointer-events:none;opacity:.7;}
  @keyframes bazSpin{to{transform:rotate(360deg);}}
  /* 갱신 완료 토스트 */
  #bazToast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(12px);
    background:var(--navy);color:#fff;font-size:12.5px;font-weight:700;padding:10px 18px;border-radius:22px;
    box-shadow:0 6px 20px rgba(16,29,61,.35);opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:400;white-space:nowrap;}
  #bazToast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  body.dark #bazToast{background:#2A3650;border:1px solid var(--gray-line);}

  /* ======================= 다크 모드 ======================= */
  body.dark{
    --navy:#5E82C8; --navy2:#3B527F; --teal:#54AAD0;
    --gray-bg:#0E1420; --gray-line:#2A3446; --text:#E6EAF2; --text-muted:#97A3BA;
    --surface:#1A2234; --surface-2:#141B2A;
  }
  body.dark{background:var(--gray-bg);}
  /* 헤더는 짙은 네이비 유지 */
  body.dark header{background:#141E36;}
  /* 구조적 표면(카드/입력/표/모달 등) */
  body.dark #searchInput,
  body.dark select.flt,
  body.dark .rc-fsefilter select,
  body.dark .chip,
  body.dark .stats .s,
  body.dark .h-card,
  body.dark .h-actions button,
  body.dark .load-more,
  body.dark .dash-card,
  body.dark .hist-sheet,
  body.dark .pw-box,
  body.dark .rc-item,
  body.dark .tabs,
  body.dark .pc-viewtoggle,
  body.dark #pcRight,
  body.dark #pcRecentCard,
  body.dark #pcRouteCard,
  body.dark .pc-recent-item,
  body.dark #pcDetail,
  body.dark .pc-table-wrap,
  body.dark .pc-dt-acts button,
  body.dark .pc-backmap,
  body.dark .pc-backmap:hover,
  body.dark .pw-btns button{background:var(--surface);color:var(--text);}
  body.dark .h-name,body.dark .pc-dt-name,body.dark .prc-head,body.dark .rrc-head,
  body.dark .dash-title,body.dark .rc-hname,body.dark .rc-dayhead,body.dark .result-count b,
  body.dark .legend-val,body.dark .pc-dt-h3,body.dark .pw-box h3,body.dark #pcRightHead .ttl{color:var(--navy);}
  body.dark #pcRightHead{background:var(--surface-2);}
  body.dark #pcMapPane{background:#0E1420;}
  body.dark .h-actions .insp,body.dark .tab.on,body.dark .pc-viewtoggle button.on,
  body.dark .pw-btns button.primary,body.dark .hist-editbar .save{background:var(--navy);color:#fff;}
  body.dark .h-card.urgent{background:#2A1A1D;border-color:#7A3B3B;}
  body.dark .tl-edit{background:var(--surface-2);}
  body.dark .search-clear{color:#fff;}
  /* 밝은 배경 위 어두운 글자였던 태그/뱃지 보정 */
  body.dark .h-tag.ncare.none{color:#5A6478;}
  body.dark .rc-sym{color:#A79DEB;}
  body.dark .tl-cat{color:#A79DEB;background:#26243A;}
  body.dark .rc-metaline .rc-part{color:var(--amber);}
</style>
<script src="auth.js"></script>
</head>
<body>
<div class="wrap">
<header>
  <div class="logo-area">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="18" fill="#16264D"/><text x="50" y="58" font-family="Georgia,serif" font-size="42" font-weight="700" fill="#9EB4E0" text-anchor="middle">baz</text></svg>
    <div>
      <h1 id="hdrTitle">병원 데이터 센터</h1>
      <div class="subtitle" id="hdrSub">검색 · 점검현황 · 근처 N-CARE</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;">
    <div class="mode-toggle" id="modeToggle" role="group" aria-label="화면 모드">
      <button type="button" data-mode="window">🖥 Window</button><button type="button" data-mode="mobile">📱 Mobile</button>
    </div>
    <button type="button" class="theme-toggle" id="refreshBtn" aria-label="새로고침" title="데이터 새로고침">🔄</button>
    <button type="button" class="theme-toggle" id="themeToggle" aria-label="다크모드 전환" title="다크모드">🌙</button>
    <a href="index.html" class="home-link" id="homeLink">메뉴</a>
    <div class="hublang" id="langSwitch">
      <button data-lang="ko">KO</button><button data-lang="en">EN</button><button data-lang="ja">JA</button>
    </div>
  </div>
</header>

<div class="body">
  <div class="tabs">
    <button class="tab on" data-tab="list" id="tabList">병원 조회</button>
    <button class="tab" data-tab="dash" id="tabDash">점검 현황</button>
    <button class="tab" data-tab="recent" id="tabRecent">최근 처리</button>
  </div>

  <!-- ===== 조회 탭 ===== -->
  <div id="viewList">
   <div id="filterRail">
    <div class="search-wrap">
      <span class="ico">🔍</span>
      <input type="text" id="searchInput" placeholder="병원명 검색..." autocomplete="off">
      <button class="search-clear" id="searchClear">✕</button>
    </div>

    <div id="filterSticky">
    <div class="filter-section">
      <div class="filter-row" id="filterRow">
        <button class="chip on" data-filter="all">전체 <span class="cnt" id="cnt-all"></span></button>
        <button class="chip" data-filter="ncare">N-CARE <span class="cnt" id="cnt-ncare"></span></button>
        <button class="chip" data-filter="due">점검필요 <span class="cnt" id="cnt-due"></span></button>
      </div>
    </div>

    <div class="filter-section" id="advFilters">
      <div style="display:flex;gap:8px;">
        <select class="flt" id="salesFilter"><option value="">전체 영업담당</option></select>
        <select class="flt" id="regionFilter"><option value="">전체 지역</option></select>
      </div>
    </div>
    </div>

    <div class="stats" id="stats"></div>
   </div>
    <div class="result-count" id="resultCount"></div>
    <div id="cardList"></div>
    <button class="load-more" id="loadMore" style="display:none;">더 보기</button>
  </div>

  <!-- ===== 대시보드 탭 ===== -->
  <div id="viewDash" style="display:none;"></div>

  <!-- ===== 최근 처리 탭 ===== -->
  <div id="viewRecent" style="display:none;"></div>
</div>
</div>

<!-- 점검 이력 모달 -->
<div id="histModal">
  <div class="hist-sheet">
    <div class="hist-head">
      <div style="min-width:0;">
        <div class="hn" id="histName"></div>
        <div class="hsub" id="histSub"></div>
      </div>
      <button class="hist-lock" id="histAiBtn" title="이 장비 AI 문의" style="background:none;border:none;font-size:18px;cursor:pointer;padding:4px;">🤖</button>
      <button class="hist-lock" id="histLock" title="편집">🔒</button>
      <button class="hist-close" id="histClose">✕</button>
    </div>
    <div class="hist-body" id="histBody"></div>
    <div class="hist-editbar" id="histEditBar" style="display:none;">
      <button class="add" id="histAdd">＋ 기록 추가</button>
      <button class="cancel" id="histCancel">취소</button>
      <button class="save" id="histSave">저장</button>
    </div>
  </div>
</div>

<!-- 이력 편집 비밀번호 모달 -->
<div id="histPwModal">
  <div class="pw-box">
    <h3 id="histPwTitle">이력 편집</h3>
    <p id="histPwDesc">이력을 편집하려면 비밀번호를 입력하세요.</p>
    <input type="password" id="histPwInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="비밀번호">
    <div class="pw-err" id="histPwErr"></div>
    <div class="pw-btns">
      <button id="histPwCancel">취소</button>
      <button class="primary" id="histPwOk">확인</button>
    </div>

const GUIDE_SYMS = [{"name":"메인보드 동작 불능","cat":"전원·제어","q":["장비 전원을 켰을 때 화면·램프가 전혀 들어오지 않나요? 아니면 일부만 동작하나요?","Water pump 소리나 터치스크린은 정상적으로 동작하나요?","장비를 켜자마자 발생했나요? 아니면 사용 중에 발생했나요?"],"check":["[메인보드 LED 점등 불량 확인 시]\n점검 결과 메인보드 내 LED 점등 불량으로 메인보드 자체 불량이 확인되었습니다. 현장 수리가 불가하여 메인보드 교체가 필요하며, 교체 비용이 발생될 것 같습니다.","[F/W·UI 버전 문제 확인 시]\n점검 결과 장비 소프트웨어(F/W·UI) 버전 문제로 확인되어, 병원에 맞는 동일 F/W 버전으로 업데이트를 진행하겠습니다. 별도 부품 교체 비용은 발생하지 않습니다."],"done":["[교체 진행 시]\n메인보드 교체 후 약 10분간 에이징 진행 및 JET TEST를 실시하였으며 정상 동작을 확인하였습니다. 교체 부위를 직접 보여드리겠습니다.","[교체 불필요 시]\nF/W 업데이트 후 성능 점검 테스트를 실시하였으며 정상 동작을 확인하였습니다."],"tip":"전원 동작 후 약 10분 에이징 + JET TEST로 정상 동작 확인 후 인계. 동일 증상 재발 시 즉시 접수 요청 안내."},{"name":"풋 스위치 동작 불능","cat":"전원·제어","q":["풋스위치를 밟았을 때 장비가 전혀 반응하지 않나요? 아니면 간헐적으로만 동작하나요?","풋스위치 동작 시 '삑~' 같은 이상 소음이 발생했나요?","핸드피스 출력(분사)은 정상적으로 나오고 있었나요?"],"check":["[메인보드 내 LED 신호 미발생 확인 시]\n풋스위치 신호가 장비에 전달되지 않는 것이 확인되어 풋스위치 교체가 필요하며, 교체 비용이 발생될 것 같습니다.","[풋스위치 신호 정상·핸드피스 미동작 확인 시]\n풋스위치 신호는 정상이나 핸드피스가 동작하지 않아 핸드피스 A'ssy 교체가 필요할 것 같습니다.","[이상 소음 발생 시]\n약 15~30초 대기 후 정상 작동 여부를 확인하겠습니다. 3회 반복 후에도 동일 증상이 발생하면 핸드피스 A'ssy 교체가 필요합니다."],"done":["[교체 진행 시]\n해당 부품 교체 후 반복 테스트를 실시하였으며 정상 작동을 확인하였습니다.","[교체 불필요 시]\n점검 결과 일시적 현상으로 확인되었으며, 반복 테스트 상 정상 작동을 확인하였습니다. 동일 증상 재발 시 바로 접수 부탁드립니다."],"tip":"반복 테스트로 정상 작동 확인 후 인계."},{"name":"장비 출력 저하","cat":"노즐·출력","q":["출력이 약하다고 판단하신 기준이 어떤 부분일까요? (분사 모양, 시술 체감 등)","현재 사용 중인 노즐과 주사기는 마지막으로 언제 교체하셨을까요? 보통 어떤 주기로 교체하고 계신지도 함께 여쭤봐도 될까요?","핸드피스 쪽에서 누수나 녹물 같은 게 보인 적이 있을까요?"],"check":["[노즐·소모품 원인 확인 시]\n기존 사용 노즐 상태 점검 결과, 신규 노즐 및 주사기 적용 시 정상 출력이 확인되었습니다. 소모품 상태에 따른 출력 차이로 보이며 장비 자체 이상은 아닙니다.","[핸드피스 내부 녹물·누수 확인 시]\n핸드피스 내부 녹물·누수가 확인되어 핸드피스 A'ssy 교체가 필요하며, 교체 비용이 발생될 것 같습니다."],"done":["[교체 진행 시]\n교체 후 신규 노즐·주사기 적용 상태에서 젯 퀄리티를 확인하였으며 정상 출력을 확인하였습니다. 분사 상태를 직접 확인 부탁드립니다.","[교체 불필요 시]\n신규 노즐·주사기 적용 후 정상 젯 퀄리티 상태를 확인하였습니다. 노즐은 1회 시술용으로 설계되어 있어 사용 횟수가 누적되면 출력이 점차 떨어질 수 있는데요, 시술마다 새 노즐을 사용하시면 일정한 출력을 유지하실 수 있습니다."],"tip":"신규 노즐·주사기 적용 후 정상 젯 퀄리티를 병원 담당자에게 직접 확인시킬 것. ※ Handpiece·Nozzle 교환에도 개선이 안 될 시 공장 입고 진행(필요 시 데모 장비 제공)."},{"name":"RFID 스캔 불량","cat":"전원·제어","q":["노즐 스캔 시 인식음이 발생하나요?","'RFID Device not recognized', 'Check connection' 같은 팝업이 떴을까요?","새 노즐로 바꿔도 'Please scan again'이 반복해서 나타났나요?"],"check":["[케이블 연결 불량 확인 시]\nRFID 케이블 연결 상태 불량이 확인되어 재연결 후 정상 동작을 확인하겠습니다. 별도 비용은 발생하지 않습니다.","[UI 문제 확인 시]\nPlease scan again 반복 발생의 원인이 소프트웨어로 확인되어 UI 재업데이트를 실시하겠습니다.","[RFID 인식율 미달 확인 시]\nRFID 모듈 인식율이 기준에 미달하여 RFID A'ssy 교체가 필요하며, 교체 비용이 발생될 것 같습니다."],"done":["[교체·업데이트 진행 시]\n조치 후 약 10분 에이징 진행 및 RFID TAG 테스트를 실시하였으며 정상 인식을 확인하였습니다. 직접 스캔해 보시겠어요?","[교체 불필요 시]\n케이블 재연결 및 신규 노즐 적용 후 정상 인식을 확인하였습니다."],"tip":"전원 동작 후 약 10분 에이징 → RFID TAG 테스트로 정상 인식 확인 후 인계."},{"name":"냉각수 누수","cat":"누수·냉각","q":["장비를 켜자마자 발생했나요? 아니면 시술 중에 발생했을까요?","누수가 발견된 지점은 어디일까요? (장비 본체 아래쪽, 핸드피스 등)"],"check":["[핸드피스 내 냉각수 라인 누수 확인 시]\n핸드피스 내 냉각수 순환부 막힘이 원인으로 누수가 발생하였고, 수리가 불가하여 교체 비용이 발생될 것 같습니다.","[장비 내부 누수 확인 시]\n내부 누수 확인 뒤에 내부 부품 손상 유/무를 확인하였으며 이상 없음을 확인하였지만, 핸드피스 내 냉각수 순환부가 파손되어 교체 비용이 발생될 것 같습니다."],"done":["[교체 필요]\n해당 부품 교체 후 성능 점검 테스트를 실시하였으며 정상 동작을 확인하였습니다. 냉각수도 정상 수준(700~800ml)으로 보충 완료하였습니다.","[교체 불필요]\n점검 결과 누수가 일관되지 않았으며 냉각수량이 기준치 이내 미세 보충 수준인 것으로 확인되어, 예상 지점 누수 예방 조치하였습니다."],"tip":"누수 지점 주변 물기 제거 후 약 10분 에이징하여 추가 누수 여부 확인. 냉각수 정상 보유량 700~800ml."},{"name":"UI 업그레이드","cat":"S/W·교육","q":["현재 사용 중인 화면(UI) 버전에서 불편하셨던 부분이 있을까요?","기존에 사용하시던 시술 출력 데이터(설정값)는 그대로 유지가 필요하실까요?","업그레이드 후 사용법 교육이 필요하시면 교육 담당자 방문 일정도 함께 잡아드릴까요?"],"check":["[업그레이드 진행 안내]\n기존 병원 내 UI·F/W 버전을 확인하였고, 요청하신 버전으로 업그레이드를 진행하겠습니다. 기존 시술 출력 데이터는 사진·메모로 보관 후 동일하게 적용해 드리겠습니다."],"done":["[완료 안내]\n업그레이드 완료 후 약 10분 에이징 및 JET TEST를 실시하였으며 정상 동작을 확인하였습니다. 기존 출력 데이터가 적용된 위치를 직접 안내해 드리겠습니다."],"tip":"데이터 적용 위치 및 변경 내용을 담당자에게 안내 조치. 교육 담당자에게 관련 내용 공유. ※ 현장 실시간 교육 진행 시 후속 조치 후 안내할 것."},{"name":"팝업 불량(에러 팝업)","cat":"전원·제어","q":["화면에 어떤 팝업(에러 문구)이 표시되었을까요? 가능하시면 사진으로 보여주실 수 있을까요?","팝업이 뜨는 시점이 언제인가요? (부팅 시, 시술 중, 특정 동작 시)"],"check":["[점검 안내]\nA/S Manual 기준에 따라 해당 팝업 코드에 대한 점검을 진행하겠습니다. 점검 결과에 따라 조치 내용과 비용 발생 여부를 안내드리겠습니다."],"done":["[조치 완료]\nA/S Manual 기준 조치 완료 후 반복 테스트를 실시하였으며, 팝업 재발 없이 정상 작동을 확인하였습니다."],"tip":"A/S Manual을 참조하여 증상 확인 및 조치. 반복 테스트로 정상 작동 확인 후 인계."},{"name":"Touch Screen 동작 불능","cat":"전원·제어","q":["화면 전체가 안 눌리나요? 아니면 특정 위치만 반응이 없을까요?","어떤 상황에서 동작 불능이 발생했는지 기억나실까요? (부팅 직후, 시술 중 등)","터치 반응이 늦게 나타나는(지연) 증상도 있었을까요?"],"check":["[특정 위치·간헐적 동작 확인 시]\n특정 위치 또는 간헐적 터치 불량이 확인되어 SD CARD 교체를 진행하겠습니다(동일한 UI 버전 적용). 터치 반응 지연 증상도 함께 점검하겠습니다.","[화면 전체 미동작 확인 시]\n터치스크린 자체 불량이 확인되어 Touch Screen A'ssy 교체가 필요하며, 교체 비용이 발생될 것 같습니다."],"done":["[교체 진행 시]\n교체 후 약 10분 에이징 진행 및 전체 위치 터치 테스트를 실시하였으며 정상 반응을 확인하였습니다. 직접 조작해 보시겠어요?","[교체 불필요 시]\nSD CARD 교체 및 UI 점검 후 정상 터치 반응을 확인하였습니다."],"tip":"전원 동작 후 약 10분 에이징 진행 후 증상 재현 여부 확인. SD CARD 교체 시 기존과 동일한 UI 버전인지 확인할 것."},{"name":"이상 소음","cat":"구조·기타","q":["소음이 어떤 종류였을까요? (팬 소리, 모터 소리, '삑' 같은 경고음 등)","전원을 켜자마자 발생하나요? 아니면 시술(분사) 중에만 발생하나요?"],"check":["[발생 지점 특정 시]\n내부(FAN, Water pump, Power supply) 점검 및 Air remover 기능 활용 JET TEST 결과, ○○ 부품에서 소음이 확인되었습니다. 해당 부품 교체가 필요하며 교체 비용이 발생될 것 같습니다.","[현장 수리 불가 시]\nFAN, Power supply 등 전원부 내 현장 수리가 불가한 부분으로 확인되어 공장 입고 수리가 필요합니다. 수리 기간 동안 필요 시 데모 장비 제공을 협의드리겠습니다."],"done":["[교체 진행 시]\n부품 교체 후 정상 젯 퀄리티 상태 및 이상 소음 개선됨을 확인하였습니다. 직접 들어보시고 확인 부탁드립니다.","[공장 입고 시]\n공장 입고 일정과 예상 수리 기간을 안내드리겠습니다. 영업 담당자에게도 상황을 공유하겠습니다."],"tip":"정상 젯 퀄리티 및 소음 개선을 병원 담당자에게 직접 확인시킬 것. ※ 공장 입고 시 영업 담당자 공유 + 수리 지연 안내(필요 시 데모 장비 제공)."},{"name":"피팅 불량(기포 발생)","cat":"누수·냉각","q":["냉각수 라인에 기포가 보이거나 분사가 불안정한 증상이 있었을까요?","증상이 전원을 켠 직후에 심한가요? 사용 중에도 계속되나요?"],"check":["[기포 지속 발생 확인 시]\n약 10분 에이징 테스트 후에도 기포 발생량이 지속적으로 많은 것이 확인되어 피팅 교체가 필요하며, 교체 비용이 발생될 것 같습니다. (육안 확인이 어려운 경우 주사기를 활용한 누설 테스트로 확인)","[튜브 길이·연결 문제 확인 시]\nWater tank 피팅 연결 Tube(In&Out) 길이 점검 결과 연결 상태 문제로 확인되어 재정비하겠습니다. ※ Out Tube(Water tank→Handpiece)가 더 긴 것이 정상입니다."],"done":["[교체 진행 시]\n피팅 교체 후 약 10분 에이징하여 기포 발생량 정상 및 JET TEST 정상 동작을 확인하였습니다.","[교체 불필요 시]\n에이징 초기의 일시적 기포로 확인되었으며, 안정화 후 기포 발생 없이 정상 동작함을 확인하였습니다."],"tip":"에이징 진행 이후 기포 발생 여부를 기준으로 판단. 육안 확인 어려울 시 주사기 활용 누설 테스트 진행."},{"name":"파워서플라이 불량","cat":"전원·제어","q":["전원을 켰을 때 장비가 전혀 켜지지 않았나요?","장비 뒤쪽 팬(FAN) 소리가 들리지 않거나, 평소와 다른 점이 있었을까요?"],"check":["[불량 확인 시]\nPower supply 내 LED(초록색) 미점등 및 후면 FAN 미동작이 확인되었습니다. 해당 부분은 현장 수리가 불가하여 공장 입고 수리가 필요합니다. 수리 기간 동안 필요 시 데모 장비 제공을 협의드리겠습니다."],"done":["[공장 입고 안내]\n공장 입고 일정과 예상 수리 기간을 안내드리고, 진행 상황은 ○○님께 계속 공유드리겠습니다. 영업 담당자에게도 상황을 공유하겠습니다."],"tip":"현장 수리 불가 항목 → 공장 입고 수리 조치. ※ 영업 담당자 상황 공유 + 병원 담당자에게 수리 지연 안내(필요 시 데모 장비 제공)."},{"name":"구동 키 파손","cat":"구조·기타","q":["구동 키가 부러진 상태인가요? 키 조각이 스위치 안에 남아있을까요?","혹시 스페어 키를 보유하고 계실까요?"],"check":["[점검 안내]\n스위치 내부 이물(부러진 키 조각) 유무를 확인하고, 있을 경우 분해하여 제거하겠습니다. 구동 키는 추가 제공해 드리겠습니다."],"done":["[조치 완료]\n이물 제거 및 구동 키 제공 완료 후 전원 동작을 실시하여 정상 동작을 확인하였습니다."],"tip":"※ 영업 담당자에게 상황 공유 및 병원 담당자에게 처리 결과 안내 조치(필요 시 구동 키 추가 제공)."},{"name":"거치대 파손","cat":"구조·기타","q":["파손된 부위가 어디일까요? 사용 중 불편하셨던 부분이 있을까요?","거치대 교체를 원하실까요? (구형/신형 TYPE 확인 필요)"],"check":["[점검 안내]\n거치대 TYPE(구형/신형)을 확인하였습니다. 파손 확인 결과와 함께 교체 진행 시 비용을 안내드리겠습니다."],"done":["[조치 완료]\n요청 사항에 따라 거치대 교체를 완료하였습니다. 고정 상태를 직접 확인 부탁드립니다."],"tip":"파손 확인 후 요청 사항에 따라 교체. ※ 영업 담당자 상황 공유 및 병원 담당자에게 처리 결과 안내 조치."},{"name":"ARM 파손","cat":"구조·기타","q":["ARM의 어느 부위가 파손되었을까요? (관절부, 고정부 등)","고정 나사가 빠지거나 분실된 상태일까요?"],"check":["[현장 수리 가능 시]\n고정 나사 분실로 확인되어 나사 교환을 실시하겠습니다. 간단한 조치로 비용 부담은 크지 않습니다.","[고정부 기능 상실·파손 시]\n고정부 기능 상실 및 파손으로 확인되어 A'ssy 교체가 필요하며, 교체 비용이 발생될 것 같습니다. ※ 고정부 파손은 현장 수리 대상에서 제외됩니다."],"done":["[조치 완료]\n나사 교환(또는 A'ssy 교체) 후 고정 상태 및 동작을 확인하였습니다. 직접 움직여 보시고 확인 부탁드립니다."],"tip":"고정부 파손은 현장 수리 대상 제외 → A'ssy 교체. ※ 영업 담당자 상황 공유 및 병원 담당자에게 처리 결과 안내 조치."},{"name":"케이블 불량","cat":"전원·제어","q":["화면에 연결 관련 팝업이 표시되었을까요?","케이블을 만지거나 움직일 때 증상이 나타나거나 사라지는 경우가 있었을까요?"],"check":["[접촉 불량 확인 시]\n해당 팝업 관련 케이블 체결 상태 점검 및 BW-100 세척 작업으로 접촉 불량을 조치하겠습니다. 별도 비용은 발생하지 않습니다.","[단선 확인 시]\n테스터기 점검 결과 케이블 단선이 확인되어 케이블 교체가 필요하며, 교체 비용이 발생될 것 같습니다. ※ 교체 후에도 동일 증상 발생 시 A'ssy 교환이 필요할 수 있습니다."],"done":["[조치 완료]\n케이블 조치 후 약 10분 에이징 진행 및 JET TEST를 실시하였으며 정상 동작을 확인하였습니다.","[A'ssy 교환 시]\n케이블 교체 후에도 동일 증상이 확인되어 A'ssy 교환을 진행하였고, 정상 동작을 확인하였습니다."],"tip":"체결 점검 → BW-100 세척 → 단선 확인 → 케이블 교체 → (재발 시) A'ssy 교환 순으로 진행."},{"name":"재현 안됨","cat":"구조·기타","q":["증상이 발생했을 당시 상황을 최대한 자세히 말씀해 주실 수 있을까요? (시점, 빈도, 화면 표시 등)","증상 발생 시 촬영해 두신 사진이나 영상이 있을까요?"],"check":["[점검 안내]\n현재는 증상이 재현되지 않아, 정기 점검 체크리스트를 활용하여 장비 전체 점검을 진행하겠습니다. 점검 과정을 함께 봐주시면 좋겠습니다."],"done":["[종결 안내]\n전체 점검 결과 이상 없음을 확인하여 종결 처리하겠습니다. 동일 증상이 다시 발생하면 가능한 사진·영상을 촬영해 주시고 바로 접수 부탁드립니다.\n※ 증상 재현이 안 될 경우 해당 부분에 대한 안전함을 확인시켜주는 행동과 안내를 진행할 것"],"tip":"정기 점검 체크리스트 활용 전체 점검 → 이상 없음 확인 후 종결. ※ 영업 담당자 상황 공유 및 병원 담당자에게 점검 사항 안내 조치."},{"name":"냉각 호스 파손","cat":"누수·냉각","q":["누수가 발견된 지점이 어디일까요?","장비 아래나 핸드피스 연결부에 물이 고여 있었을까요?"],"check":["[파손 확인 시]\n냉각 호스 파손에 의한 누수가 확인되어 핸드피스 교체가 필요하며, 교체 비용이 발생될 것 같습니다. 파손 부위를 직접 보여드리겠습니다."],"done":["[조치 완료]\n핸드피스 교체, 냉각수 보충(정상 700~800ml), 발생 지점 주변 물기 제거를 완료하였고, 전원 동작 하 주요 부품(메인보드, Water pump, Touch screen, Power supply 등) 정상 동작을 확인하였습니다."],"tip":"물기 제거는 추가 누수 유/무 확인 목적. 전원 동작 후 약 10분 에이징 진행 후 추가 누수 발생 여부 확인."},{"name":"노즐 누수/녹물","cat":"노즐·출력","q":["정확한 원인 파악을 위해 노즐 사용 현황을 함께 확인해 봐도 될까요? (모든 병원에 동일하게 확인드리는 점검 절차입니다)","노즐 교체는 보통 어떤 주기로 하고 계실까요? 현재 노즐로는 시술을 몇 회 정도 진행하셨을까요?","누수가 노즐 쪽인가요, 핸드피스 쪽인가요?"],"check":["[노즐 손상 확인 시]\n사용 중인 노즐에서 멤브레인 파손/녹물/생리식염수 누수가 확인되었습니다. 즉시 사용을 중지해 주시고 새 노즐로 교체 부탁드립니다. (※ 매우 중요: 누수 노즐 계속 사용 금지)","[핸드피스 내부 녹물 확인 시]\n핸드피스 내부 녹물이 확인되어 세척을 진행하겠습니다. 세척·수리가 불가할 경우 A'ssy 교체가 필요하며 교체 비용이 발생될 것 같습니다.","[냉각수 부족 확인 시]\nWater tank 냉각수가 기준치(정상 700~800ml) 미만으로 확인되어 추가 누수 여부 점검 후 보충하겠습니다."],"done":["[조치 완료]\n조치 후 약 10분 에이징 진행 및 JET TEST를 실시하였으며 정상 동작을 확인하였습니다. 새 노즐 기준 분사 상태를 직접 확인 부탁드립니다.","[추가 누수 발견 시]\n추가 누수 지점이 확인되어 해당 부분 교체 후 냉각수 보충을 완료하였습니다."],"tip":"※ 노즐 누수 확인 시 사용 중지 + 새 노즐 사용 요청(매우 중요). ※ 사용 미숙(재사용 등)으로 판단되는 경우 교육 담당자에게 내용 공유."},{"name":"노즐 체결 강함","cat":"노즐·출력","q":["노즐 체결(잠금) 시 어느 정도로 조이고 계신지 보여주실 수 있을까요?","노즐 스패너는 사용하고 계실까요?"],"check":["[체결 방법 안내]\n현재 사용 노즐의 체결력을 확인하였습니다. 노즐 스패너를 제공해 드리고 올바른 사용 방법을 안내드리겠습니다."],"done":["[안내 완료]\n노즐 스패너 제공 및 사용 방법 안내를 완료하였습니다. 직접 한 번 체결해 보시겠어요?\n※ 체결력을 임의로 조정할 경우 신규 노즐 사용 시 체결력 변화가 생길 수 있으며, 체결력 저하 시 시술 중 노즐 이탈 가능성이 있어 주의가 필요합니다."],"tip":"체결력 임의 조정 시 신규 노즐 체결력 변화 위험성 안내. ※ 체결력 저하에 따른 시술 중 노즐 이탈 가능성 위험 안내."},{"name":"노즐 체결 약함","cat":"노즐·출력","q":["체결이 약하다고 느끼신 게 특정 노즐에서만인가요? 모든 노즐에서인가요?","사용 중인 노즐의 제조일을 함께 확인해 봐도 될까요? (오래된 노즐일 경우 최신 제조 노즐과 비교 테스트 진행)","노즐 스패너는 사용하고 계실까요?"],"check":["[Permanent-Holder 마모 확인 시]\n사용 노즐 체결력이 동일하게 약함이 확인되어 Permanent-Holder 교체를 진행하겠습니다. 교체 비용이 발생될 것 같습니다.\n※ 최신 노즐이 아닌 경우, 추가 구매 시 체결력 변화 가능성을 함께 안내드립니다.","[노즐 제조일 문제 확인 시]\n오래된 제조일의 노즐로 인한 체결력 차이로 확인됩니다. 최신 제조 노즐과 비교 테스트 결과를 보여드리겠습니다."],"done":["[교체 완료]\nPermanent-Holder 교체 후 체결 상태를 확인하였습니다. 교체 직후에는 체결이 다소 강하게 느껴질 수 있어, 노즐 스패너 제공 및 사용을 권장드립니다."],"tip":"교체 후 체결력 변화(강해짐)에 따른 어려움 호소를 예상 → 노즐 스패너 제공 및 사용 권장."},{"name":"발열","cat":"누수·냉각","q":["발열이 느껴진 부위가 핸드피스인가요, 장비 본체인가요?","시술 몇 회차쯤부터 뜨거워지는 느낌이 있었을까요?"],"check":["[누수 확인 시]\n장비 누수가 확인되어 해당 부분에 대한 교체 또는 수리를 진행하겠습니다. 비용 발생 여부를 함께 안내드리겠습니다.","[냉각수 부족·순환 장애 확인 시]\nWater tank 냉각수 부족에 의한 순환 장애가 확인되어 기준치(정상 700~800ml) 이상으로 보충하겠습니다.","[누수 없음·순환 정상 시]\n누수 미발생 및 냉각수 순환이 정상 범위로 확인되어, 발열 원인인 핸드피스 교체가 필요하며 교체 비용이 발생될 것 같습니다."],"done":["[조치 완료]\n조치 후 약 10분 에이징 진행 및 JET TEST를 실시하였으며 발열 재발 없이 정상 동작을 확인하였습니다. 직접 만져보시고 확인 부탁드립니다."],"tip":"누수 → 냉각수량(700~800ml) → 순환 상태 순으로 원인 확인. 에이징 + JET TEST로 발열 재발 유/무 확인 후 인계."},{"name":"동작 불능(시술 중)","cat":"노즐·출력","q":["사용 중인 노즐 상태(멤브레인 파손, 녹물, 생리식염수 누수)를 함께 확인해 봐도 될까요?","풋스위치를 밟았을 때 장비 화면이나 소리 반응은 있었을까요?"],"check":["[풋스위치 신호 미발생 확인 시]\n풋스위치 동작 신호가 발생하지 않아 케이블 단선 점검 후 수리를 진행하겠습니다.","[풋스위치 정상·핸드피스 미동작 시]\n풋스위치는 정상이나 핸드피스가 동작하지 않아 핸드피스 A'ssy 교체가 필요하며, 교체 비용이 발생될 것 같습니다.","[노즐 누수 확인 시]\n노즐 누수가 확인되어 즉시 사용 중지 및 새 노즐 사용을 부탁드립니다. (※ 매우 중요)"],"done":["[조치 완료]\n조치 후 약 10분 에이징 진행 및 JET TEST를 실시하였으며 정상 동작을 확인하였습니다."],"tip":"JET TEST로 풋스위치·핸드피스 동작 확인. 풋스위치는 메인보드 내 동작 신호 발생 유/무로 판단."},{"name":"출력 약함","cat":"노즐·출력","q":["출력이 약하다고 판단하신 기준이 어떤 부분일까요?","현재 노즐로 시술을 몇 회 정도 진행하셨을까요? 노즐 상태(멤브레인, 녹물, 누수)도 함께 확인해 봐도 될까요?"],"check":["[소모품 원인 확인 시]\n신규 노즐 및 주사기 적용 시 정상 출력이 확인되었습니다. 노즐은 1회 시술용으로 설계되어 있어 사용 횟수가 누적되면 멤브레인 특성상 출력이 떨어질 수 있는데요, 이번 증상도 그 영향으로 보입니다. (누수 노 // ===== 유틸 =====
function normalize(s){ return (s||'').toLowerCase().replace(/\s+/g,''); }
function isNcare(h){ return h.nc && h.nc!=='미가입'; }
function isDue(h){ return isNcare(h) && ['점검대상','권고','경고','미점검'].includes(h.st); }
function daysSince(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr.replace(/\./g,'-').replace(/\s/g,''));
  if(isNaN(d)) return null;
  return Math.floor((TODAY-d.getTime())/86400000);
}
function distKm(lat1,lng1,lat2,lng2){
  const R=6371, toR=x=>x*Math.PI/180;
  const dLat=toR(lat2-lat1), dLng=toR(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// N-CARE 점검 경과 위험도: over(90일초과/미점검), near(60~90), null
function dueLevel(h){
  if(!isNcare(h)) return null;
  if(h.st==='미점검') return 'over';
  const dd=daysSince(h.li);
  if(dd==null) return 'over';
  if(dd>90) return 'over';
  if(dd>60) return 'near';
  return null;
}

// ===== 검색 대상 문자열(병원명·주소·장비·거래처·UI/HP Ver·AS 유무상) =====
function searchHaystack(h){
  const vendor=(h.d||'').trim();
  const vendorLabel=vendor==='납품 1년 이내'?'워런티 유효':'';
  const hpVer=(h.hpv||'').trim()||getLastHpVer(h.n);
  const uiVer=(h.uiv||'').trim()||getLastUiVer(h.n);
  return normalize([h.n,h.a,h.s,vendor,vendorLabel,hpVer,uiVer,h.as].join(' '));
}
// ===== 필터 카운트 공용 조건 (다른 활성 필터 반영) =====
function matchSearchQ(h){
  if(!searchQ) return true;
  return searchHaystack(h).includes(normalize(searchQ));
}
function matchChipFilter(h){
  if(curFilter==='ncare') return isNcare(h);
  if(curFilter==='due') return isDue(h);
  return true;
}

// ===== 필터 드롭다운 채우기 (교차 필터 카운트) =====
function populateFilters(){
  const salesSet={}, regionSet={};
  HOSPITALS.forEach(h=>{
    // 영업담당 카운트: 칩·지역·검색 반영(영업담당 자신은 제외), 옵션 목록은 전체 유지
    if(h.sa && h.sa!=='장비OUT'){
      if(!(h.sa in salesSet)) salesSet[h.sa]=0;
      if(matchChipFilter(h)&&(!regionFilter||h.rg===regionFilter)&&matchSearchQ(h)) salesSet[h.sa]++;
    }
    // 지역 카운트: 칩·영업담당·검색 반영(지역 자신은 제외), 옵션 목록은 전체 유지
    if(h.rg){
      if(!(h.rg in regionSet)) regionSet[h.rg]=0;
      if(matchChipFilter(h)&&(!salesFilter||h.sa===salesFilter)&&matchSearchQ(h)) regionSet[h.rg]++;
    }
  });
  const sf=document.getElementById('salesFilter');
  while(sf.options.length>1) sf.remove(1);
  Object.keys(salesSet).sort((a,b)=>salesSet[b]-salesSet[a]).forEach(s=>{
    const o=document.createElement('option'); o.value=s; o.textContent=s+' ('+salesSet[s]+')'; sf.appendChild(o);
  });
  if(salesFilter && !(salesFilter in salesSet)) salesFilter='';
  sf.value=salesFilter;
  const rf=document.getElementById('regionFilter');
  while(rf.options.length>1) rf.remove(1);
  Object.keys(regionSet).sort((a,b)=>regionSet[b]-regionSet[a]).forEach(r=>{
    const o=document.createElement('option'); o.value=r; o.textContent=r+' ('+regionSet[r]+')'; rf.appendChild(o);
  });
  if(regionFilter && !(regionFilter in regionSet)) regionFilter='';
  rf.value=regionFilter;
}

// ===== 필터링 =====
function getFiltered(){
  let list=HOSPITALS.slice();
  if(nearbyMode && myPos){
    list=list.filter(h=>isNcare(h)&&h.lat!=null)
      .map(h=>({...h,_dist:distKm(myPos.lat,myPos.lng,h.lat,h.lng)}))
      .filter(h=>h._dist<=5).sort((a,b)=>a._dist-b._dist);
    return list;
  }
  if(curFilter==='ncare') list=list.filter(isNcare);
  else if(curFilter==='due') list=list.filter(isDue);
  if(salesFilter) list=list.filter(h=>h.sa===salesFilter);
  if(regionFilter) list=list.filter(h=>h.rg===regionFilter);
  if(searchQ){
    const nq=normalize(searchQ);
    list=list.filter(h=>searchHaystack(h).includes(nq));
  }
  const stOrder={'미점검':0,'경고':1,'권고':2,'점검대상':3,'정상':4};
  list.sort((a,b)=>{
    const na=isNcare(a), nb=isNcare(b);
    if(na!==nb) return na?-1:1;
    if(na&&nb){
      const sa=stOrder[a.st]??5, sb=stOrder[b.st]??5;
      if(sa!==sb) return sa-sb;
      return (a.li||'').localeCompare(b.li||'');
    }
    return (b.li||'').localeCompare(a.li||'');
  });
  return list;
}

function statusDays(h){
  const dd=daysSince(h.li);
  const ncare=isNcare(h);
  const label=ncare?t('lastInsp'):t('lastVisit');
  const noLabel=ncare?t('noInsp'):t('noVisit');
  if(h.li&&dd!=null) return label+' '+h.li+' · '+t('dayAgo').replace('{d}',dd);
  return noLabel;
}
// 각 병원의 마지막 핸드피스 교체 버전 추출 (이력 기반, 실시간 동기화 반영)
// 핸드피스 버전은 1.x 대역만 존재 (FW/UI의 2.x·3.x와 구분)
function getLastHpVer(name){
  var recs=HISTORY[name];
  if(!recs||!recs.length) return '';
  function pickHp(s){
    if(!s) return '';
    // (구버전→신버전) 패턴 중 신버전이 1.x인 것만
    var re=/(\d\.\d(?:\.\d)?)\s*(?:→|▶|->|~>)\s*(1\.\d(?:\.\d)?)/g, m, last='';
    while((m=re.exec(s))!==null){ last=m[2]; }
    if(last) return last;
    // HP 1.x.x 명시
    m=s.match(/HP\s*(1\.\d(?:\.\d)?)/);
    if(m) return m[1];
    return '';
  }
  for(var i=0;i<recs.length;i++){ // 이력은 최신순 정렬
    var r=recs[i];
    var pt=r.pt||'', p=r.p||'', fx=r.fx||'';
    var isHp=(pt.indexOf('핸드피스')>=0)||(p.indexOf('Handpiece')>=0)||(p.indexOf('HP')>=0)||(fx.indexOf('HP A')>=0)||(fx.indexOf('HP 교체')>=0)||(fx.indexOf('핸드피스')>=0&&fx.indexOf('교체')>=0);
    if(!isHp) continue;
    // p(부품) 먼저, 그 다음 fx(내용)
    var ver=pickHp(p) || pickHp(fx);
    if(ver) return ver;
  }
  return '';
}

// 각 병원의 마지막 UI 버전 추출 (FW는 제외, UI만)
// UI 버전은 2.x~3.x 대역, 'UI' 라벨로 FW와 구분
function getLastUiVer(name){
  var recs=HISTORY[name];
  if(!recs||!recs.length) return '';
  function pickUI(s){
    if(!s) return '';
    var re=/UI\s*\(?\s*(\d\.\d(?:\.\d+)?)\s*(?:→|▶|->|~>)\s*(\d\.\d(?:\.\d+)?)/g, m, last='';
    while((m=re.exec(s))!==null){ last=m[2]; }
    if(last) return last;
    var m2=s.match(/UI[\s\(]*(\d\.\d(?:\.\d+)?)/);
    if(m2) return m2[1];
    return '';
  }
  // 'x.x.0' 또는 'x.x.02' 같은 잘림은 'x.x'로 정규화
  function norm(v){ var m=v.match(/^(\d\.\d)(?:\.\d+)?$/); return m?m[1]:v; }
  // 1순위: sy(유형)에 업그레이드/UI 표기된 건
  for(var i=0;i<recs.length;i++){
    var sy=recs[i].sy||'', fx=recs[i].fx||'';
    if(sy.indexOf('업그레이드')>=0 || sy.indexOf('UI')>=0){
      var v=pickUI(fx); if(v) return norm(v);
    }
  }
  // 2순위: 아무 이력의 fx에서 UI 버전
  for(var i=0;i<recs.length;i++){
    var v=pickUI(recs[i].fx||''); if(v) return norm(v);
  }
  return '';
}

function loadKakao(cb){
  if(kakaoLoaded){ cb(); return; }
  if(!KAKAO_JS_KEY || KAKAO_JS_KEY.indexOf('__')===0){ cb(false); return; }
  const s=document.createElement('script');
  s.src='https://dapi.kakao.com/v2/maps/sdk.js?appkey='+KAKAO_JS_KEY+'&autoload=false&libraries=services';

// ===== 주소 → 좌표 지오코딩 (좌표 없는 병원 자동 보정) =====
// 병원정보DB에 주소는 있으나 좌표(lat/lng)가 없는 병원을 카카오 지오코더로 채운다.
// 결과는 주소 문자열 기준으로 localStorage 캐시(성공/실패 모두) → 재호출·쿼터 절약.
var GEO_CACHE_KEY='baz_geocache';
var geoCache=(function(){ try{ return JSON.parse(localStorage.getItem(GEO_CACHE_KEY)||'{}')||{}; }catch(e){ return {}; } })();
var geoRunning=false;
function geoSaveCache(){ try{ localStorage.setItem(GEO_CACHE_KEY, JSON.stringify(geoCache)); }catch(e){} }
function geocodeMissing(cb){
  if(geoRunning){ if(cb) cb(0); return; }
  var targets=HOSPITALS.filter(function(h){ return (h.lat==null||h.lng==null) && String(h.a||'').trim(); });
  if(!targets.length){ if(cb) cb(0); return; }
  // 1) 캐시(성공분) 먼저 적용
  var applied=0;
  targets.forEach(function(h){
    var c=geoCache[String(h.a).trim()];
    if(c && c.lat!=null){ h.lat=c.lat; h.lng=c.lng; applied++; }
  });
  // 캐시에 없는(성공/실패 모두 미기록) 주소만 실제 조회
  var remain=targets.filter(function(h){ return (h.lat==null||h.lng==null) && !(String(h.a).trim() in geoCache); });
  if(!remain.length){ if(cb) cb(applied); return; }
  geoRunning=true;
  loadKakao(function(ok){
    if(ok===false || typeof kakao==='undefined' || !kakao.maps || !kakao.maps.services){
      geoRunning=false; if(cb) cb(applied); return;
    }
    var geocoder=new kakao.maps.services.Geocoder();
    var i=0, filled=0;
    (function next(){
      if(i>=remain.length){ geoRunning=false; geoSaveCache(); if(cb) cb(applied+filled); return; }
      var h=remain[i++], addr=String(h.a).trim();
      // 같은 주소가 앞선 반복에서 이미 조회됨(중복 병원) → 캐시 재사용, 재호출 안 함
      if(addr in geoCache){
        var c=geoCache[addr];
        if(c && c.lat!=null){ h.lat=c.lat; h.lng=c.lng; filled++; }
        next(); return;
      }
      geocoder.addressSearch(addr, function(result, status){
        if(status===kakao.maps.services.Status.OK && result && result[0]){
          var la=parseFloat(result[0].y), ln=parseFloat(result[0].x);
          if(!isNaN(la)&&!isNaN(ln)){ h.lat=la; h.lng=ln; geoCache[addr]={lat:la,lng:ln}; filled++; }
          else { geoCache[addr]={lat:null,lng:null}; }
        } else {
          geoCache[addr]={lat:null,lng:null};   // 실패도 캐시(주소가 바뀌면 키가 달라져 재시도)
        }
        setTimeout(next, 130);   // 쿼터 보호용 throttle
      });
    })();
  });
}

// ===== 최근 처리 탭 =====
// HISTORY(병원별 처리 이력)를 날짜순으로 펼쳐 "오늘/이번주에 어느 병원이 어떻게 처리됐는지" 보여준다.
let rcRange = 1;        // 기본: 오늘 (오늘 기준 필터)
let rcFse = '';         // 처리자 필터 ('' = 전체)

// 병원명 → 영업담당 매핑 (HOSPITALS 기준)
function hospSalesMap(){
  const m = {};
  HOSPITALS.forEach(h=>{ if(h.n && !(h.n in m)) m[h.n] = h.sa || ''; });
  return m;
}

// 'yyyy-MM-dd' 안전 파싱 → Date(자정). 실패 시 null
function parseDateYMD(s){
  if(!s) return null;
  const m = String(s).match(/(\d{4})[-.\/](\d{1,2})[-.\/](\d{1,2})/);
  if(!m) return null;
  const d = new Date(+m[1], +m[2]-1, +m[3]);
  return isNaN(d) ? null : d;
}

// 최근 처리 집계에서 제외할 항목 (실제 병원이 아닌 데모/테스트 장비)
function rcIsExcluded(name){
  return /^데모/.test(name);   // "데모", "데모장비(...)" 등
}

// 모든 HISTORY 기록을 평탄화 (병원명 부착)
function flattenHistory(){
  const out = [];
  Object.keys(HISTORY).forEach(name=>{
    if(rcIsExcluded(name)) return;
    const recs = HISTORY[name];
    if(!Array.isArray(recs)) return;
    recs.forEach(r=>{
      const dt = parseDateYMD(r.d);
      if(!dt) return;
      out.push({ name:name, dt:dt, ds:r.d, rec:r });
    });
  });
  return out;
}

function renderRecent(){
  const wrap = document.getElementById('viewRecent');
  const now = new Date();
  const todayMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  // 기간 시작일 (rcRange일 전 자정). '오늘'은 rcRange=1 → 오늘 0시부터
  const startMid = new Date(todayMid);
  startMid.setDate(startMid.getDate() - (rcRange - 1));

  const salesMap = hospSalesMap();

  // 기간 내 기록 추출 + 처리자 필터
  let items = flattenHistory().filter(it => it.dt >= startMid && it.dt <= todayMid);
  if(rcFse) items = items.filter(it => (it.rec.f||'') === rcFse);

  // 날짜 내림차순 (같은 날은 병원명 가나다)
  items.sort((a,b)=> b.dt - a.dt || a.name.localeCompare(b.name,'ko'));

  // 처리자 목록 (필터 드롭다운용 — 현재 보이는 전체 기간 무관, 30일 내 등장한 처리자)
  const fseStartMid = new Date(todayMid); fseStartMid.setDate(fseStartMid.getDate()-29);
  const fseSet = {};
  flattenHistory().forEach(it=>{ if(it.dt>=fseStartMid && it.dt<=todayMid && it.rec.f) fseSet[it.rec.f]=(fseSet[it.rec.f]||0)+1; });
  const fseList = Object.keys(fseSet).sort((a,b)=>fseSet[b]-fseSet[a]);

  // 기간 선택 칩
  const ranges = [[1,'rcToday'],[7,'rc7'],[14,'rc14'],[30,'rc30']];
  let rangeHtml = '<div class="rc-range">';
  ranges.forEach(([d,key])=>{
    rangeHtml += '<button class="chip'+(rcRange===d?' on':'')+'" data-rcrange="'+d+'">'+t(key)+'</button>';
  });
  rangeHtml += '</div>';

  // 처리자 필터
  let fseHtml = '<div class="rc-fsefilter"><select id="rcFseSelect"><option value="">'+t('rcAllFse')+'</option>';
  fseList.forEach(f=>{ fseHtml += '<option value="'+escapeHtml(f)+'"'+(rcFse===f?' selected':'')+'>'+escapeHtml(f)+' ('+fseSet[f]+')</option>'; });
  fseHtml += '</select></div>';

  // 요약
  const hospCount = new Set(items.map(it=>it.name)).size;
  const summary = '<div class="rc-summary">'+t('rcCount').replace('{n}', items.length).replace('{h}', hospCount)+'</div>';

  let body = '';
  if(!items.length){
    body = '<div class="tl-empty">'+t('rcEmpty')+'</div>';
  } else {
    // 날짜별 그룹
    const groups = {};
    items.forEach(it=>{ (groups[it.ds] = groups[it.ds] || []).push(it); });
    const dates = Object.keys(groups).sort((a,b)=> b.localeCompare(a));

    dates.forEach(ds=>{
      const list = groups[ds];
      body += '<div class="rc-day">';
      body += '<div class="rc-dayhead"><span>'+escapeHtml(rcDateLabel(ds))+'</span><span class="rc-daycnt">'+list.length+rcUnit()+'</span></div>';
      list.forEach(it=>{
        const r = it.rec;
        const isInsp = (r.t === '점검');
        const typeLabel = isInsp ? t('rcInsp') : t('rcAS');
        const typeCls = isInsp ? '점검' : 'AS';
        const sym = [r.pt, r.sy].filter(Boolean).join(' · ');
        const fx = r.fx ? escapeHtml(r.fx) : (r.m ? escapeHtml(r.m) : '');
        const meta = [];
        if(r.f) meta.push(t('rcFse')+' '+escapeHtml(r.f));
        const sa = salesMap[it.name];
        if(sa && sa!=='장비OUT') meta.push(t('sales')+' '+escapeHtml(sa));
        if(r.pay) meta.push(escapeHtml(r.pay));
        let metaLine = meta.length ? '<span>'+meta.join('</span><span>')+'</span>' : '';
        if(r.p && r.p!=='없음') metaLine += '<span class="rc-part">🔧 '+escapeHtml(r.p)+'</span>';

        body += '<div class="rc-item" data-rchosp="'+escapeHtml(it.name)+'">'+
          '<div class="rc-item-top"><span class="rc-hname">'+escapeHtml(it.name)+'</span>'+
            '<span class="rc-type '+typeCls+'">'+typeLabel+'</span></div>'+
          (sym ? '<div class="rc-sym">'+escapeHtml(sym)+'</div>' : '')+
          (fx ? '<div class="rc-fx">'+fx+'</div>' : '')+
          (metaLine ? '<div class="rc-metaline">'+metaLine+'</div>' : '')+
        '</div>';
      });
      body += '</div>';
    });
  }

  wrap.innerHTML = rangeHtml + fseHtml + summary + body;
  bindRecent();
}

// 건수 단위 (언어별)
function rcUnit(){ return LANG==='ja' ? '件' : (LANG==='en' ? '' : '건'); }

// 날짜 라벨: 오늘/어제 표기 + 요일
function rcDateLabel(ds){
  const dt = parseDateYMD(ds);
  if(!dt) return ds;
  const now = new Date();
  const todayMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff = Math.round((todayMid - dt)/86400000);
  const wkKo=['일','월','화','수','목','금','토'];
  const wk = wkKo[dt.getDay()];
  const md = (dt.getMonth()+1)+'월 '+dt.getDate()+'일';
  if(LANG==='en'){
    const wkEn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const mdEn=(dt.getMonth()+1)+'/'+dt.getDate();
    if(diff===0) return 'Today · '+mdEn+' ('+wkEn[dt.getDay()]+')';
    if(diff===1) return 'Yesterday · '+mdEn+' ('+wkEn[dt.getDay()]+')';
    return mdEn+' ('+wkEn[dt.getDay()]+')';
  }
  if(LANG==='ja'){
    const wkJa=['日','月','火','水','木','金','土'];
    const mdJa=(dt.getMonth()+1)+'月'+dt.getDate()+'日';
    if(diff===0) return '今日 · '+mdJa+'('+wkJa[dt.getDay()]+')';
    if(diff===1) return '昨日 · '+mdJa+'('+wkJa[dt.getDay()]+')';
    return mdJa+'('+wkJa[dt.getDay()]+')';
  }
  if(diff===0) return '오늘 · '+md+' ('+wk+')';
  if(diff===1) return '어제 · '+md+' ('+wk+')';
  return md+' ('+wk+')';
}

function bindRecent(){
  const wrap = document.getElementById('viewRecent');
  wrap.querySelectorAll('[data-rcrange]').forEach(b=>{
    b.addEventListener('click', ()=>{ rcRange = parseInt(b.getAttribute('data-rcrange'),10); renderRecent(); });

  const sel = document.getElementById('rcFseSelect');
  if(sel) sel.addEventListener('change', ()=>{ rcFse = sel.value; renderRecent(); });
  // 카드 탭 → 해당 병원 이력 모달 열기

// ===== 현장 대응 가이드 검색 섹션 =====
// guide.html의 증상별 조치 데이터를 현장에서 즉시 검색 (신규/기존 이슈 판별의 출발점)
let guideQuery = '';
let guideCat = '';
let guideOpen = null;

function guideCats(){ return [...new Set(GUIDE_SYMS.map(s=>s.cat))]; }

function guideMatched(){
  const q = normalize(guideQuery);
  return GUIDE_SYMS.filter(s=>{
    if(guideCat && s.cat!==guideCat) return false;
    if(!q) return true;
    const hay = normalize(s.name+' '+s.cat+' '+(s.q||[]).join(' ')+' '+(s.check||[]).join(' ')+' '+(s.done||[]).join(' ')+' '+(s.tip||''));
    return hay.includes(q);
  });
}

// 검색창·카테고리는 한 번만 그리고, 결과 목록(#guideResults)만 갱신한다.
// (한글 IME 조합 중 전체 재렌더 시 자모가 분리되는 버그 방지)
function renderGuideSearch(){
  const cats = guideCats();
  let h = '<div class="dash-card" style="grid-column:1/-1;">';
  h += '<div class="dash-title">🔧 현장 대응 가이드 검색</div>';
  h += '<div style="font-size:12px;color:#6B7A99;margin:-2px 0 12px;">증상을 검색해 가이드에 있는지 확인하세요 · 가이드에 없거나 조치대로 해결되지 않으면 신규 이슈로 AS 보고서 작성 대상입니다</div>';
  // 검색창
  h += '<input id="guideQ" type="search" placeholder="증상 검색 (예: 누수, 출력, 풋스위치, RFID)" value="'+escapeHtml(guideQuery)+'" '+
       'style="width:100%;box-sizing:border-box;padding:10px 12px;border:1px solid #d8dee9;border-radius:10px;font-size:14px;margin-bottom:10px;">';
  // 카테고리 칩
  h += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">';
  h += '<button class="g-cat'+(guideCat===''?' on':'')+'" data-cat="" style="'+gCatStyle(guideCat==='')+'">전체</button>';
  cats.forEach(c=>{ h += '<button class="g-cat'+(guideCat===c?' on':'')+'" data-cat="'+escapeHtml(c)+'" style="'+gCatStyle(guideCat===c)+'">'+escapeHtml(c)+'</button>'; });
  h += '</div>';
  // 결과 컨테이너 (이 안만 갱신)
  h += '<div id="guideResults">'+renderGuideResults()+'</div>';
  h += '</div>';
  return h;
}

function renderGuideResults(){
  const matched = guideMatched();
  if(!matched.length){
    return '<div style="text-align:center;padding:24px;color:#9aa5b8;font-size:13px;">검색 결과가 없습니다. 가이드에 없는 증상이라면 신규 이슈일 수 있습니다.</div>';
  }
  let h = '<div style="display:flex;flex-direction:column;gap:8px;">';
  matched.forEach((s,i)=>{
    const open = (guideOpen===s.name);
    h += '<div style="border:1px solid #e6e9f0;border-radius:10px;overflow:hidden;">';
    h += '<button class="g-row" data-name="'+escapeHtml(s.name)+'" style="width:100%;text-align:left;background:'+(open?'#F1F6FB':'#fff')+';border:none;padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:8px;">';
    h += '<span style="font-size:11px;padding:2px 7px;border-radius:6px;background:#E6F1FB;color:#185FA5;flex:0 0 auto;">'+escapeHtml(s.cat)+'</span>';
    h += '<span style="font-weight:600;font-size:14px;color:#1B2F5E;flex:1;">'+escapeHtml(s.name)+'</span>';
    h += '<span style="color:#9aa5b8;font-size:12px;">'+(open?'▲':'▼')+'</span>';
    h += '</button>';
    if(open){ h += guideDetail(s); }
    h += '</div>';
  });
  h += '</div>';
  return h;
}

function gCatStyle(on){
  return 'font-size:12px;padding:5px 11px;border-radius:8px;cursor:pointer;border:1px solid '+(on?'#1B2F5E':'#d8dee9')+';background:'+(on?'#1B2F5E':'#fff')+';color:'+(on?'#fff':'#5a6478')+';';
}

function guideStep(title, arr, color){
  if(!arr || !arr.length) return '';
  let h = '<div style="margin-top:10px;"><div style="font-size:12px;font-weight:700;color:'+color+';margin-bottom:5px;">'+title+'</div>';
  h += arr.map(x=>'<div style="font-size:13px;line-height:1.55;color:#3a4456;white-space:pre-wrap;padding:7px 10px;background:#fafbfc;border-radius:8px;margin-bottom:5px;">'+escapeHtml(x)+'</div>').join('');
  h += '</div>';
  return h;
}

function guideDetail(s){
  let h = '<div style="padding:4px 14px 14px;border-top:1px solid #eef1f6;">';
  h += guideStep('① 증상 확인 (고객 질문)', s.q, '#185FA5');
  h += guideStep('② 점검·결과 안내', s.check, '#0F6E56');
  h += guideStep('③ 처리 안내', s.done, '#854F0B');
  if(s.tip){ h += '<div style="margin-top:10px;padding:9px 11px;background:#FFF6E5;border-radius:8px;font-size:12px;line-height:1.5;color:#7a5a12;">💡 '+escapeHtml(s.tip)+'</div>'; }
  return h+'</div>';
}

function bindGuideSearch(){
  const sec = document.getElementById('guideSection');
  if(!sec) return;
  const q = sec.querySelector('#guideQ');
  const results = sec.querySelector('#guideResults');

  // 결과 목록만 갱신 (검색창·칩은 그대로 두어 IME 조합 유지)
  function refreshResults(){
    if(results){ results.innerHTML = renderGuideResults(); bindGuideRows(); }
  }
  // 행(증상) 클릭 바인딩 — 결과 갱신 때마다 다시 연결
  function bindGuideRows(){
    sec.querySelectorAll('.g-row').forEach(b=>{
      b.addEventListener('click', ()=>{ const n=b.getAttribute('data-name'); guideOpen=(guideOpen===n)?null:n; refreshResults(); });
    });
  }

  if(q){
    let composing = false;
    q.addEventListener('compositionstart', ()=>{ composing = true; });
    q.addEventListener('compositionend', ()=>{ composing = false; guideQuery=q.value; refreshResults(); });
    q.addEventListener('input', ()=>{
      guideQuery = q.value;
      if(composing) return;     // 한글 조합 중에는 갱신하지 않음
      refreshResults();
    });
  }
  sec.querySelectorAll('.g-cat').forEach(b=>{
    b.addEventListener('click', ()=>{ guideCat = b.getAttribute('data-cat'); sec.innerHTML = renderGuideSearch(); bindGuideSearch(); });
  });
  bindGuideRows();
}

function renderHistBody(){
  const name = histCurName;
  const recs = HISTORY[name] || [];
  document.getElementById('histName').textContent = name;
  document.getElementById('histSub').textContent = t('histCount').replace('{n}', recs.length) + (histEditing?' · '+t('histEditMode'):'');
  const body = document.getElementById('histBody');

  if(histEditing){

    body.innerHTML = recs.map((r,i)=>histEditRow(r,i)).join('') || '<div class="tl-empty">'+t('histEmpty')+'</div>';
    return;
  }
  // 보기 모드
  if(!recs.length){
    body.innerHTML = '<div class="tl-empty">'+t('histEmpty')+'</div>';
  }else{
    body.innerHTML = recs.map(r=>{
      const isInsp = (r.t==='점검');
      const typeLabel = isInsp ? '점검' : 'A/S';
      const typeCls = isInsp ? '점검' : 'AS';

      const memo = r.m ? '<div class="tl-memo">'+escapeHtml(r.m)+'</div>' : '';
      const fix = r.fx ? '<div class="tl-memo" style="background:#EAF4F8;">↳ '+escapeHtml(r.fx)+'</div>' : '';
      let partLine='';

      if(r.f) meta.push(t('histFse')+' '+escapeHtml(r.f));
      if(r.pay) meta.push(escapeHtml(r.pay));
      const metaLine = meta.length ? '<div class="tl-meta">'+meta.join(' · ')+'</div>' : '';
      return '<div class="tl-item '+(isInsp?'':'as')+'">'+
        '<div class="tl-date">'+escapeHtml(r.d)+'<span class="tl-type '+typeCls+'">'+typeLabel+'</span></div>'+
        metaLine + symLine + memo + fix + partLine +
      '</div>';
    }).join('');
  }
}

function histEditRow(r,i){

      '<input type="text" data-f="f" placeholder="처리자" value="'+v(r.f)+'">'+
      '<input type="text" data-f="pay" placeholder="유/무상" value="'+v(r.pay)+'">'+
    '</div>'+
    '<textarea data-f="m" rows="2" placeholder="상세 내용">'+v(r.m)+'</textarea>'+
    '<textarea data-f="fx" rows="2" placeholder="처리 내용">'+v(r.fx)+'</textarea>'+
    '<input type="text" data-f="p" placeholder="교환품" value="'+v(r.p)+'">'+
    '<div style="text-align:right;"><button class="tl-edit-del" onclick="histDelRow('+i+')">🗑 삭제</button></div>'+
  '</div>';
}

// 편집 모드의 입력값을 HISTORY에 반영
function histCollectEdits(){
  const name = histCurName;
  const rows = document.querySelectorAll('#histBody .tl-edit');
  const newRecs=[];
  rows.forEach(row=>{
    const rec={};
    row.querySelectorAll('[data-f]').forEach(el=>{
      const f=el.getAttribute('data-f');
      const val=el.value.trim();
      if(val) rec[f]=val;
    });
    if(rec.d || rec.sy || rec.m) newRecs.push(rec);
  });
  // 날짜 내림차순 정렬
  newRecs.sort((a,b)=>(b.d||'').localeCompare(a.d||''));
  HISTORY[name]=newRecs;
}

function histDelRow(i){
  histCollectEdits();
  HISTORY[histCurName].splice(i,1);
  renderHistBody();
}

function histAddRow(){
  histCollectEdits();
  const today=new Date();
  const ds=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  if(!HISTORY[histCurName]) HISTORY[histCurName]=[];
  HISTORY[histCurName].unshift({d:ds, t:'A/S'});
  renderHistBody();
}

function histSaveEdits(){
  histCollectEdits();
  // localStorage에 편집된 병원만 저장 (전체 누적)
  try{
    let store={};
    const prev=localStorage.getItem('baz_hosp_history');
    if(prev) store=JSON.parse(prev);
    store[histCurName]=HISTORY[histCurName];
    localStorage.setItem('baz_hosp_history', JSON.stringify(store));
    histExitEdit();
    render(); // 카드 목록도 갱신 (이력 버튼 등)
    showHistToast(t('histSaved'));
  }catch(e){
    alert('저장 실패: '+e.message);
  }
}

function histExitEdit(){
  histEditing=false;

function showHistToast(msg){

// 🤖 AI 문의 버튼 → 현재 장비 정보·이력을 챗봇으로 전달
document.getElementById('histAiBtn').addEventListener('click', ()=>{
  const name = histCurName;
  if(!name) return;
  const hosp = HOSPITALS.find(h=>h.n===name) || {};
  const recs = (HISTORY[name] || []).slice(0, 12);  // 최근 12건만 전달

  // 이력을 챗봇이 읽는 최소 필드로 압축
  const slim = recs.map(r=>({
    d: r.d || '', sy: r.sy || '', fx: r.fx || '',
    p: r.p || '', pt: r.pt || ''
  }));

  // base64(JSON)로 인코딩 — 한글·특수문자 URL 안전 전달
  let ctxParam = '';
  try{
    ctxParam = btoa(unescape(encodeURIComponent(JSON.stringify(slim))));
  }catch(e){ ctxParam = ''; }

  const params = new URLSearchParams({
    hosp: name,
    serial: hosp.s || '',
    status: hosp.st || '',
    ncare: hosp.nc || '',
    pay: hosp.as || '',
    li: hosp.li || ''
  });
  if(ctxParam) params.set('ctx', ctxParam);

  location.href = 'chatbot.html?' + params.toString();
});

// 잠금 버튼 → 비밀번호 모달
document.getElementById('histLock').addEventListener('click', ()=>{
  if(histEditing){ histExitEdit(); return; }
  document.getElementById('histPwInput').value='';
  document.getElementById('histPwErr').textContent='';
  document.getElementById('histPwModal').classList.add('show');
  setTimeout(()=>document.getElementById('histPwInput').focus(),50);
});
async function histCheckPw(){
  const v=document.getElementById('histPwInput').value;
  if(!v) return;
  const okBtn=document.getElementById('histPwOk');
  const prev=okBtn.textContent;
  okBtn.disabled=true; okBtn.textContent='...';
  try{
    const r=await BazAuth.login(v);
    if(r.ok && r.level>=2){
      document.getElementById('histPwModal').classList.remove('show');
      histEnterEdit();
    }else if(r.ok && r.level<2){
      // 일반 비번으로는 편집 불가 (관리자 전용)
      document.getElementById('histPwErr').textContent=t('histWrongPw');
    }else if(r.error==='auth_url_missing'){
      document.getElementById('histPwErr').textContent='인증 서버 미설정 (auth.js의 AUTH_URL 입력)';
    }else if(r.error==='network'){
      document.getElementById('histPwErr').textContent='네트워크 오류. 연결을 확인해 주세요.';
    }else{
      document.getElementById('histPwErr').textContent=t('histWrongPw');
    }
  }finally{
    okBtn.disabled=false; okBtn.textContent=prev;
  }
}
