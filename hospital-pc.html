// ── 구글시트 동기화 (백그라운드, 안전모드) ──
(function(){
  var HOSPITAL_DB_URL='https://script.google.com/macros/s/AKfycbxmOwdE4ijr6KSxyaAJEuJhdJgLbUnZtFxVH535xbeuYwwoLK0FqXTAI_bI9pVYb2PW/exec';
  var VISIT_LOG_URL='https://script.google.com/macros/s/AKfycbyiQtaK1rWBVKQpGj2HVf8DUvryaXxmUYYAcixDlFo9nMAKytOOPnMTSzhD2Az2eVGl/exec';
  // ⬇️ 병원 점검 현황 → 이슈이력(HISTORY) 동기화 배포 URL
  var ISSUE_HIST_URL='https://script.google.com/macros/s/AKfycbxxUilWbM4DkNu_W8DBIXIyAQmPBexYrZjbL8E36XC7yl0DknCx_yI1Dm1LN4wtDiH5/exec';

  var ISSUE_CACHE_KEY='bazIssueHistCache';
  var ISSUE_CACHE_TS='bazIssueHistCacheTs';
  var ISSUE_CACHE_TTL=5*60*1000; // 5분

  // 시트 배열 변경으로 체크박스 값(true/false)이 유형·현상 자리에 섞여 오는 것 방어:
  // 불리언/'true'/'false' 값 필드는 버리고 나머지만 사용
  function cleanIssueRec(r){
    var out={};
    Object.keys(r||{}).forEach(function(k){
      var v=r[k];
      if(typeof v==='boolean') return;
      var s=String(v==null?'':v).trim();
      if(!s || /^(true|false)$/i.test(s)) return;
      out[k]=v;
    });
    return out;
  }

  // 시트 2026 이슈이력을 HISTORY에 병합 (2025 이력은 HTML 원본 유지)
  function applyIssueHist(data){
    if(!data || typeof data!=='object') return false;
    var names=Object.keys(data);
    if(!names.length) return false;
    names.forEach(function(name){
      if(!Array.isArray(data[name])) return;
      data[name]=data[name].map(cleanIssueRec);
      // 기존 HISTORY에서 2025년 이력만 보존
      var keep2025=(HISTORY[name]||[]).filter(function(r){
        return (r.d||'').indexOf('2025')===0;
      });
      // 시트는 2026 데이터 → 합치고 최신순 정렬
      var combined=keep2025.concat(data[name]);
      combined.sort(function(a,b){ return (b.d||'').localeCompare(a.d||''); });
      HISTORY[name]=combined;
    });
    // 현장 편집본 재적용
    try{
      var saved=localStorage.getItem('baz_hosp_history');
      if(saved){
        var edits=JSON.parse(saved);
        Object.keys(edits).forEach(function(n){ HISTORY[n]=edits[n]; });
      }
    }catch(e){}
    return true;
  }

  function refreshHistViews(){
    try{ if(typeof render==='function') render(); }catch(e){}
    try{ if(typeof renderRecent==='function' && curTab==='recent') renderRecent(); }catch(e){}
    try{
      var modal=document.getElementById('histModal');
      if(modal && modal.classList.contains('show') && typeof renderHistBody==='function'){
        renderHistBody();
      }
    }catch(e){}
  }

  function syncIssueHist(){
    if(ISSUE_HIST_URL.indexOf('여기에_')===0) return;

    // 1) 캐시 먼저 적용
    try{
      var cached=localStorage.getItem(ISSUE_CACHE_KEY);
      var ts=parseInt(localStorage.getItem(ISSUE_CACHE_TS)||'0',10);
      if(cached){
        if(applyIssueHist(JSON.parse(cached))){
          refreshHistViews();
          console.log('[이슈이력] 캐시 적용');
        }
      }
      if(cached && (Date.now()-ts)<ISSUE_CACHE_TTL){
        console.log('[이슈이력] 캐시 신선 — 동기화 생략');
        return;
      }
    }catch(e){ console.warn('[이슈이력] 캐시 읽기 오류(무시):',e); }

    // 2) 시트에서 최신 fetch
    fetch(ISSUE_HIST_URL,{method:'GET'})
      .then(function(r){return r.json();})
      .then(function(d){
        if(!d.success || !d.data){ console.warn('[이슈이력] 응답 형식 이상:',d); return; }
        try{
          localStorage.setItem(ISSUE_CACHE_KEY, JSON.stringify(d.data));
          localStorage.setItem(ISSUE_CACHE_TS, String(Date.now()));
        }catch(e){}
        if(applyIssueHist(d.data)){
          refreshHistViews();
          console.log('[이슈이력] '+Object.keys(d.data).length+'개 병원 동기화');
        }
      })
      .catch(function(e){ console.warn('[이슈이력] 읽기 실패:',e); });
  }
  syncIssueHist();

  // 날짜를 yyyy-MM-dd로 정규화 (깨진 형식 방어)
  function cleanDate(v){
    if(!v) return '';
    var s=String(v).trim();
    var m=s.match(/(\d{4})[-.\/](\d{1,2})[-.\/](\d{1,2})/);
    if(m) return m[1]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[3]).slice(-2);
    var d=new Date(s);
    if(!isNaN(d)) return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
    return '';
  }

  function applyDB(rows){
    if(!rows||!rows.length) return false;
    var updated=false;
    rows.forEach(function(r){
      if(!r.name) return;
      var h=HOSPITALS.find(function(x){return x.n===r.name;});
      if(h){
        if(r.sn)        h.s=r.sn;
        if(r.region)    h.rg=r.region;
        if(r.address)   h.a=r.address;
        if(r.lastVisit) h.li=cleanDate(r.lastVisit);
        if(r.status)    h.st=r.status;
        if(r.sales)     h.sa=r.sales;
        if(r.asType)    h.as=r.asType;
        if(r.ncare)     h.nc=r.ncare;
        if(r.hpVer)     h.hpv=r.hpVer;
        if(r.uiVer)     h.uiv=r.uiVer;
        updated=true;
      }else{
        HOSPITALS.push({
          n:r.name, s:r.sn||'', rg:r.region||'', a:r.address||'',
          li:cleanDate(r.lastVisit), st:r.status||'미점검', sa:r.sales||'',
          as:r.asType||'', nc:r.ncare||'미가입', d:r.client||'',
          hpv:r.hpVer||'', uiv:r.uiVer||'',
          lat:null, lng:null
        });
        updated=true;
      }
    });
    return updated;
  }

  // ── 병원정보DB 동기화 (5분 캐시) ──
  var HDB_CACHE_KEY='bazHospDBCache';
  var HDB_CACHE_TS='bazHospDBCacheTs';
  var HDB_CACHE_TTL=5*60*1000; // 5분

  function applyHospDB(rows){
    if(applyDB(rows)){
      populateFilters();
      updateStats(); render();
      if(curTab==='dash') renderDash();
      // DB로 주소가 채워졌을 수 있으니 좌표 없는 병원 지오코딩
      try{ if(typeof bazGeocodeRefresh==='function') bazGeocodeRefresh(); }catch(e){}
      return true;
    }
    return false;
  }

  function syncHospDB(){
    // 1) 캐시 먼저 적용 (즉시 반영)
    try{
      var cached=localStorage.getItem(HDB_CACHE_KEY);
      var ts=parseInt(localStorage.getItem(HDB_CACHE_TS)||'0',10);
      if(cached){
        var arr=JSON.parse(cached);
        if(arr && arr.length && applyHospDB(arr)){
          console.log('[병원정보DB] 캐시 적용 '+arr.length+'건');
        }
      }
      if(cached && (Date.now()-ts)<HDB_CACHE_TTL){
        console.log('[병원정보DB] 캐시 신선 — 동기화 생략');
        return;
      }
    }catch(e){ console.warn('[병원정보DB] 캐시 읽기 오류(무시):',e); }

    // 2) 시트에서 최신 fetch
    fetch(HOSPITAL_DB_URL,{method:'GET'})
      .then(function(r){return r.json();})
      .then(function(d){
        if(!d.success||!d.data||!d.data.length) return;
        try{
          localStorage.setItem(HDB_CACHE_KEY, JSON.stringify(d.data));
          localStorage.setItem(HDB_CACHE_TS, String(Date.now()));
        }catch(e){}
        try{
          if(applyHospDB(d.data)){
            console.log('[병원정보DB] '+d.data.length+'건 동기화');
          }
        }catch(e){ console.warn('[병원정보DB] 적용 오류(무시):',e); }
      })
      .catch(function(e){console.warn('[병원정보DB] 읽기 실패:',e);});
  }
  // 칩 필터(전체/N-CARE/점검필요) 활성화 시 재동기화 트리거용으로 노출 (5분 캐시 준수)
  window.refreshHospDB=syncHospDB;
  syncHospDB();

  // ── 방문로그 동기화 (5분 캐시) ──
  var VLOG_CACHE_KEY='bazVisitLogCache';
  var VLOG_CACHE_TS='bazVisitLogCacheTs';
  var VLOG_CACHE_TTL=5*60*1000;

  function applyVisits(visits){
    if(!visits) return false;
    var updated=false;
    HOSPITALS.forEach(function(h){
      var v=visits[h.n];
      if(v&&v.date&&cleanDate(v.date)>=(h.li||'')){ h.li=cleanDate(v.date); updated=true; }
    });
    if(updated){ updateStats(); render(); }
    return updated;
  }

  function syncVisitLog(){
    try{
      var cached=localStorage.getItem(VLOG_CACHE_KEY);
      var ts=parseInt(localStorage.getItem(VLOG_CACHE_TS)||'0',10);
      if(cached){ applyVisits(JSON.parse(cached)); }
      if(cached && (Date.now()-ts)<VLOG_CACHE_TTL){
        console.log('[방문로그] 캐시 신선 — 동기화 생략');
        return;
      }
    }catch(e){ console.warn('[방문로그] 캐시 읽기 오류(무시):',e); }

    fetch(VISIT_LOG_URL,{method:'GET'})
      .then(function(r){return r.json();})
      .then(function(d){
        if(!d.ok||!d.visits) return;
        try{
          localStorage.setItem(VLOG_CACHE_KEY, JSON.stringify(d.visits));
          localStorage.setItem(VLOG_CACHE_TS, String(Date.now()));
        }catch(e){}
        try{ applyVisits(d.visits); }
        catch(e){ console.warn('[방문로그] 적용 오류(무시):',e); }
      })
      .catch(function(e){console.warn('[방문로그] 읽기 실패:',e);});
  }
  syncVisitLog();

  // ── 수동 새로고침: 5분 캐시를 무시하고 모든 데이터를 강제 재동기화 ──
  window.bazRefreshAll=function(done){
    try{
      localStorage.removeItem(ISSUE_CACHE_TS);
      localStorage.removeItem(HDB_CACHE_TS);
      localStorage.removeItem(VLOG_CACHE_TS);
      localStorage.removeItem('baz_pc_recent_ts');
    }catch(e){}
    try{ syncHospDB(); }catch(e){}
    try{ syncIssueHist(); }catch(e){}
    try{ syncVisitLog(); }catch(e){}
    try{ if(typeof bazGeocodeRefresh==='function') bazGeocodeRefresh(); }catch(e){}
    // 최근 완료(handover) → 오늘 완료·이동시간 카드 갱신
    try{
      if(typeof pcLoadRecent==='function'){
        pcLoadRecent(function(){
          try{ if(typeof pcRenderRecentCard==='function') pcRenderRecentCard(); }catch(e){}
          try{ if(typeof pcRenderRouteCard==='function') pcRenderRouteCard(); }catch(e){}
          try{ if(typeof pcShowMap==='function' && typeof pcRightMode!=='undefined' && pcRightMode!=='detail') pcShowMap(pcList); }catch(e){}
        });
      }
    }catch(e){}
    if(typeof done==='function') setTimeout(done, 900);
  };
})();

// '진행중' 병원 상태 (병원명 → 담당자). 오늘 완료 후 이동/처리 진행상태 표시용
// (담당자는 없을 수 있음 '' — 우측 전체 카드에서 담당자 특정 없이 설정한 경우)
var pcInProgress=(function(){
  try{ localStorage.removeItem('baz_pc_inprogress'); }catch(e){}   // 구버전(fse→병원) 정리
  try{ return JSON.parse(localStorage.getItem('baz_pc_prog')||'{}')||{}; }catch(e){ return {}; }
})();
function pcSaveProg(){ try{ localStorage.setItem('baz_pc_prog', JSON.stringify(pcInProgress)); }catch(e){} }
function pcIsProg(hosp){ return Object.prototype.hasOwnProperty.call(pcInProgress, hosp); }
function pcProgHospOf(fse){ var r=''; Object.keys(pcInProgress).forEach(function(hn){ if(pcInProgress[hn]===fse) r=hn; }); return r; }
function pcSetProg(hosp, fse){
  fse=(fse||'').trim();
  if(fse){ Object.keys(pcInProgress).forEach(function(hn){ if(pcInProgress[hn]===fse) delete pcInProgress[hn]; }); } // 담당자당 1곳
  pcInProgress[hosp]=fse; pcSaveProg();
}
function pcClearProg(hosp){ delete pcInProgress[hosp]; pcSaveProg(); }
// 오늘 처리 담당자 목록 / 병원 담당자 추정 (우측 카드에서 담당자 미지정으로 설정 시)
function pcTodayFseList(){ var s={},o=[]; pcTodayList().forEach(function(r){ var f=(r.fse||'').trim(); if(f&&!s[f]){s[f]=1;o.push(f);} }); return o; }
function pcGuessFse(hosp){
  var t=pcTodayList(), k=normalize(hosp);
  for(var i=0;i<t.length;i++){ if(normalize(t[i].hosp)===k && (t[i].fse||'').trim()) return String(t[i].fse).trim(); }
  var fl=pcTodayFseList(); return fl.length===1?fl[0]:'';
}
// 진행중 변경 후 관련 화면 갱신
function pcRefreshProgViews(hosp){
  try{ pcRenderRouteCard(); }catch(e){}
  try{ pcRenderLeft(pcList); pcHighlight(); }catch(e){}
  try{ if(pcRightMode==='detail' && pcSelName) pcRenderDetail(pcSelName); }catch(e){}
  if(hosp && pcIsProg(hosp)){
    try{ if(typeof bazToast==='function') bazToast('진행중: '+hosp+(pcInProgress[hosp]?' ('+pcInProgress[hosp]+')':'')); }catch(e){}
  }
}
// 우측 전체 카드/상세용: 병원 기준 진행중 토글 (담당자 자동 추정)
function pcToggleProgHosp(hosp, fse){
  if(!hosp) return;
  if(pcIsProg(hosp)) pcClearProg(hosp);
  else pcSetProg(hosp, (fse!=null?fse:pcGuessFse(hosp)));
  pcRefreshProgViews(hosp);
}

function pcCardsHTML(list){
  return '<div class="pc-cards">'+ list.map(function(h){

// ===== 최근 완료(현장 처리) — handover 시트 기록 반영 =====
function pcHospByName(name){
  var k=normalize(name); if(!k) return null;
  for(var i=0;i<HOSPITALS.length;i++){ if(normalize(HOSPITALS[i].n)===k) return HOSPITALS[i]; }
  for(var j=0;j<HOSPITALS.length;j++){ var n=normalize(HOSPITALS[j].n); if(n && (n.indexOf(k)>=0||k.indexOf(n)>=0)) return HOSPITALS[j]; }
  return null;
}
function pcMergeRecent(rows){
  var seen={}, out=[];
  (rows||[]).forEach(function(r){
    var hosp=String(r.hosp||'').trim(); if(!hosp) return;
    var date=String(r.date||'').trim(), fse=String(r.fse||'').trim();
    var key=normalize(hosp)+'|'+date+'|'+normalize(fse);
    if(seen[key]) return; seen[key]=1;
    out.push({hosp:hosp, fse:fse, date:date, gubun:String(r.gubun||'').trim()});
  });
  out.sort(function(a,b){ return pcDateKey(b.date).localeCompare(pcDateKey(a.date)); });
  return out.slice(0,40);
}
function pcLocalRecent(){ try{ return JSON.parse(localStorage.getItem('baz_recent_handover')||'[]')||[]; }catch(e){ return []; } }
function pcLoadRecent(cb){
  var local=pcLocalRecent();
  var cached=null, ts=parseInt(localStorage.getItem('baz_pc_recent_ts')||'0',10);
  try{ cached=JSON.parse(localStorage.getItem('baz_pc_recent_cache')||'null'); }catch(e){}
  if(cached && cached.length){ pcRecent=pcMergeRecent(local.concat(cached)); pcRecentState='done'; if(cb) cb(); }
  else if(local.length){ pcRecent=pcMergeRecent(local); if(cb) cb(); }
  if(cached && (Date.now()-ts)<5*60*1000) return;      // 5분 캐시 신선
  if(!HANDOVER_URL){ if(!pcRecent.length){ pcRecentState='done'; } return; }
  if(pcRecentState!=='done') pcRecentState='loading';
  fetch(HANDOVER_URL+'?action=all',{method:'GET'})
    .then(function(r){ return r.json(); })
    .then(function(d){
      var data=(d&&d.data)||[];
      pcRecent=pcMergeRecent(pcLocalRecent().concat(data));
      pcRecentState='done';
      try{ localStorage.setItem('baz_pc_recent_cache', JSON.stringify(pcRecent)); localStorage.setItem('baz_pc_recent_ts', String(Date.now())); }catch(e){}
      if(cb) cb();
    })
    .catch(function(){ pcRecentState=pcRecent.length?'done':'error'; if(cb) cb(); });
}
function pcTodayStr(){
  var d=new Date(), z=function(n){return (n<10?'0':'')+n;};
  return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());
}
// 시트 표시형식(getDisplayValues)이 'yyyy. M. d' 등 로케일 형태로 오므로
// 구분자·공백에 상관없이 yyyy-MM-dd 키로 정규화 (handover 날짜 매칭 안정화)
function pcDateKey(s){
  if(!s) return '';
  var m=String(s).match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
  if(!m) return '';
  return m[1]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[3]).slice(-2);
}
function pcTodayList(){
  var today=pcTodayStr();
  return pcRecent.filter(function(r){ return pcDateKey(r.date)===today; });
}

// ===== 주변 병원 이동 소요시간 카드 =====
// 오늘 완료한 FSE 담당자별로, 가장 최근 처리 병원 위치 기준 가까운 병원 최대 3곳 + 예상 이동시간
function pcEstMin(km){ return Math.max(1, Math.round(km * 2.6)); }  // 도로계수 1.3 · 평균 30km/h 추정
function pcNearestHospitals(from, n){
  var out=[];
  for(var i=0;i<HOSPITALS.length;i++){
    var h=HOSPITALS[i];
    if(h.lat==null||h.lng==null) continue;
    if(h.n===from.n) continue;
    if(/^데모/.test(h.n)) continue;
    if(!isNcare(h)) continue;   // N-CARE 가입 병원만 (미가입 제외)
    out.push({h:h, d:distKm(from.lat,from.lng,h.lat,h.lng)});
  }
  out.sort(function(a,b){ return a.d-b.d; });
  return out.slice(0,n);
}
function pcRenderRouteCard(){
  var box=document.getElementById('pcRouteCard'); if(!box) return;
  var head='<div class="prc-head">🚗 주변 이동 소요시간 <span class="prc-sub">오늘 기준</span></div>';
  var today=pcTodayList();
  // FSE 담당자별 '가장 최근' 오늘 완료 병원.
  // handover는 시트 하단에 append(오래된→최신)되어 pcTodayList도 오래된→최신 순 →
  // 마지막(최신)이 이기도록 덮어쓴다. 좌표가 없어도 '현재'는 최신 완료를 표시하고,
  // 주변 병원 계산은 좌표가 있을 때만 수행한다.
  var curByFse={}, order=[];
  today.forEach(function(r){
    var fse=String(r.fse||'').trim(); if(!fse) return;
    var name=String(r.hosp||'').trim(); if(!name) return;
    if(!(fse in curByFse)) order.push(fse);
    var h=pcHospByName(name);
    curByFse[fse]={ name:name, from:(h&&h.lat!=null&&h.lng!=null)?h:null };   // 최신으로 갱신
  });
  if(!order.length){
    var msg=(pcRecentState==='loading')?'불러오는 중…':'오늘 완료 내역이 없습니다';
    box.innerHTML=head+'<div class="prc-empty">'+msg+'</div>'; return;
  }
  box.innerHTML=head+order.map(function(fse){
    var cur=curByFse[fse];
    var prog=pcProgHospOf(fse);   // 이 담당자의 진행중 병원
    var fseAttr=escapeHtml(fse);
    var body;
    if(cur.from){
      var near=pcNearestHospitals(cur.from, 3);
      body = near.length ? near.map(function(x,i){
        var on=(prog===x.h.n);
        return '<div class="prc-item'+(on?' prog':'')+'" data-hn="'+escapeHtml(x.h.n)+'">'+
          '<span class="prc-rank">'+(i+1)+'</span>'+
          '<span class="prc-nm">'+escapeHtml(x.h.n)+'</span>'+
          '<span class="prc-dt">'+x.d.toFixed(1)+'km · 약 '+pcEstMin(x.d)+'분</span>'+
          '<button class="prc-prog" data-fse="'+fseAttr+'" data-hn="'+escapeHtml(x.h.n)+'" title="진행중으로 표시">'+(on?'진행중':'진행')+'</button>'+
        '</div>';
      }).join('') : '<div class="prc-empty" style="padding:2px 6px;">주변 N-CARE 병원 없음</div>';
    } else {
      body = '<div class="prc-empty" style="padding:2px 6px;">📍 좌표 미등록 병원 — 주변 이동 계산 불가</div>';
    }
    var progLine = prog ? '<div class="prc-prog-cur" data-fse="'+fseAttr+'" data-hn="'+escapeHtml(prog)+'">🔵 진행중 · '+escapeHtml(prog)+'</div>' : '';
    return '<div class="prc-fse">'+
      '<div class="prc-fse-h">🧑‍🔧 '+escapeHtml(fse)+'<span class="prc-cur">현재 '+escapeHtml(cur.name)+'</span></div>'+
      progLine+
      body+
    '</div>';
  }).join('');
}
// 담당자별 진행중 병원 토글 (주변 이동 소요시간 카드에서 주변 병원 선택 → 진행상태)
function pcToggleInProgress(fse, hosp){
  if(!fse||!hosp) return;
  if(pcProgHospOf(fse)===hosp) pcClearProg(hosp);
  else pcSetProg(hosp, fse);
  pcRefreshProgViews(hosp);
  if(pcIsProg(hosp)){ try{ pcFocusHospOnMap(hosp, null); }catch(e){} }
}

      var h=pcHospByName(r.hosp); if(!h||h.lat==null||h.lng==null) return;
      var pos=new kakao.maps.LatLng(h.lat,h.lng);
      var el=document.createElement('div'); el.className='pc-cmk';
      el.innerHTML='<span class="dot"></span><span class="lb">'+escapeHtml(r.fse||r.hosp)+'</span>';
      (function(hn){ el.addEventListener('click',function(){ pcFocusHospOnMap(hn,null); }); })(h.n);
      var ov=new kakao.maps.CustomOverlay({position:pos, content:el, yAnchor:1, zIndex:6});
      ov.setMap(pcMapObj); pcRecentOverlays.push(ov);
      bounds.extend(pos); any=true;
    });
    // 병원명 검색 중 → 검색된 병원 반경 5km 주변 병원도 함께 표시
    pcNearbyOverlays.forEach(function(o){o.setMap(null);}); pcNearbyOverlays=[];
    var nearCnt=0;
    if(searchQ && list.length){
      var inList={}; list.forEach(function(h){ inList[h.n]=1; });
      HOSPITALS.forEach(function(o){
        if(o.lat==null||o.lng==null||inList[o.n]) return;
        var isNear=false;
        for(var i=0;i<list.length;i++){ var b=list[i]; if(b.lat==null) continue;
          if(distKm(b.lat,b.lng,o.lat,o.lng)<=5){ isNear=true; break; } }
        if(!isNear) return;
        var npos=new kakao.maps.LatLng(o.lat,o.lng);
        var nel=document.createElement('div'); nel.className='pc-nmk'; nel.title=o.n;
        (function(nm){ nel.addEventListener('click',function(){ pcSelect(nm); }); })(o.n);
        var nov=new kakao.maps.CustomOverlay({position:npos, content:nel, yAnchor:0.5, xAnchor:0.5, zIndex:3});
        nov.setMap(pcMapObj); pcNearbyOverlays.push(nov);
        bounds.extend(npos); any=true; nearCnt++;
      });
    }
    if(pcRightMode==='map'){
      var rtl=document.getElementById('pcRightTtl');
      if(rtl) rtl.textContent = nearCnt ? ('🗺 지도 · 주변 5km '+nearCnt+'곳') : '🗺 지도';
    }
    if(any) pcMapObj.setBounds(bounds);
    setTimeout(function(){ if(pcMapObj){ pcMapObj.relayout(); if(any) pcMapObj.setBounds(bounds); } },120);
  });
}

function pcSelect(name){
  pcSelName=name; pcRightMode='detail';
  var r=document.getElementById('pcRight'); if(r) r.classList.add('detail');
  var bm=document.getElementById('pcBackMap'); if(bm) bm.style.display='';
  var tl=document.getElementById('pcRightTtl'); if(tl) tl.textContent=name;
  pcRenderDetail(name);
  pcHighlight();
  var body=document.getElementById('pcDetail'); if(body) body.scrollTop=0;
}
window.pcSelect=pcSelect;

function pcBackToMap(){
  pcRightMode='map';
  var r=document.getElementById('pcRight'); if(r) r.classList.remove('detail');
  var bm=document.getElementById('pcBackMap'); if(bm) bm.style.display='none';
  var tl=document.getElementById('pcRightTtl'); if(tl) tl.textContent='🗺 지도';
  pcShowMap(pcList||[]);
}

function pcRender(list){
  pcList=list||[];
  pcEnsureDOM();
  document.querySelectorAll('#pcViewToggle button').forEach(function(b){ b.classList.toggle('on', b.dataset.view===pcListView); });
  // 담당자 오늘 완료 데이터(첫 진입 시 로드) + 좌측 카드 렌더
  if(!pcRecentRequested){
    pcRecentRequested=true;
    pcLoadRecent(function(){ pcRenderRecentCard(); pcRenderRouteCard(); if(pcRightMode!=='detail') pcShowMap(pcList); });
  }
  pcRenderRecentCard();
  pcRenderRouteCard();
  pcRenderLeft(pcList);
  if(pcRightMode==='detail' && pcSelName){
    var tl=document.getElementById('pcRightTtl'); if(tl) tl.textContent=pcSelName;
    var bm=document.getElementById('pcBackMap'); if(bm) bm.style.display='';
    document.getElementById('pcRight').classList.add('detail');
    pcRenderDetail(pcSelName);
  } else {
    var tl2=document.getElementById('pcRightTtl'); if(tl2) tl2.textContent='🗺 지도';
    var bm2=document.getElementById('pcBackMap'); if(bm2) bm2.style.display='none';
    document.getElementById('pcRight').classList.remove('detail');
    pcShowMap(pcList);
  }
  pcHighlight();
}
window.pcRender=pcRender;

// ===== 헤더 높이 → 필터 sticky 오프셋(--hdr-h) =====
function pcSetHdrH(){ var h=document.querySelector('header'); if(h) document.documentElement.style.setProperty('--hdr-h', h.offsetHeight+'px'); }
pcSetHdrH();
window.addEventListener('resize', pcSetHdrH);
window.addEventListener('load', pcSetHdrH);

// ===== 화면 모드 (Window / Mobile) =====
(function(){
  var KEY='baz_viewmode';
  function apply(mode){
    document.body.classList.toggle('mode-window', mode==='window');
    document.body.classList.toggle('mode-mobile', mode==='mobile');
    try{ pcSetHdrH(); }catch(e){}
    var tg=document.getElementById('modeToggle');
    if(tg) tg.querySelectorAll('button').forEach(function(b){ b.classList.toggle('on', b.dataset.mode===mode); });
    // 레이아웃 전환 → 목록 재렌더 (mobile ↔ window)
    try{ if(typeof render==='function' && curTab==='list') render(); }catch(e){}
    // 카카오맵이 떠 있으면 넓이 변경 반영
    try{ if(typeof mapObj!=='undefined' && mapObj && mapObj.relayout){ setTimeout(function(){ mapObj.relayout(); }, 200); } }catch(e){}
    try{ if(pcMapObj && pcMapObj.relayout){ setTimeout(function(){ pcMapObj.relayout(); }, 220); } }catch(e){}
  }
  function get(){
    var saved=localStorage.getItem(KEY);
    if(saved==='window'||saved==='mobile') return saved;
    return (window.matchMedia && window.matchMedia('(min-width:900px)').matches) ? 'window' : 'mobile';
  }
  var cur=get(); apply(cur);
  var tg=document.getElementById('modeToggle');
  if(tg) tg.addEventListener('click', function(e){
    var btn=e.target.closest('button[data-mode]'); if(!btn) return;
    cur=btn.dataset.mode; localStorage.setItem(KEY, cur); apply(cur);
  });
})();

</script>
