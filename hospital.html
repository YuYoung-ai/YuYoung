<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BAZ BIOMEDIC — 병원 데이터 센터</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2F5E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BAZ CS">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --navy:#1B2F5E; --navy2:#16264D; --teal:#2E7D9E; --teal-soft:#EAF4F8;
    --gray-bg:#F5F7FA; --gray-line:#DDE3EE; --text:#1A1A2E; --text-muted:#6B7A99;
    --red:#C0392B; --green:#1E7E4E; --amber:#B8860B; --purple:#534AB7;
    --st-normal:#1E7E4E; --st-target:#2E7D9E; --st-warn:#B8860B; --st-danger:#C0392B; --st-none:#6B7A99;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--gray-bg);color:var(--text);-webkit-text-size-adjust:100%;padding-bottom:24px;}
  .wrap{max-width:560px;margin:0 auto;}

  header{background:var(--navy);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  header .logo-area{display:flex;align-items:center;gap:10px;min-width:0;}
  header .logo-area svg{width:32px;height:32px;flex:0 0 auto;}
  header h1{color:#CADCFC;font-size:15px;font-weight:700;letter-spacing:.03em;}
  header .subtitle{color:rgba(202,220,252,.65);font-size:11px;margin-top:1px;}
  .home-link{background:rgba(202,220,252,.15);border:1px solid rgba(202,220,252,.4);color:#CADCFC;
    font-size:11px;font-weight:700;padding:6px 11px;border-radius:16px;text-decoration:none;white-space:nowrap;}
  .hublang{display:flex;gap:2px;background:rgba(255,255,255,.08);border-radius:8px;padding:2px;margin-left:8px;}
  .hublang button{background:transparent;border:none;color:#cfdbf0;font-size:11px;font-weight:700;
    padding:4px 7px;border-radius:6px;cursor:pointer;font-family:inherit;}

  .body{padding:14px;}

  /* 탭 */
  .tabs{display:flex;gap:6px;margin-bottom:14px;background:#fff;border:1px solid var(--gray-line);border-radius:12px;padding:4px;}
  .tab{flex:1;text-align:center;padding:9px 6px;border-radius:9px;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;border:none;background:transparent;font-family:inherit;}
  .tab.on{background:var(--navy);color:#fff;}

  /* 검색 */
  .search-wrap{position:relative;margin-bottom:12px;}
  .search-wrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--text-muted);pointer-events:none;}
  #searchInput{width:100%;border:1.5px solid var(--gray-line);border-radius:10px;padding:13px 13px 13px 40px;
    font-size:16px;font-family:inherit;color:var(--text);background:#fff;outline:none;}
  #searchInput:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(46,125,158,.12);}
  .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--gray-line);
    border:none;border-radius:50%;width:22px;height:22px;font-size:13px;color:#fff;cursor:pointer;display:none;line-height:1;}

  /* 근처 조회 */
  .nearby-btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--teal),var(--navy));
    color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .nearby-btn:active{opacity:.9;}
  .nearby-btn.active{background:linear-gradient(135deg,#8A5FC0,#534AB7);}
  .nearby-status{font-size:11px;color:var(--text-muted);text-align:center;margin:-6px 0 12px;line-height:1.5;display:none;}

  /* 지도 */
  #mapBox{width:100%;height:340px;border-radius:12px;overflow:hidden;border:1px solid var(--gray-line);margin-bottom:12px;display:none;background:#E9EEF3;}

  /* 필터 */
  .filter-section{margin-bottom:12px;}
  .filter-label{font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px;padding-left:2px;}
  .filter-row{display:flex;gap:7px;flex-wrap:wrap;}
  .chip{border:1.5px solid var(--gray-line);background:#fff;color:var(--text-muted);font-size:12px;font-weight:600;
    padding:7px 12px;border-radius:18px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap;}
  .chip.on{border-color:var(--teal);background:var(--teal-soft);color:var(--navy);}
  .chip .cnt{font-size:10px;opacity:.7;}
  .chip.sm{padding:6px 10px;font-size:11px;}

  select.flt{border:1.5px solid var(--gray-line);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:var(--text);background:#fff;outline:none;width:100%;}
  select.flt:focus{border-color:var(--teal);}

  /* 통계 */
  .stats{display:flex;gap:8px;margin-bottom:12px;}
  .stats .s{flex:1;background:#fff;border:1px solid var(--gray-line);border-radius:10px;padding:9px 6px;text-align:center;}
  .stats .num{font-size:18px;font-weight:800;}
  .stats .lbl{font-size:10px;color:var(--text-muted);margin-top:1px;}

  .result-count{font-size:12px;color:var(--text-muted);margin-bottom:10px;padding-left:2px;}
  .result-count b{color:var(--navy);}

  /* 병원 카드 */
  .h-card{background:#fff;border:1px solid var(--gray-line);border-radius:12px;padding:13px 14px;margin-bottom:10px;}
  .h-card.urgent{border:1.5px solid #E59A9A;background:#FEF8F8;}
  .h-card.soon{border:1.5px solid #E8C98A;}
  .h-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
  .h-name{font-size:15px;font-weight:700;color:var(--navy);line-height:1.35;}
  .h-dist{font-size:11px;color:#8A5FC0;font-weight:700;margin-top:2px;display:none;}
  .h-dist.show{display:block;}
  .st-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;white-space:nowrap;flex:0 0 auto;}
  .st-badge.정상{background:#E8F5EE;color:var(--st-normal);}
  .st-badge.점검대상{background:var(--teal-soft);color:var(--st-target);}
  .st-badge.권고{background:#FBF3E0;color:var(--st-warn);}
  .st-badge.경고{background:#FBEAE8;color:var(--st-danger);}
  .st-badge.미점검{background:#EEF0F4;color:var(--st-none);}
  .st-badge.비대상{background:#F0F0F2;color:#9AA3B2;font-weight:600;}

  .warn-tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;margin-top:6px;}
  .warn-tag.over{background:#FBEAE8;color:var(--red);}
  .warn-tag.near{background:#FBF3E0;color:var(--amber);}

  .h-meta{font-size:12.5px;color:var(--text-muted);line-height:1.7;}
  .h-meta .line{display:flex;align-items:flex-start;gap:6px;}
  .h-meta .ico{font-size:13px;flex:0 0 auto;margin-top:2px;}

  .h-tags{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;}
  .h-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:7px;}
  .h-tag.ncare{background:var(--teal-soft);color:#0C447C;}
  .h-tag.ncare.none{background:#EEF0F4;color:var(--text-muted);}
  .h-tag.as{background:var(--gray-bg);color:var(--text-muted);}
  .h-tag.sales{background:#F3EEFA;color:#534AB7;}

  .h-actions{display:flex;gap:6px;margin-top:11px;}
  .h-actions button{flex:1;font-size:12px;font-weight:700;padding:9px 6px;border-radius:8px;cursor:pointer;font-family:inherit;border:1.5px solid var(--gray-line);background:#fff;color:var(--navy);display:flex;align-items:center;justify-content:center;gap:4px;}
  .h-actions button:active{background:var(--gray-bg);}
  .h-actions .nmap{border-color:#03C75A;color:#03C75A;}
  .h-actions .insp{border-color:var(--navy);background:var(--navy);color:#fff;}
  .h-actions .surv{border-color:var(--teal);color:var(--teal);}

  .empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px;line-height:1.7;}
  .empty .ico{font-size:40px;margin-bottom:10px;opacity:.4;}
  .load-more{width:100%;padding:12px;border:1.5px solid var(--gray-line);background:#fff;color:var(--text-muted);
    font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;font-family:inherit;margin-top:4px;}

  /* 대시보드 */
  .dash-card{background:#fff;border:1px solid var(--gray-line);border-radius:12px;padding:16px;margin-bottom:12px;}
  .dash-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bar-label{font-size:12px;color:var(--text);width:64px;flex:0 0 auto;}
  .bar-track{flex:1;height:22px;background:var(--gray-bg);border-radius:6px;overflow:hidden;position:relative;}
  .bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11px;font-weight:700;min-width:28px;}
  .donut-wrap{display:flex;align-items:center;gap:18px;}
  .legend{flex:1;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:7px;}
  .legend-dot{width:11px;height:11px;border-radius:3px;flex:0 0 auto;}
  .legend-val{margin-left:auto;font-weight:700;color:var(--navy);}

  /* 이력 버튼 */
  .h-actions .hist{border-color:#8A5FC0;color:#8A5FC0;}
  /* 이력 모달 */
  #histModal{position:fixed;inset:0;background:rgba(16,29,61,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
  #histModal.show{display:flex;}
  .hist-sheet{background:#fff;width:100%;max-width:560px;max-height:86vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;animation:slideUp .25s ease;}
  @keyframes slideUp{from{transform:translateY(40px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
  .hist-head{padding:16px 18px 12px;border-bottom:1px solid var(--gray-line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex:0 0 auto;}
  .hist-head .hn{font-size:16px;font-weight:700;color:var(--navy);line-height:1.35;}
  .hist-head .hsub{font-size:12px;color:var(--text-muted);margin-top:3px;}
  .hist-close{background:var(--gray-bg);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;color:var(--text-muted);cursor:pointer;flex:0 0 auto;}
  .hist-body{overflow-y:auto;padding:16px 18px 24px;}
  .tl-item{position:relative;padding-left:22px;padding-bottom:18px;}
  .tl-item:before{content:'';position:absolute;left:5px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--teal);border:2px solid #fff;box-shadow:0 0 0 1.5px var(--teal);}
  .tl-item.as:before{background:#8A5FC0;box-shadow:0 0 0 1.5px #8A5FC0;}
  .tl-item:after{content:'';position:absolute;left:9px;top:16px;bottom:0;width:1.5px;background:var(--gray-line);}
  .tl-item:last-child:after{display:none;}
  .tl-date{font-size:13px;font-weight:700;color:var(--navy);}
  .tl-type{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:5px;margin-left:6px;vertical-align:1px;}
  .tl-type.점검{background:var(--teal-soft);color:var(--teal);}
  .tl-type.AS{background:#F3EEFA;color:#8A5FC0;}
  .tl-meta{font-size:12px;color:var(--text-muted);margin-top:3px;line-height:1.6;}
  .tl-cat{display:inline-block;font-size:11px;font-weight:600;color:#534AB7;background:#F3EEFA;padding:2px 8px;border-radius:6px;margin-top:5px;}
  .tl-memo{font-size:12.5px;color:var(--text);margin-top:6px;line-height:1.55;background:var(--gray-bg);border-radius:8px;padding:8px 10px;}
  .tl-part{font-size:11.5px;color:var(--text-muted);margin-top:5px;}
  .tl-empty{text-align:center;color:var(--text-muted);font-size:13px;padding:30px 0;}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="logo-area">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="18" fill="#16264D"/><text x="50" y="58" font-family="Georgia,serif" font-size="42" font-weight="700" fill="#9EB4E0" text-anchor="middle">baz</text></svg>
    <div>
      <h1 id="hdrTitle">병원 데이터 센터</h1>
      <div class="subtitle" id="hdrSub">검색 · 점검현황 · 근처 N-CARE</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;">
    <a href="index.html" class="home-link" id="homeLink">메뉴</a>
    <div class="hublang" id="langSwitch">
      <button data-lang="ko">KO</button><button data-lang="en">EN</button><button data-lang="ja">JA</button>
    </div>
  </div>
</header>

<div class="body">
  <div class="tabs">
    <button class="tab on" data-tab="list" id="tabList">병원 조회</button>
    <button class="tab" data-tab="dash" id="tabDash">점검 현황</button>
  </div>

  <!-- ===== 조회 탭 ===== -->
  <div id="viewList">
    <div class="search-wrap">
      <span class="ico">🔍</span>
      <input type="text" id="searchInput" placeholder="병원명 검색..." autocomplete="off">
      <button class="search-clear" id="searchClear">✕</button>
    </div>

    <button class="nearby-btn" id="nearbyBtn">
      <span>📍</span><span id="nearbyLabel">내 주변 5km N-CARE 병원 조회</span>
    </button>
    <div class="nearby-status" id="nearbyStatus"></div>
    <div id="mapBox"></div>

    <div class="filter-section">
      <div class="filter-row" id="filterRow">
        <button class="chip on" data-filter="all">전체 <span class="cnt" id="cnt-all"></span></button>
        <button class="chip" data-filter="ncare">N-CARE <span class="cnt" id="cnt-ncare"></span></button>
        <button class="chip" data-filter="due">점검필요 <span class="cnt" id="cnt-due"></span></button>
      </div>
    </div>

    <div class="filter-section" id="advFilters">
      <div style="display:flex;gap:8px;">
        <select class="flt" id="salesFilter"><option value="">전체 영업담당</option></select>
        <select class="flt" id="regionFilter"><option value="">전체 지역</option></select>
      </div>
    </div>

    <div class="stats" id="stats"></div>
    <div class="result-count" id="resultCount"></div>
    <div id="cardList"></div>
    <button class="load-more" id="loadMore" style="display:none;">더 보기</button>
  </div>

  <!-- ===== 대시보드 탭 ===== -->
  <div id="viewDash" style="display:none;"></div>
</div>
</div>

<!-- 점검 이력 모달 -->
<div id="histModal">
  <div class="hist-sheet">
    <div class="hist-head">
      <div style="min-width:0;">
        <div class="hn" id="histName"></div>
        <div class="hsub" id="histSub"></div>
      </div>
      <button class="hist-close" id="histClose">✕</button>
    </div>
    <div class="hist-body" id="histBody"></div>
  </div>
</div>

    bNormal:'正常(~30日)', bTarget:'点検対象', bRec:'勧告', bWarn:'警告', bNone:'未点検' },

// ===== 유틸 =====
function normalize(s){ return (s||'').toLowerCase().replace(/\s+/g,''); }
function isNcare(h){ return h.nc && h.nc!=='미가입'; }
function isDue(h){ return isNcare(h) && ['점검대상','권고','경고','미점검'].includes(h.st); }
function daysSince(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr.replace(/\./g,'-').replace(/\s/g,''));
  if(isNaN(d)) return null;
  return Math.floor((TODAY-d.getTime())/86400000);
}
function distKm(lat1,lng1,lat2,lng2){
  const R=6371, toR=x=>x*Math.PI/180;
  const dLat=toR(lat2-lat1), dLng=toR(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// N-CARE 점검 경과 위험도: over(90일초과/미점검), near(60~90), null
function dueLevel(h){
  if(!isNcare(h)) return null;
  if(h.st==='미점검') return 'over';
  const dd=daysSince(h.li);
  if(dd==null) return 'over';
  if(dd>90) return 'over';
  if(dd>60) return 'near';
  return null;
}

// ===== 필터링 =====
function getFiltered(){
  let list=HOSPITALS.slice();
  if(nearbyMode && myPos){
    list=list.filter(h=>isNcare(h)&&h.lat!=null)
      .map(h=>({...h,_dist:distKm(myPos.lat,myPos.lng,h.lat,h.lng)}))
      .filter(h=>h._dist<=5).sort((a,b)=>a._dist-b._dist);
    return list;
  }
  if(curFilter==='ncare') list=list.filter(isNcare);
  else if(curFilter==='due') list=list.filter(isDue);
  if(salesFilter) list=list.filter(h=>h.sa===salesFilter);
  if(regionFilter) list=list.filter(h=>h.rg===regionFilter);
  if(searchQ){
    const nq=normalize(searchQ);
    list=list.filter(h=>normalize(h.n).includes(nq)||normalize(h.a).includes(nq)||normalize(h.s).includes(nq));
  }
  const stOrder={'미점검':0,'경고':1,'권고':2,'점검대상':3,'정상':4};
  list.sort((a,b)=>{
    const na=isNcare(a), nb=isNcare(b);
    if(na!==nb) return na?-1:1;
    if(na&&nb){
      const sa=stOrder[a.st]??5, sb=stOrder[b.st]??5;
      if(sa!==sb) return sa-sb;
      return (a.li||'').localeCompare(b.li||'');
    }
    return (b.li||'').localeCompare(a.li||'');
  });
  return list;
}

// ===== 카드 =====
function statusDays(h){
  const dd=daysSince(h.li);
  const ncare=isNcare(h);
  const label=ncare?t('lastInsp'):t('lastVisit');
  const noLabel=ncare?t('noInsp'):t('noVisit');
  if(h.li&&dd!=null) return label+' '+h.li+' · '+t('dayAgo').replace('{d}',dd);
  return noLabel;
}
function cardHTML(h){
  const ncareTag=isNcare(h)?'<span class="h-tag ncare">N-CARE '+escapeHtml(h.nc)+'</span>':'<span class="h-tag ncare none">미가입</span>';
  const asTag=h.as?'<span class="h-tag as">'+escapeHtml(h.as)+'</span>':'';
  const salesTag=h.sa?'<span class="h-tag sales">'+escapeHtml(h.sa)+'</span>':'';
  const distHtml=(h._dist!=null)?'<div class="h-dist show">📍 '+h._dist.toFixed(1)+'km</div>':'';
  const naverUrl='https://m.map.naver.com/search2/search.naver?query='+encodeURIComponent(h.n);
  const inspUrl='inspection.html?h='+encodeURIComponent(h.n)+'&sn='+encodeURIComponent(h.s||'')+'&nc='+encodeURIComponent(h.nc||'')+'&e='+encodeURIComponent(h.sa||'');
  const survUrl='survey.html?h='+encodeURIComponent(h.n)+'&e='+encodeURIComponent(h.sa||'');
  const badge=isNcare(h)?'<span class="st-badge '+(h.st||'미점검')+'">'+escapeHtml(h.st||'미점검')+'</span>':'<span class="st-badge 비대상">'+t('notTarget')+'</span>';

  const lvl=dueLevel(h);
  let cardCls='h-card', warnTag='';
  if(lvl==='over'){ cardCls+=' urgent'; warnTag='<span class="warn-tag over">'+t('overDue')+'</span>'; }
  else if(lvl==='near'){ cardCls+=' soon'; warnTag='<span class="warn-tag near">'+t('nearDue')+'</span>'; }

  const histBtn = (HISTORY[h.n] && HISTORY[h.n].length)
    ? '<button class="hist" onclick="openHist(\''+escapeHtml(h.n).replace(/'/g,"\\'")+'\')">🕑 '+t('histBtn')+'</button>'
    : '';

  return '<div class="'+cardCls+'">'+
    '<div class="h-card-head"><div style="min-width:0;"><div class="h-name">'+escapeHtml(h.n)+'</div>'+distHtml+'</div>'+badge+'</div>'+
    '<div class="h-meta">'+
      (h.a?'<div class="line"><span class="ico">📍</span><span>'+escapeHtml(h.a)+'</span></div>':'')+
      '<div class="line"><span class="ico">🔧</span><span>'+escapeHtml(h.s||'-')+' · '+t('sales')+' '+escapeHtml(h.sa||'-')+'</span></div>'+
      '<div class="line"><span class="ico">📅</span><span>'+statusDays(h)+'</span></div>'+
    '</div>'+ (warnTag?'<div>'+warnTag+'</div>':'') +
    '<div class="h-tags">'+ncareTag+asTag+salesTag+'</div>'+
    '<div class="h-actions">'+
      '<button class="nmap" onclick="window.open(\''+naverUrl+'\',\'bazNaverMap\')">🗺️ '+t('nmap')+'</button>'+
      '<button class="insp" onclick="location.href=\''+inspUrl+'\'">📋 '+t('insp')+'</button>'+
      '<button class="surv" onclick="location.href=\''+survUrl+'\'">⭐ '+t('surv')+'</button>'+
    '</div>'+
    (histBtn?'<div class="h-actions" style="margin-top:6px;">'+histBtn+'</div>':'')+

}

function render(){
  const list=getFiltered();
  const cl=document.getElementById('cardList');
  const rc=document.getElementById('resultCount');
  if(list.length===0){
    cl.innerHTML='<div class="empty"><div class="ico">🔍</div>'+(nearbyMode?t('emptyNear'):t('empty'))+'</div>';
    rc.textContent=''; document.getElementById('loadMore').style.display='none'; return;
  }
  if(nearbyMode){ rc.innerHTML='<b>'+t('nearbyResult').replace('{n}',list.length)+'</b>'; }
  else { rc.innerHTML=t('resultN').replace('{n}','<b>'+list.length+'</b>'); }
  const shown=list.slice(0,showCount);
  cl.innerHTML=shown.map(cardHTML).join('');
  const lm=document.getElementById('loadMore');
  if(list.length>showCount){ lm.style.display='block'; lm.textContent=t('more')+' ('+showCount+'/'+list.length+')'; }
  else lm.style.display='none';
}

// ===== 카카오맵 지도 =====
function loadKakao(cb){
  if(kakaoLoaded){ cb(); return; }
  if(!KAKAO_JS_KEY || KAKAO_JS_KEY.indexOf('__')===0){ cb(false); return; }
  const s=document.createElement('script');
  s.src='https://dapi.kakao.com/v2/maps/sdk.js?appkey='+KAKAO_JS_KEY+'&autoload=false';
  s.onload=()=>{ kakao.maps.load(()=>{ kakaoLoaded=true; cb(); }); };
  s.onerror=()=>cb(false);
  document.head.appendChild(s);
}
function showMap(list){
  const box=document.getElementById('mapBox');
  loadKakao((ok)=>{
    if(ok===false){ box.style.display='none'; return; }
    box.style.display='block';
    if(!mapObj){
      mapObj=new kakao.maps.Map(box, {center:new kakao.maps.LatLng(myPos.lat,myPos.lng), level:7});
    }else{
      mapObj.setCenter(new kakao.maps.LatLng(myPos.lat,myPos.lng));
      mapObj.relayout();
    }
    mapMarkers.forEach(m=>m.setMap(null)); mapMarkers=[];
    // 내 위치 (파란 원)
    const me=new kakao.maps.Circle({center:new kakao.maps.LatLng(myPos.lat,myPos.lng),radius:120,strokeWeight:2,strokeColor:'#534AB7',strokeOpacity:.9,fillColor:'#8A5FC0',fillOpacity:.5});
    me.setMap(mapObj); mapMarkers.push(me);
    // 병원 핀
    const bounds=new kakao.maps.LatLngBounds();
    bounds.extend(new kakao.maps.LatLng(myPos.lat,myPos.lng));
    list.forEach(h=>{
      if(h.lat==null) return;
      const pos=new kakao.maps.LatLng(h.lat,h.lng);
      const mk=new kakao.maps.Marker({position:pos, title:h.n});
      mk.setMap(mapObj); mapMarkers.push(mk);
      const iw=new kakao.maps.InfoWindow({content:'<div style="padding:6px 10px;font-size:12px;font-weight:700;color:#1B2F5E;white-space:nowrap;">'+escapeHtml(h.n)+'<br><span style="font-weight:400;color:#6B7A99;">'+h._dist.toFixed(1)+'km · '+escapeHtml(h.st||'')+'</span></div>'});
      kakao.maps.event.addListener(mk,'click',()=>{ iw.open(mapObj,mk); });
      bounds.extend(pos);
    });
    if(list.length) mapObj.setBounds(bounds);
  });
}

// ===== 대시보드 =====
function renderDash(){
  const ncare=HOSPITALS.filter(isNcare);
  // 경과 버킷
  const ages={normal:0,target:0,rec:0,warn:0,none:0};
  ncare.forEach(h=>{
    if(h.st==='미점검'||!h.li){ ages.none++; return; }
    const dd=daysSince(h.li);
    if(dd==null){ ages.none++; }
    else if(dd<=30) ages.normal++;
    else if(dd<=60) ages.target++;
    else if(dd<=90) ages.rec++;
    else ages.warn++;
  });
  const maxAge=Math.max(ages.normal,ages.target,ages.rec,ages.warn,ages.none,1);
  function bar(label,val,color){
    const w=Math.round(val/maxAge*100);
    return '<div class="bar-row"><div class="bar-label">'+label+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(val?Math.max(w,8):0)+'%;background:'+color+'">'+(val||'')+'</div></div></div>';
  }
  // 상태 분포 (도넛 대신 범례+막대)
  const stCount={};
  ncare.forEach(h=>{ const s=h.st||'미점검'; stCount[s]=(stCount[s]||0)+1; });
  const stColors={'정상':'#1E7E4E','점검대상':'#2E7D9E','권고':'#B8860B','경고':'#C0392B','미점검':'#6B7A99'};
  const stTotal=ncare.length;
  let donut='';
  let acc=0; const segs=[];
  ['정상','점검대상','권고','경고','미점검'].forEach(s=>{
    const v=stCount[s]||0; if(!v) return;
    const pct=v/stTotal*100;
    segs.push(stColors[s]+' '+acc+'% '+(acc+pct)+'%'); acc+=pct;
  });
  const donutBg='conic-gradient('+segs.join(',')+')';
  let legend='';
  ['정상','점검대상','권고','경고','미점검'].forEach(s=>{
    const v=stCount[s]||0; if(!v) return;
    legend+='<div class="legend-item"><span class="legend-dot" style="background:'+stColors[s]+'"></span>'+s+'<span class="legend-val">'+v+'</span></div>';
  });
  // 영업담당별 N-CARE
  const salesCount={};
  ncare.forEach(h=>{ if(h.sa&&h.sa!=='장비OUT') salesCount[h.sa]=(salesCount[h.sa]||0)+1; });
  const salesSorted=Object.keys(salesCount).sort((a,b)=>salesCount[b]-salesCount[a]);
  const maxSales=Math.max(...Object.values(salesCount),1);
  let salesBars='';
  salesSorted.forEach(s=>{
    const v=salesCount[s]; const w=Math.round(v/maxSales*100);
    salesBars+='<div class="bar-row"><div class="bar-label">'+escapeHtml(s)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.max(w,8)+'%;background:#534AB7">'+v+'</div></div></div>';
  });

  document.getElementById('viewDash').innerHTML=
    '<div class="stats" style="margin-bottom:14px;">'+
      '<div class="s"><div class="num" style="color:var(--teal)">'+ncare.length+'</div><div class="lbl">N-CARE</div></div>'+
      '<div class="s"><div class="num" style="color:var(--amber)">'+(ages.target+ages.rec+ages.warn+ages.none)+'</div><div class="lbl">'+t('stDue')+'</div></div>'+
      '<div class="s"><div class="num" style="color:var(--red)">'+(ages.warn+ages.none)+'</div><div class="lbl">'+t('overDue').replace('⚠ ','').replace('⚠','')+'</div></div>'+
    '</div>'+
    '<div class="dash-card"><div class="dash-title">'+t('dashInspTitle')+'</div>'+
      bar(t('bNormal'),ages.normal,'#1E7E4E')+
      bar(t('bTarget'),ages.target,'#2E7D9E')+
      bar(t('bRec'),ages.rec,'#B8860B')+
      bar(t('bWarn'),ages.warn,'#C0392B')+
      bar(t('bNone'),ages.none,'#6B7A99')+
    '</div>'+
    '<div class="dash-card"><div class="dash-title">'+t('dashStatusTitle')+'</div>'+
      '<div class="donut-wrap"><div style="width:120px;height:120px;border-radius:50%;background:'+donutBg+';flex:0 0 auto;position:relative;"><div style="position:absolute;inset:26px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:var(--navy);">'+stTotal+'</div></div>'+
      '<div class="legend">'+legend+'</div></div>'+
    '</div>'+
    '<div class="dash-card"><div class="dash-title">'+t('dashSalesTitle')+'</div>'+salesBars+'</div>'+
    renderVocAnalysis();

  // 추이 월/주 토글 바인딩
  const tgRow = document.querySelector('#viewDash');
  if(tgRow){
    tgRow.querySelectorAll('.trend-tg').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const mode=btn.getAttribute('data-mode');
        tgRow.querySelectorAll('.trend-tg').forEach(b=>{
          const on=b===btn;
          b.style.background=on?'#1B2F5E':'transparent';
          b.style.color=on?'#fff':'var(--text-muted)';
          b.classList.toggle('on',on);
        });
        const bars=document.getElementById('trendBars');
        if(bars && window._vocRenderTrend){
          bars.innerHTML=window._vocRenderTrend(mode);
          bars.style.gap = (mode==='week')?'1px':'2px';
        }
      });
    });
  }
}

  if(!A) return '';

  let html = '<div style="margin:22px 0 12px;padding-top:18px;border-top:2px solid var(--gray-line);">'+
    '<div style="font-size:15px;font-weight:800;color:var(--navy);">🔧 '+t('vocTitle')+'</div>'+
    '<div style="font-size:11px;color:var(--text-muted);margin-top:3px;">'+t('vocNote')+' · '+escapeHtml(A.period)+'</div></div>';

  // 요약: 총 접수 / 최다 현상 / 부위 수
  const topSym = A.symptoms[0] || ['',0];
  html += '<div class="stats" style="margin-bottom:12px;">'+
    '<div class="s"><div class="num" style="color:var(--navy)">'+A.total+'</div><div class="lbl">'+t('vocTotal')+'</div></div>'+
    '<div class="s"><div class="num" style="color:var(--red)">'+topSym[1]+'</div><div class="lbl">'+escapeHtml(topSym[0])+'</div></div>'+
    '<div class="s"><div class="num" style="color:var(--teal)">'+A.monthly.length+'</div><div class="lbl">'+t('vocMonth')+'</div></div>'+
    '</div>';

  // 월별/주차별 추이 (토글)
  function renderTrend(mode){
    const series = (mode==='week') ? A.weekly : A.monthly;
    const maxV = Math.max(...series.map(x=>x[1]),1);
    let bars='';
    series.forEach(([key,val])=>{
      const h=Math.round(val/maxV*100);
      let label;
      if(mode==='week'){
        const md=key.slice(5).replace('-','/');
        label=md;
      }else{
        label=key.slice(2).replace('-','.');
      }
      const isPeak=val===maxV;
      bars += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;min-width:0;">'+
        '<div style="font-size:8px;color:'+(isPeak?'var(--red)':'var(--text-muted)')+';font-weight:'+(isPeak?'700':'400')+';">'+val+'</div>'+
        '<div style="width:100%;height:'+h+'%;background:'+(isPeak?'#C0392B':'linear-gradient(180deg,#2E7D9E,#1B2F5E)')+';border-radius:2px 2px 0 0;min-height:3px;"></div>'+
        '<div style="font-size:7px;color:var(--text-muted);transform:rotate(-50deg);white-space:nowrap;margin-top:3px;transform-origin:center;">'+label+'</div>'+
      '</div>';
    });
    return bars;
  }
  const trendTitle = t('vocTrend');
  let trend = '<div class="dash-card">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'+
      '<div class="dash-title" style="margin:0;">'+trendTitle+'</div>'+
      '<div style="display:flex;gap:2px;background:var(--gray-bg);border-radius:7px;padding:2px;">'+
        '<button class="trend-tg on" data-mode="month" style="border:none;background:#1B2F5E;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:5px;cursor:pointer;font-family:inherit;">'+t('vocByMonth')+'</button>'+
        '<button class="trend-tg" data-mode="week" style="border:none;background:transparent;color:var(--text-muted);font-size:11px;font-weight:700;padding:4px 10px;border-radius:5px;cursor:pointer;font-family:inherit;">'+t('vocByWeek')+'</button>'+
      '</div>'+
    '</div>'+
    '<div id="trendBars" style="display:flex;align-items:flex-end;gap:2px;height:130px;padding-top:8px;overflow-x:auto;">'+renderTrend('month')+'</div>'+
  '</div>';
  html += trend;
  // 토글은 렌더 후 바인딩 (setTimeout으로 DOM 준비 후)
  window._vocRenderTrend = renderTrend;

  // 부위별 고장 현상 드릴다운 (핵심)
  const partColors={'핸드피스':'#C0392B','장비':'#6B7A99','노즐':'#BA7517'};
  let drill = '<div class="dash-card"><div class="dash-title">'+t('vocParts')+'</div>';
  const partOrder = Object.keys(A.parts_drill).sort((a,b)=>A.parts_drill[b].total-A.parts_drill[a].total);
  partOrder.forEach(part=>{
    const pd=A.parts_drill[part];
    const col=partColors[part]||'#2E7D9E';
    drill += '<div style="margin-bottom:14px;">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">'+
        '<span style="font-size:13px;font-weight:700;color:'+col+';">'+escapeHtml(part)+'</span>'+
        '<span style="font-size:12px;font-weight:700;color:var(--text-muted);">'+pd.total+t('vocCases')+'</span>'+
      '</div>';
    const maxSym=Math.max(...pd.syms.map(x=>x[1]),1);
    pd.syms.forEach(([sym,c])=>{
      const w=Math.round(c/maxSym*100);
      drill += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">'+
        '<span style="font-size:11px;color:var(--text);width:96px;flex:0 0 auto;">'+escapeHtml(sym)+'</span>'+
        '<div style="flex:1;height:16px;background:var(--gray-bg);border-radius:5px;overflow:hidden;"><div style="height:100%;width:'+Math.max(w,6)+'%;background:'+col+';opacity:.85;border-radius:5px;"></div></div>'+
        '<span style="font-size:11px;font-weight:700;color:var(--navy);width:30px;text-align:right;flex:0 0 auto;">'+c+'</span>'+
      '</div>';
    });
    drill += '</div>';
  });
  drill += '</div>';
  html += drill;

  // 현장 확인 내용 (중분류) - 고객 접수현상과 별개로 현장 엔지니어가 실제 확인한 문제
  if(A.fieldCheck && A.fieldCheck.length){
    const maxFc=Math.max(...A.fieldCheck.map(x=>x[1]),1);
    let fc='<div class="dash-card"><div class="dash-title">'+t('vocFieldCheck')+'</div>';
    A.fieldCheck.forEach(([name,val])=>{
      const w=Math.round(val/maxFc*100);
      const isNoIssue = (name==='이상없음');
      const col = isNoIssue ? '#9AA3B2' : (val===maxFc?'#C0392B':'#2E7D9E');
      const labelStyle = isNoIssue ? 'width:104px;font-size:11px;color:#9AA3B2;' : 'width:104px;font-size:11px;';
      fc += '<div class="bar-row"><div class="bar-label" style="'+labelStyle+'">'+escapeHtml(name)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.max(w,8)+'%;background:'+col+'">'+val+'</div></div></div>';
    });
    fc+='</div>';
    html += fc;
  }

  // 주요 교환품
  if(A.partsUsed && A.partsUsed.length){
    const maxPu=Math.max(...A.partsUsed.map(x=>x[1]),1);
    let pu='<div class="dash-card"><div class="dash-title">'+t('vocParts2')+'</div>';
    A.partsUsed.forEach(([name,val],i)=>{
      const w=Math.round(val/maxPu*100);
      pu += '<div class="bar-row"><div class="bar-label" style="width:120px;font-size:11px;">'+escapeHtml(name)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.max(w,8)+'%;background:#534AB7">'+val+'</div></div></div>';
    });
    pu+='</div>';
    html += pu;
  }

  // 처리자별
  const maxF=Math.max(...A.fse.map(x=>x[1]),1);
  let fseBar='<div class="dash-card"><div class="dash-title">'+t('vocFse')+'</div>';
  A.fse.forEach(([name,val])=>{
    const w=Math.round(val/maxF*100);
    fseBar+='<div class="bar-row"><div class="bar-label">'+escapeHtml(name)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.max(w,8)+'%;background:#888780">'+val+'</div></div></div>';
  });
  fseBar+='</div>';
  html += fseBar;

  return html;
}

// ===== 점검 이력 모달 =====
function openHist(name){
  const recs = HISTORY[name] || [];
  document.getElementById('histName').textContent = name;
  document.getElementById('histSub').textContent = t('histCount').replace('{n}', recs.length);
  const body = document.getElementById('histBody');
  if(!recs.length){
    body.innerHTML = '<div class="tl-empty">'+t('histEmpty')+'</div>';
  }else{
    body.innerHTML = recs.map(r=>{
      const isInsp = (r.t==='점검');
      const typeLabel = isInsp ? '점검' : 'A/S';
      const typeCls = isInsp ? '점검' : 'AS';
      // 부위 · 접수현상
      const symLine = (r.pt||r.sy) ? '<div class="tl-cat">'+escapeHtml([r.pt,r.sy].filter(Boolean).join(' · '))+'</div>' : '';
      // 상세 접수 내용
      const memo = r.m ? '<div class="tl-memo">'+escapeHtml(r.m)+'</div>' : '';
      // 처리 내용
      const fix = r.fx ? '<div class="tl-memo" style="background:#EAF4F8;">↳ '+escapeHtml(r.fx)+'</div>' : '';
      // 교환부품 + 유무상
      let partLine='';
      if(r.p){ partLine='<div class="tl-part">🔧 '+t('histPart')+': '+escapeHtml(r.p)+'</div>'; }
      // 담당자 + 유무상
      const meta=[];
      if(r.f) meta.push(t('histFse')+' '+escapeHtml(r.f));
      if(r.pay) meta.push(escapeHtml(r.pay));
      const metaLine = meta.length ? '<div class="tl-meta">'+meta.join(' · ')+'</div>' : '';
      return '<div class="tl-item '+(isInsp?'':'as')+'">'+
        '<div class="tl-date">'+escapeHtml(r.d)+'<span class="tl-type '+typeCls+'">'+typeLabel+'</span></div>'+
        metaLine + symLine + memo + fix + partLine +
      '</div>';
    }).join('');
  }
  document.getElementById('histModal').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeHist(){
  document.getElementById('histModal').classList.remove('show');
  document.body.style.overflow='';
}
document.getElementById('histClose').addEventListener('click', closeHist);
document.getElementById('histModal').addEventListener('click', e=>{
  if(e.target.id==='histModal') closeHist();
});

// ===== 초기화 =====
populateFilters();
updateStats();
applyLang();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{ reg.update(); }).catch(()=>{});
  });
}
</script>
