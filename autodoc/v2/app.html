<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AutoDoc</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563EB">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/app.css">
  <script src="../../auth.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { auth } from './js/infra/auth.js';
    import { router } from './js/infra/router.js';
    import { bus } from './js/infra/bus.js';
    import { catalogScreen } from './js/ui/screens/catalog.js';
    import { editorScreen } from './js/ui/screens/editor.js';
    import { docsScreen } from './js/ui/screens/docs.js';
    import { adminScreen } from './js/ui/screens/admin.js';
    import { importWizardScreen } from './js/ui/screens/import-wizard.js';
    import { approvalsScreen } from './js/ui/screens/approvals.js';
    import { learningStatusScreen } from './js/ui/screens/learning-status.js';

    const root = document.getElementById('root');
    root.innerHTML = `
      <div class="app-frame">
        <header class="topbar"><div class="brand">⌂ AutoDoc</div><div class="spacer"></div>
          <a class="btn" href="index.html">홈</a></header>
        <div class="app-body">
          <nav class="sidenav" aria-label="주요 메뉴">
            <a class="cta" href="#/catalog"><span>＋ 문서 만들기</span></a>
            <a href="#/docs"><span>🗂 내 문서</span></a>
            <a href="#/settings"><span>⚙ 설정</span></a>
            <a href="#/admin"><span>관리</span></a>
          </nav>
          <main class="content" id="outlet"></main>
        </div>
        <footer class="statusbar"><span id="save-state">준비됨</span></footer>
      </div>`;

    // Draft 저장 상태를 상태바에 반영
    bus.subscribe('draft.saved', () => {
      const el = document.getElementById('save-state');
      if (el) { el.textContent = '저장됨 ✓'; }
    });

    // 미구현 화면은 안내 스텁 (S3+ 구현)
    const stub = (label, note) => () => ({
      mount(outlet) { outlet.innerHTML =
        `<div class="card"><h1 style="font-size:var(--font-h1)">${label}</h1>
         <p style="color:var(--ui-text-weak)">${note || '다음 Sprint에서 구현됩니다.'}</p></div>`; },
    });

    router
      .register('catalog', { screen: () => catalogScreen(), guard: 'user', title: '문서 만들기' })
      .register('edit/:templateId', { screen: () => editorScreen(), guard: 'user', title: '작성' })
      .register('docs', { screen: () => docsScreen(), guard: 'user', title: '내 문서' })
      .register('settings', { screen: stub('설정', 'Sprint 6에서 제공됩니다.'), guard: 'user', title: '설정' })
      .register('admin', { screen: () => adminScreen(), guard: 'admin', title: '관리' })
      .register('admin/import', { screen: () => importWizardScreen(), guard: 'admin', title: 'AI 가져오기' })
      .register('admin/approvals', { screen: () => approvalsScreen(), guard: 'admin', title: '승인함' })
      .register('admin/learning', { screen: () => learningStatusScreen(), guard: 'admin', title: '학습 상태' })
      .mount(document.getElementById('outlet'), { notFound: '/catalog' });

    (async () => {
      await auth.ensure();
      if (!auth.session()) { location.href = 'index.html'; return; }
      router.start();
    })();
  </script>
</body>
</html>
