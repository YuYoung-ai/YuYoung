<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AutoDoc</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563EB">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/app.css">
  <!-- v1 전역 인증 라이브러리 (무수정 재사용) -->
  <script src="../../auth.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { auth } from './js/infra/auth.js';
    import { CONFIG } from './js/infra/config.js';
    import { api } from './js/infra/api.js';
    import { prefs } from './js/core/prefs.js';
    import { draft } from './js/core/draft.js';
    import { history } from './js/core/history.js';
    import { templateService } from './js/core/template-service.js';
    import { learning } from './js/core/learning.js';

    prefs.apply();
    const root = document.getElementById('root');
    const DIAG = new URLSearchParams(location.search).get('diag') === '1';

    function el(html) { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstChild; }
    function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function fmtTime(iso) { try { return new Date(iso).toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }); } catch { return ''; } }

    async function renderShell() {
      const s = auth.session();
      root.innerHTML = '';
      root.appendChild(el(`
        <div class="app-frame">
          <header class="topbar">
            <div class="brand">⌂ AutoDoc</div>
            <div class="spacer"></div>
            <span class="badge">${s ? (s.role === 'admin' ? '관리자' : '사용자') : ''}</span>
            <button class="btn" id="logout">로그아웃</button>
          </header>
          <div class="app-body">
            <nav class="sidenav" aria-label="주요 메뉴">
              <a class="cta" href="app.html#/catalog"><span>＋ 문서 만들기</span></a>
              <a href="app.html#/docs"><span>🗂 내 문서</span></a>
              <a href="app.html#/settings"><span>⚙ 설정</span></a>
              ${s && s.role === 'admin' ? '<a href="app.html#/admin"><span>관리</span></a>' : ''}
            </nav>
            <main class="content">
              <div class="dash-hero card">
                <div>
                  <h1 class="screen-title" style="margin-bottom:4px">무엇을 만들까요?</h1>
                  <p class="tpl-meta">양식을 고르고 빈칸만 채우면 문서가 완성됩니다.</p>
                </div>
                <a class="btn primary dash-cta" href="app.html#/catalog">＋ 문서 만들기</a>
              </div>
              <div id="admin-row"></div>
              <div id="drafts-sec"></div>
              <div id="tpl-sec"></div>
              <div id="recent-sec"></div>
              ${DIAG ? '<div class="card" id="diag" style="margin-top:16px"><b>진단 실행 중…</b></div>' : ''}
            </main>
          </div>
          <footer class="statusbar">
            <span>${CONFIG.ENGINE_VERSION}</span><span id="net"></span>
            ${DIAG ? '<button class="btn small" id="reset-cache">캐시 재설정</button>' : ''}
          </footer>
        </div>
      `));
      document.getElementById('logout').onclick = () => { auth.logout(); renderLogin(); };
      document.getElementById('net').textContent = navigator.onLine ? '온라인' : '오프라인';

      // 이어서 작성 (Draft 상위 3)
      try {
        await templateService.init();
        const drafts = (await draft.listMerged()).slice(0, 3);
        if (drafts.length) {
          const sec = document.getElementById('drafts-sec');
          sec.appendChild(el('<h2 class="cat-title">이어서 작성</h2>'));
          const wrap = el('<div class="doc-list"></div>');
          for (const d of drafts) {
            const tpl = templateService.get(d.templateId);
            const name = tpl ? tpl.name : d.templateId;
            const b = el(`<button class="doc-item card"><b>${esc(name)}</b><span class="tpl-meta"> · ${fmtTime(d.savedAt)} 저장</span><span class="btn small" style="margin-left:auto">이어서 →</span></button>`);
            b.onclick = () => { location.href = 'app.html#/edit/' + encodeURIComponent(d.templateId) + '?draft=' + encodeURIComponent(d.draftId); };
            wrap.appendChild(b);
          }
          sec.appendChild(wrap);
        }
      } catch {}

      // 양식 바로가기 (Golden 우선)
      try {
        const tpls = templateService.list().sort((a, b) => (b.golden - a.golden) || a.name.localeCompare(b.name)).slice(0, 4);
        if (tpls.length) {
          const sec = document.getElementById('tpl-sec');
          sec.appendChild(el('<h2 class="cat-title">양식 바로가기</h2>'));
          const grid = el('<div class="card-grid"></div>');
          for (const t of tpls) {
            const c = el(`<button class="tpl-card card${t.golden ? ' golden' : ''}">
              <div class="tpl-thumb" aria-hidden="true">${esc((t.category || '문서')[0])}</div>
              <div class="tpl-title">${t.golden ? '🏆 ' : ''}${esc(t.name)}</div>
              <div class="tpl-meta">${esc((t.formats || []).join('·').toUpperCase())}</div></button>`);
            c.onclick = () => { location.href = 'app.html#/edit/' + encodeURIComponent(t.id); };
            grid.appendChild(c);
          }
          sec.appendChild(grid);
        }
      } catch {}

      // 최근 생성 문서 (상위 5)
      try {
        const recent = (await history.list()).slice(0, 5);
        if (recent.length) {
          const sec = document.getElementById('recent-sec');
          sec.appendChild(el('<h2 class="cat-title">최근 생성 문서</h2>'));
          const wrap = el('<div class="doc-list"></div>');
          for (const r of recent) {
            const b = el(`<button class="doc-item card"><b>${esc(r.filename || r.name)}</b><span class="tpl-meta"> · ${esc((r.format || '').toUpperCase())} · ${fmtTime(r.at)}</span><span class="btn small" style="margin-left:auto">다시 만들기</span></button>`);
            b.onclick = async () => {
              // 생성 당시 입력값이 있으면 전용 Draft 로 복원해 편집기를 연다
              if (r.values && r.id) {
                const draftId = 'hist-' + r.id;
                await draft.saveNow(r.templateId, draftId, r.values);
                location.href = 'app.html#/edit/' + encodeURIComponent(r.templateId) + '?draft=' + encodeURIComponent(draftId);
                return;
              }
              location.href = 'app.html#/edit/' + encodeURIComponent(r.templateId);
            };
            wrap.appendChild(b);
          }
          sec.appendChild(wrap);
        }
      } catch {}

      // 관리자 행: 승인 대기
      if (s && s.role === 'admin') {
        try {
          const queue = await learning.queue();
          if (queue.length) {
            const row = el(`<div class="card dash-admin"><span>● 승인 대기 <b>${queue.length}</b>건</span><a class="btn small" href="app.html#/admin/approvals">처리 →</a></div>`);
            document.getElementById('admin-row').appendChild(row);
          }
        } catch {}
      }

      // 진단 모드 (?diag=1)
      if (DIAG) {
        const { runSelfCheck } = await import('./js/infra/selfcheck.js');
        const results = await runSelfCheck();
        const pass = results.filter(r => r.pass).length;
        const rows = results.map(r => `<tr><td>${r.pass ? '✅' : '❌'}</td><td>${esc(r.name)}</td><td class="tpl-meta">${esc(r.detail)}</td></tr>`).join('');
        let backendLine = 'ℹ 백엔드 미연결';
        try { const h = await api.health(); if (h && h.ok) backendLine = `✅ 백엔드 연결됨 — ${esc(h.service)} (apiVersion ${h.apiVersion})`; } catch {}
        document.getElementById('diag').innerHTML =
          `<b>진단: ${pass}/${results.length} 통과</b>
           <table style="width:100%;margin-top:8px;border-collapse:collapse">${rows}</table>
           <div style="margin-top:8px" class="tpl-meta">${backendLine}</div>`;
        document.getElementById('reset-cache').onclick = async () => {
          try {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(r => r.unregister()));
            const keys = await caches.keys();
            await Promise.all(keys.filter(k => k.startsWith('ad2-cache-')).map(k => caches.delete(k)));
          } catch {}
          location.reload();
        };
      }
    }

    function renderLogin() {
      root.innerHTML = '';
      root.appendChild(el(`
        <div class="login-wrap"><div class="card login-card">
          <div class="brand" style="font-size:var(--font-h1);font-weight:700">⌂ AutoDoc</div>
          <p style="color:var(--ui-text-weak)">접속 비밀번호를 입력하세요.</p>
          <input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password">
          <button class="btn primary" id="go" style="width:100%">로그인</button>
          <p id="err" style="color:var(--ui-danger);min-height:1.2em"></p>
        </div></div>
      `));
      const doLogin = async () => {
        const pw = document.getElementById('pw').value;
        const err = document.getElementById('err');
        err.textContent = '';
        try {
          const r = await auth.login(pw);
          if (r && r.ok) renderShell();
          else err.textContent = (r && r.message) || '로그인 실패 — 비밀번호를 확인하세요.';
        } catch (e) { err.textContent = '인증 서버에 연결할 수 없습니다.'; }
      };
      document.getElementById('go').onclick = doLogin;
      document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
      setTimeout(() => { const p = document.getElementById('pw'); if (p) p.focus(); }, 50);
    }

    (async () => {
      await auth.ensure();
      if (auth.session()) renderShell(); else renderLogin();
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
    })();
  </script>
</body>
</html>
