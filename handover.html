<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>현장 처리완료 · 공유 | BAZ CS</title>
<style>
:root{
  --navy:#1B2F5E; --navy-light:#2A4080; --teal:#2E7D9E; --teal-soft:#EAF4F8;
  --white:#FFFFFF; --gray-bg:#F5F7FA; --gray-line:#DDE3EE; --text:#1A1A2E;
  --text-muted:#6B7A99; --red:#C0392B; --green:#1E7E4E; --kakao:#FEE500;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--gray-bg);color:var(--text);
  font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  font-size:15px;line-height:1.5;padding-bottom:120px}
header{background:var(--navy);color:#fff;padding:16px 18px;position:sticky;top:0;z-index:10}
header h1{margin:0;font-size:17px;font-weight:700}
header p{margin:3px 0 0;font-size:12px;color:#B9C6E4}
.wrap{max-width:560px;margin:0 auto;padding:16px}
.card{background:#fff;border:1px solid var(--gray-line);border-radius:12px;padding:16px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{margin-bottom:12px}
.field.full{grid-column:1/-1}
label{display:block;font-size:12.5px;font-weight:600;color:var(--navy);margin-bottom:5px}
label .opt{color:var(--text-muted);font-weight:400}
input,select,textarea{width:100%;padding:10px 11px;border:1px solid var(--gray-line);
  border-radius:8px;font-size:14.5px;font-family:inherit;color:var(--text);background:#fff}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
textarea{resize:vertical;min-height:56px}
.hp-row{display:grid;grid-template-columns:1fr 22px 1fr;align-items:end;gap:6px}
.hp2{display:grid;grid-template-columns:2fr 1fr;gap:6px}
.ac-drop{display:none;position:absolute;left:0;right:0;top:100%;z-index:30;background:#fff;border:1px solid var(--gray-line);border-radius:10px;max-height:45vh;overflow:auto;box-shadow:0 8px 24px rgba(27,47,94,.18);margin-top:4px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.ac-drop.up{top:auto;bottom:100%;margin-top:0;margin-bottom:4px;box-shadow:0 -8px 24px rgba(27,47,94,.18)}
.ac-item{padding:12px;min-height:46px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;border-bottom:1px solid #F0F3F8;font-size:14px}
.ac-item:last-child{border-bottom:none}
.ac-item:active{background:var(--teal-soft)}
.ac-item b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-item b mark{background:#FFF3B8;color:inherit;border-radius:2px;padding:0 1px}
.ac-item span{color:var(--text-muted);font-size:11px;white-space:nowrap;flex-shrink:0}
.in-wrap{position:relative}
.in-clear{display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);width:26px;height:26px;border:none;border-radius:50%;background:#E8EDF6;color:var(--text-muted);font-size:14px;line-height:26px;text-align:center;cursor:pointer;padding:0}
.in-wrap input{padding-right:38px}
/* 최근 처리 이력 카드 */
.recent-card{display:none;background:#FFFBEF;border:1px solid #F0E2B8;border-radius:10px;padding:12px;margin-top:10px}
.recent-card h4{margin:0 0 8px;font-size:12.5px;color:#8A6D1A;display:flex;justify-content:space-between;align-items:center}
.recent-card h4 .cnt{font-weight:400;color:var(--text-muted)}
.recent-item{background:#fff;border:1px solid #EFE6C8;border-radius:8px;padding:10px;margin-bottom:8px;font-size:13px}
.recent-item:last-child{margin-bottom:0}
.recent-top{display:flex;justify-content:space-between;gap:8px;color:var(--text-muted);font-size:11.5px;margin-bottom:4px}
.recent-body{color:var(--text);line-height:1.45;word-break:break-all}
.recent-body b{color:var(--navy)}
.recent-fill{margin-top:8px;width:100%;padding:8px;border:1px solid var(--teal);background:var(--teal-soft);color:var(--teal);border-radius:8px;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer}
.recent-fill:active{filter:brightness(.95)}
/* 양식 토글 · 오늘 기록 */
.tpl-tabs{display:flex;gap:4px;background:#E8EDF6;padding:3px;border-radius:8px}
.tpl-tabs button{border:none;background:transparent;padding:5px 10px;border-radius:6px;font-size:11.5px;font-weight:700;color:var(--text-muted);font-family:inherit;cursor:pointer}
.tpl-tabs button.on{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.today-link{display:block;text-align:center;margin:4px 0 0;font-size:12.5px;color:var(--teal);font-weight:600;text-decoration:underline;background:none;border:none;font-family:inherit;cursor:pointer;width:100%;padding:8px}
.sync-badge{font-size:10.5px;color:var(--text-muted);font-weight:400}
@media (max-width:420px){ body{font-size:14.5px} .grid{gap:10px} }
.hp-arrow{text-align:center;color:var(--text-muted);font-size:18px;padding-bottom:9px}
.hint{font-size:11px;color:var(--text-muted);margin-top:4px}
.sec-title{font-size:12px;font-weight:700;color:var(--teal);letter-spacing:.5px;
  text-transform:uppercase;margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid var(--gray-line)}
/* 미리보기 (카톡 말풍선 느낌) */
.preview-card{background:var(--teal-soft);border:1px solid #CBE3EE}
.bubble{background:#fff;border-radius:4px 14px 14px 14px;padding:14px 15px;
  white-space:pre-wrap;font-size:14px;line-height:1.65;color:#111;
  border:1px solid #D6E7EF;word-break:break-word}
.preview-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.preview-head b{font-size:12px;color:var(--navy)}
/* 하단 고정 버튼 */
.actions{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-line);
  padding:12px 16px;display:flex;gap:10px;max-width:560px;margin:0 auto}
.btn{flex:1;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;
  font-family:inherit;cursor:pointer;transition:.15s}
.btn-copy{background:var(--navy);color:#fff}
.btn-copy:active{background:var(--navy-light)}
.btn-share{background:var(--kakao);color:#3A1D1D}
.btn-share:active{filter:brightness(.94)}
.btn-save{background:var(--teal);color:#fff}
.btn-save:active{filter:brightness(.92)}
.btn-save:disabled{opacity:.5}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--navy);color:#fff;padding:10px 20px;border-radius:24px;font-size:13.5px;
  opacity:0;pointer-events:none;transition:.25s;z-index:20}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <h1>현장 처리완료 · 공유</h1>
  <p>처리 내용 입력 → 카톡/Flow 양식 자동 생성</p>
</header>

<div class="wrap">
  <!-- 입력 -->
  <div class="card">
    <p class="sec-title">처리 내용 입력</p>
    <div class="grid">
      <div class="field">
        <label>담당 FSE <span class="opt">(본인)</span></label>
        <input id="fse" list="fseList" placeholder="예) 권오성" oninput="render();saveFse()">
        <datalist id="fseList"></datalist>
      </div>
      <div class="field">
        <label>처리일자</label>
        <input type="date" id="date" oninput="render()">
      </div>
      <div class="field">
        <label>구분</label>
        <select id="gubun" onchange="render()"><option>A/S</option><option>점검</option></select>
      </div>
      <div class="field full" style="position:relative">
        <label>병원명 <span class="opt">· 입력 시 자동완성</span></label>
        <div class="in-wrap">
          <input id="hosp" autocomplete="off" placeholder="병원명 검색" oninput="onHospInput()" onfocus="onHospFocus()">
          <button type="button" id="hospClear" class="in-clear" onclick="clearHosp()">✕</button>
        </div>
        <div id="hospDrop" class="ac-drop"></div>
        <div id="hospMatch" class="hint" style="color:var(--green)"></div>
        <div id="recentCard" class="recent-card">
          <h4>🕘 최근 처리 이력 <span class="cnt" id="recentCnt"></span></h4>
          <div id="recentList"></div>
        </div>
      </div>
      <div class="field">
        <label>S/N (장비)</label>
        <select id="sn" onchange="toggleCustom('sn');render()"></select>
        <input id="snCustom" style="display:none;margin-top:6px" placeholder="직접입력" oninput="render()">
      </div>
      <div class="field">
        <label>UI / HP 버전 <span class="opt">· 병원 선택 시 자동</span></label>
        <div class="hp2">
          <input id="verUI" placeholder="UI" oninput="render()">
          <input id="verHP" placeholder="HP" oninput="render()">
        </div>
      </div>
      <div class="field full">
        <label>S/N (핸드피스) <span class="opt">· 교체 시 OUT(탈거) → IN(장착)</span></label>
        <div class="hp2">
          <input id="hpOut" placeholder="OUT S/N (탈거)" oninput="render()">
          <input id="wVer" placeholder="OUT Ver" oninput="render()">
        </div>
        <div class="hp2" style="margin-top:6px">
          <input id="hpIn" placeholder="IN S/N (장착)" oninput="render()">
          <input id="uVer" placeholder="IN Ver" oninput="render()">
        </div>
        <div class="hint">교체 없으면 IN만 입력 · 없으면 비워두기</div>
      </div>
      <div class="field">
        <label>노즐 제조일자</label>
        <input id="nozzle" placeholder="예) 2025.04.21" oninput="render()">
      </div>
      <div class="field">
        <label>A/S 항목 · 대분류</label>
        <select id="cat" onchange="fillSub();render()"></select>
      </div>
      <div class="field">
        <label>A/S 항목 · 소분류</label>
        <select id="sub" onchange="toggleCustom('sub');render()"></select>
        <input id="subCustom" style="display:none;margin-top:6px" placeholder="직접입력" oninput="render()">
      </div>
      <div class="field">
        <label>교체품</label>
        <select id="part" onchange="render()"></select>
      </div>
      <div class="field">
        <label>교체비용 <span class="opt">(원)</span></label>
        <input id="cost" inputmode="numeric" placeholder="예) 1650000" oninput="render()">
      </div>
      <div class="field full">
        <label>A/S 내용 상세 <span class="opt">· 줄마다 " - " 자동</span></label>
        <textarea id="detail" placeholder="예) 약액 누수로 인한 HP A'ssy 교체(1.2.2→1.2.2)(유상)" oninput="render()"></textarea>
      </div>
      <div class="field">
        <label>A/S 결과</label>
        <select id="result" onchange="toggleCustom('result');render()">
          <option>교체</option><option>수리</option><option>정상</option>
          <option>점검</option><option value="__c">직접입력…</option>
        </select>
        <input id="resultCustom" style="display:none;margin-top:6px" placeholder="직접입력" oninput="render()">
      </div>
      <div class="field">
        <label>비고 / 특이사항 <span class="opt">· 없으면 N/A</span></label>
        <textarea id="remark" placeholder="예) 핸드피스 교체 비용 1,650,000원(부가세 포함) 결제 완료" oninput="render()"></textarea>
      </div>
    </div>
  </div>

  <!-- 미리보기 -->
  <div class="card preview-card">
    <div class="preview-head">
      <b>공유 미리보기 <span class="sync-badge" id="syncBadge"></span></b>
      <div class="tpl-tabs">
        <button id="tplA" class="on" onclick="setTpl('basic')">기본 양식</button>
        <button id="tplB" onclick="setTpl('sheet')">시트 요약형</button>
      </div>
    </div>
    <div class="bubble" id="preview"></div>
    <button class="today-link" onclick="showToday()">📅 오늘 내 기록 확인</button>
  </div>
</div>

<div class="actions">
  <button class="btn btn-copy" onclick="copyText()">📋 복사</button>
  <button class="btn btn-save" onclick="saveToSheet()">📥 시트 기록</button>
</div>
<div class="toast" id="toast"></div>

<script>
function val(id){return (document.getElementById(id).value||'').trim();}

/* AS 항목 분류 코드 마스터 (대분류: [코드, 소분류]) */
var AS_TAX={
  "장비":[["E01","메인보드 불량"],["E02","풋스위치 작동 불량"],["E03","출력 저하"],["E04","RFID 스캔 불량"],["E05","냉각수 누수"],["E06","UI 업그레이드"],["E07","팝업 불량"],["E08","디스플레이 터치"],["E09","디스플레이 점등"],["E10","작업불량"],["E11","케이블 불량"],["E12","이상 소음"],["E13","피팅 불량"],["E14","바퀴 파손"],["E15","구동 키 파손"],["E16","거치대 파손"],["E17","ARM 파손"],["E18","커넥터 체결 불량"],["E19","재현 안됨"],["E20","이물"],["E21","냉각수 충전"],["E22","SD카드 교체"],["E23","파워서플라이 불량"],["E24","이상없음"],["E25","장비 교육"],["E26","기타"]],
  "핸드피스":[["H01","교환 조치"],["H02","냉각 호스 파손"],["H03","노즐 누수/녹물"],["H04","볼트풀림 홀더"],["H05","홀더 파손"],["H06","노즐 체결 강함"],["H07","노즐 체결 약함"],["H08","스프링 파손"],["H09","스프링 끼임"],["H10","바디센터 간섭"],["H11","발열"],["H12","플런저 오작동"],["H13","케이블 불량"],["H14","사용 설명"],["H15","볼트풀림 바디센터"],["H16","재현 안됨"],["H17","이물"],["H18","볼트 파손"],["H19","출력 약함"],["H20","작업불량"],["H21","플런저 후퇴 불량"],["H22","기타"]],
  "노즐":[["N01","보증샷 초과"],["N02","재사용 노즐"],["N03","RFID 스캔 불량"],["N04","젯팅 불량"],["N05","노즐 막힘"],["N06","체결력 강함"],["N07","체결력 약함"],["N08","노즐 누수"],["N09","크랙"],["N10","후크 파손"],["N11","멤브레인 파손"],["N12","이물"],["N13","볼트 체결"],["N14","작업불량"],["N15","고점도 약물"],["N16","사용 설명"],["N17","기타"]],
  "기타":[["G01","사용 설명"],["G02","재현 안됨"]]
};
function initTax(){
  var cat=document.getElementById('cat');
  Object.keys(AS_TAX).forEach(function(k){var o=document.createElement('option');o.textContent=k;cat.appendChild(o);});
  fillSub();
}
function fillSub(){
  var c=val('cat'), sub=document.getElementById('sub'); sub.innerHTML='';
  (AS_TAX[c]||[]).forEach(function(p){var o=document.createElement('option');o.value=p[0];o.textContent=p[1];sub.appendChild(o);});
  var oc=document.createElement('option');oc.value='__c';oc.textContent='직접입력…';sub.appendChild(oc);
  toggleCustom('sub');
}
function subName(){
  var s=document.getElementById('sub');
  if(s.value==='__c')return val('subCustom');
  return (s.options[s.selectedIndex]||{}).textContent||'';
}
function itemCode(){var s=document.getElementById('sub');return s.value==='__c'?'':s.value;}
function itemText(){var c=val('cat'),n=subName();return n?c+' / '+n:c;}

function toggleCustom(base){
  var sel=document.getElementById(base), c=document.getElementById(base+'Custom');
  c.style.display = (sel.value==='__c') ? 'block' : 'none';
}
function pick(base){
  var sel=document.getElementById(base);
  return sel.value==='__c' ? val(base+'Custom') : sel.value;
}
function bulletLines(id){
  return val(id).split('\n').map(function(s){return s.trim();}).filter(Boolean);
}
function hpText(){
  var o=val('hpOut'), i=val('hpIn');
  if(o&&i) return o+'→'+i;
  return i||o||'';
}
function buildText(){
  var t='';
  t+='병원명 : '+val('hosp')+'\n\n';
  t+='S/N(장비) : '+snVal()+'\n';
  t+='S/N(핸드피스) : '+hpText()+'\n';
  t+='노즐 제조일자 : '+val('nozzle')+'\n';
  t+='A/S 항목 : '+itemText()+'\n';
  var d=bulletLines('detail');
  t+='A/S 내용 상세 :\n'+(d.length? d.map(function(l){return '-'+l;}).join('\n') : '-')+'\n';
  t+='A/S 결과 : '+pick('result')+'\n';
  var r=bulletLines('remark');
  t+='비고/특이사항 :'+(r.length? '\n'+r.map(function(l){return '-'+l;}).join('\n') : ' N/A');
  return t;
}
/* 양식 토글: basic=기존 카톡/Flow 양식(불변) · sheet=시트 열 구성 요약형(추가) */
var TPL='basic';
function setTpl(t){
  TPL=t;
  document.getElementById('tplA').classList.toggle('on',t==='basic');
  document.getElementById('tplB').classList.toggle('on',t==='sheet');
  render();
}
function buildTextSheet(){
  var t='📋 현장 처리 보고 ('+ (val('date')||todayISO()) +')\n';
  t+='─────────────\n';
  t+='병원명 : '+val('hosp')+'\n';
  t+='담당 FSE : '+val('fse')+'\n';
  t+='구분 : '+val('gubun')+'\n';
  t+='장비 S/N : '+snVal()+'\n';
  t+='UI/HP Ver : '+[val('verUI'),val('verHP')].filter(Boolean).join(' / ')+'\n';
  t+='대분류/유형 : '+itemText()+(itemCode()?' ('+itemCode()+')':'')+'\n';
  t+='교체품 : '+val('part')+(val('cost')?' · '+Number(val('cost')).toLocaleString()+'원':'')+'\n';
  var hp=hpText(); if(hp) t+='HP 교체 : '+hp+'\n';
  var d=bulletLines('detail');
  t+='내용 :\n'+(d.length? d.map(function(l){return ' - '+l;}).join('\n') : ' - ')+'\n';
  t+='결과 : '+pick('result')+'\n';
  var r=bulletLines('remark');
  t+='비고 : '+(r.length? r.join(' / ') : 'N/A');
  return t;
}
function curText(){ return TPL==='sheet' ? buildTextSheet() : buildText(); }

function escH(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function normH(s){ return String(s||'').toLowerCase().replace(/\s+/g,''); }
function snVal(){ return pick('sn'); }
function fillSN(toks){
  var s=document.getElementById('sn'); s.innerHTML='';
  if(!toks||!toks.length){ var o=document.createElement('option');o.value='';o.textContent='(선택)';s.appendChild(o); }
  else toks.forEach(function(t){ var o=document.createElement('option');o.value=t;o.textContent=t;s.appendChild(o); });
  var oc=document.createElement('option');oc.value='__c';oc.textContent='직접입력…';s.appendChild(oc);
  toggleCustom('sn');
}
function hlMatch(name,q){
  var i=normH(name).indexOf(q);
  if(i<0||!q) return escH(name);
  /* 공백 제거 정규화 인덱스를 원문 인덱스로 역매핑 */
  var map=[],k=0;
  for(var c=0;c<name.length;c++){ if(!/\s/.test(name[c])){ map[k++]=c; } }
  var s=map[i], e=map[Math.min(i+q.length-1,k-1)]+1;
  return escH(name.slice(0,s))+'<mark>'+escH(name.slice(s,e))+'</mark>'+escH(name.slice(e));
}
function onHospFocus(){
  onHospInput();
  /* 모바일 키보드에 가려지지 않도록 입력창을 화면 상단으로 */
  setTimeout(function(){
    try{ document.getElementById('hosp').scrollIntoView({block:'start',behavior:'smooth'}); }catch(e){}
  },250);
}
function updClear(){
  document.getElementById('hospClear').style.display = val('hosp') ? 'block' : 'none';
}
function clearHosp(){
  document.getElementById('hosp').value='';
  document.getElementById('hospDrop').style.display='none';
  document.getElementById('hospMatch').textContent='';
  document.getElementById('recentCard').style.display='none';
  fillSN([]); updClear(); render();
  document.getElementById('hosp').focus();
}
function onHospInput(){
  var q=normH(val('hosp')), drop=document.getElementById('hospDrop');
  document.getElementById('hospMatch').textContent='';
  updClear();
  if(!q){ drop.style.display='none'; render(); return; }
  var matches=HOSPITAL_DB.filter(function(h){ return normH(h.n).indexOf(q)>=0; }).slice(0,8);
  if(!matches.length){ drop.style.display='none'; render(); return; }
  drop.innerHTML=matches.map(function(h){
    var meta=[h.c,h.sa,h.r].filter(Boolean).join(' · ');
    return '<div class="ac-item" data-i="'+HOSPITAL_DB.indexOf(h)+'"><b>'+hlMatch(h.n,q)+'</b><span>'+escH(meta)+'</span></div>';
  }).join('');
  /* 화면 하단이면 위로 펼침 */
  var rect=document.getElementById('hosp').getBoundingClientRect();
  var vh=(window.visualViewport&&window.visualViewport.height)||window.innerHeight;
  drop.classList.toggle('up', rect.bottom > vh*0.55);
  drop.style.display='block'; render();
}
function pickHosp(idx){
  var h=HOSPITAL_DB[idx];
  document.getElementById('hosp').value=h.n;
  document.getElementById('hospDrop').style.display='none';
  var toks=(h.s||'').split(/[,/]/).map(function(s){return s.trim();}).filter(Boolean);
  fillSN(toks);
  document.getElementById('verUI').value=h.uiv||'';
  document.getElementById('verHP').value=h.hpv||'';
  document.getElementById('hospMatch').textContent='✓ '+[h.sa,h.c,h.r].filter(Boolean).join(' · ');
  updClear(); render();
  loadRecent(h.n);
}
document.addEventListener('click',function(e){
  var it=e.target.closest? e.target.closest('.ac-item'):null;
  if(it){ pickHosp(Number(it.getAttribute('data-i'))); return; }
  if(!e.target.closest||!e.target.closest('#hosp,#hospDrop')){ var d=document.getElementById('hospDrop'); if(d)d.style.display='none'; }
});

/* 라이브 병원정보DB (hospital.html과 동일 엔드포인트) — S/N·UI/HP 버전 최신화 */
var HOSPITAL_DB_URL='https://script.google.com/macros/s/AKfycbyczlPA1LiQtO-425-zJXsL3UGpRvlkijetDn3Oo4mffqYysjmN4VpK7z_j4lZqgN8/exec';
function loadLiveDB(){
  fetch(HOSPITAL_DB_URL,{method:'GET'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.success||!d.data||!d.data.length) return;
      var byName={}; HOSPITAL_DB.forEach(function(h){ byName[h.n]=h; });
      d.data.forEach(function(r){
        if(!r.name) return;
        var h=byName[r.name];
        if(h){ if(r.sn)h.s=r.sn; h.hpv=r.hpVer||h.hpv||''; h.uiv=r.uiVer||h.uiv||'';
               if(r.sales)h.sa=r.sales; if(r.ncare)h.c=r.ncare; if(r.region)h.r=r.region; }
        else HOSPITAL_DB.push({n:r.name,s:r.sn||'',c:r.ncare||'미가입',sa:r.sales||'',r:r.region||'',hpv:r.hpVer||'',uiv:r.uiVer||''});
      });
      console.log('[병원정보DB] 라이브 '+d.data.length+'건 병합');
    })
    .catch(function(e){ console.warn('[병원정보DB] 라이브 실패 — 임베드본 사용:',e); });
}

var HANDOVER_URL='https://script.google.com/macros/s/AKfycbwhf3fnxQPSM4cDLVEls0gtGgVGIpNOP83gMiBn-7JZmWciIsAlxyf4cYmPRiA2Ct0/exec';   /* 예) 'https://script.google.com/macros/s/XXXX/exec' */

function postUrl(){ return HANDOVER_URL || AS_URL; }

async function saveToSheet(){
  if(!postUrl()){ toast('시트 URL 미설정 (HANDOVER_URL)'); return; }
  if(!val('hosp')||!val('fse')){ toast('병원명·담당 FSE는 필수'); return; }
  var btn=document.querySelector('.btn-save'); btn.disabled=true; btn.textContent='기록 중…';
  var payload={ date:val('date'),hosp:val('hosp'),fse:val('fse'),gubun:val('gubun'),
    cat:val('cat'),type:subName(),code:itemCode(),part:val('part'),cost:val('cost'),
    detail:bulletLines('detail').join('\n'),hpIn:val('hpIn'),uVer:val('uVer'),
    hpOut:val('hpOut'),wVer:val('wVer'),sn:snVal(),verUI:val('verUI'),verHP:val('verHP') };
  try{
    /* 1차: 응답 확인 가능한 일반 요청 → 실패 시 no-cors 폴백 */
    var ok=false;
    try{
      var r=await fetch(postUrl(),{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
      var d=await r.json();
      if(d&&d.success){ toast(d.msg||'✅ 시트 기록 완료'); ok=true; }
      else if(d&&d.error){ toast('❌ '+d.error); ok=true; }
    }catch(_){}
    if(!ok){
      await fetch(postUrl(),{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
      toast('시트에 기록됐어요');
    }
  }catch(e){ toast('기록 실패 — 네트워크 확인'); }
  setTimeout(function(){btn.disabled=false;btn.textContent='📥 시트 기록';},1200);
}

/* ── 시트 연동 확장 (HANDOVER_URL 설정 시 자동 활성화) ── */
function gv(action,params){
  if(!HANDOVER_URL) return Promise.reject('HANDOVER_URL 미설정');
  var qs=Object.keys(params||{}).map(function(k){return k+'='+encodeURIComponent(params[k]);}).join('&');
  return fetch(HANDOVER_URL+'?action='+action+(qs?'&'+qs:''),{method:'GET'})
    .then(function(r){return r.json();});
}

/* 담당 FSE 기억 + 시트 담당자 목록 datalist */
function saveFse(){ try{ localStorage.setItem('baz_handover_fse', val('fse')); }catch(e){} }
function loadFse(){
  try{ var f=localStorage.getItem('baz_handover_fse'); if(f) document.getElementById('fse').value=f; }catch(e){}
}
function fillFseList(list){
  var dl=document.getElementById('fseList'); dl.innerHTML='';
  (list||[]).forEach(function(n){ var o=document.createElement('option'); o.value=n; dl.appendChild(o); });
}

/* 유형 마스터 동기화 — 시트에 있는 유형/교체품을 추가만(기존 삭제 없음) */
function masterSync(){
  gv('master',{}).then(function(d){
    if(!d.success) return;
    var added=0;
    Object.keys(d.taxonomy||{}).forEach(function(cat){
      if(!AS_TAX[cat]) AS_TAX[cat]=[];
      d.taxonomy[cat].forEach(function(p){
        if(!AS_TAX[cat].some(function(q){return q[1]===p[1];})){ AS_TAX[cat].push(p); added++; }
      });
    });
    (d.parts||[]).forEach(function(p){
      if(PARTS.indexOf(p)<0){ PARTS.push(p);
        var o=document.createElement('option');o.textContent=p;document.getElementById('part').appendChild(o);}
    });
    if(added){ /* 대분류 select 재구성 (선택값 보존) */
      var cur=val('cat'), catSel=document.getElementById('cat'); catSel.innerHTML='';
      Object.keys(AS_TAX).forEach(function(k){var o=document.createElement('option');o.textContent=k;catSel.appendChild(o);});
      catSel.value=cur||catSel.value; fillSub();
    }
    fillFseList(d.fse);
    document.getElementById('syncBadge').textContent='· 시트 동기화됨';
    console.log('[handover] 마스터 동기화:',d.source,'유형+'+added,'교체품 '+(d.parts||[]).length+'종');
  }).catch(function(e){ console.warn('[handover] 마스터 동기화 생략:',e); });
}

/* 병원 선택 → 최근 처리 이력 자동 조회 */
var RECENT_DATA=[];
function loadRecent(hosp){
  var card=document.getElementById('recentCard');
  if(!HANDOVER_URL){ card.style.display='none'; return; }
  document.getElementById('recentList').innerHTML='<div class="hint">불러오는 중…</div>';
  document.getElementById('recentCnt').textContent=''; card.style.display='block';
  gv('recent',{hosp:hosp,limit:3}).then(function(d){
    if(!d.success||!d.count){ card.style.display='none'; return; }
    RECENT_DATA=d.data;
    document.getElementById('recentCnt').textContent=d.count+'건';
    document.getElementById('recentList').innerHTML=d.data.map(function(c,i){
      var line=(c.detail||'').split('\n')[0];
      return '<div class="recent-item">'
        +'<div class="recent-top"><span>'+escH(c.date)+' · '+escH(c.fse)+'</span><span>'+escH(c.gubun)+'</span></div>'
        +'<div class="recent-body"><b>'+escH(c.cat)+' / '+escH(c.type)+'</b>'
        +(c.part&&c.part!=='없음'?' · 교체: '+escH(c.part):'')
        +(line?'<br>'+escH(line):'')+'</div>'
        +'<button type="button" class="recent-fill" onclick="applyRecent('+i+')">↩ 이 내용으로 양식 채우기</button>'
        +'</div>';
    }).join('');
  }).catch(function(){ card.style.display='none'; });
}
function applyRecent(i){
  var c=RECENT_DATA[i]; if(!c) return;
  if(c.gubun) document.getElementById('gubun').value=c.gubun;
  if(c.cat && AS_TAX[c.cat]){ document.getElementById('cat').value=c.cat; fillSub(); }
  var sub=document.getElementById('sub'), found=false;
  Array.prototype.forEach.call(sub.options,function(o){ if(o.textContent===c.type){ sub.value=o.value; found=true; } });
  if(!found&&c.type){ sub.value='__c'; toggleCustom('sub'); document.getElementById('subCustom').value=c.type; }
  if(c.part) document.getElementById('part').value = PARTS.indexOf(c.part)>=0 ? c.part : '없음';
  if(c.detail) document.getElementById('detail').value=c.detail;
  render(); toast('이전 처리 내용을 불러왔어요');
}

/* 오늘 내 기록 확인 */
function showToday(){
  if(!HANDOVER_URL){ toast('HANDOVER_URL 배포 후 사용 가능'); return; }
  toast('조회 중…');
  gv('today',{fse:val('fse')}).then(function(d){
    if(!d.success){ toast('❌ '+(d.error||'조회 실패')); return; }
    if(!d.count){ toast('오늘('+d.date+') 기록이 아직 없어요'); return; }
    alert('📅 오늘 기록 '+d.count+'건\n\n'+d.data.map(function(c){
      return '• '+c.hosp+' ['+c.gubun+'] '+c.cat+'/'+c.type+(c.part&&c.part!=='없음'?' · '+c.part:'');
    }).join('\n'));
  }).catch(function(){ toast('조회 실패 — 네트워크 확인'); });
}

initTax(); fillParts(); fillSN([]); loadLiveDB(); loadFse();
document.getElementById('date').value=todayISO();
if(HANDOVER_URL){ masterSync(); fetch(HANDOVER_URL+'?action=ping').catch(function(){}); } /* 콜드스타트 예열 */

function toast(msg){
  var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('on');
  setTimeout(function(){el.classList.remove('on');},1600);
}
function copyText(){
  var t=curText();
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(function(){toast('복사됐어요');},fallbackCopy.bind(null,t));
  } else { fallbackCopy(t); }
}
function fallbackCopy(t){
  var ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{document.execCommand('copy');toast('복사됐어요');}catch(e){toast('복사 실패 — 길게 눌러 복사하세요');}
  document.body.removeChild(ta);
}
async function shareText(){
  var t=curText();
  if(navigator.share){
    try{ await navigator.share({text:t}); return; }
    catch(e){ if(e&&e.name==='AbortError') return; }
  }
  copyText(); toast('복사됨 — 카톡에 붙여넣으세요');
}
render();
</script>
