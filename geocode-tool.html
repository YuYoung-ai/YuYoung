<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAZ 좌표 변환 도구 (JS SDK · 1회용)</title>
<style>
  :root{--navy:#1B2F5E;--teal:#2E7D9E;--gray-bg:#F5F7FA;--gray-line:#DDE3EE;--green:#1E7E4E;--red:#C0392B;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:var(--gray-bg);color:#1A1A2E;padding:20px;max-width:720px;margin:0 auto;}
  h1{font-size:18px;color:var(--navy);margin-bottom:4px;}
  .sub{font-size:13px;color:#6B7A99;margin-bottom:18px;line-height:1.6;}
  .card{background:#fff;border:1px solid var(--gray-line);border-radius:12px;padding:18px;margin-bottom:14px;}
  label{display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:7px;}
  input{width:100%;border:1.5px solid var(--gray-line);border-radius:8px;padding:11px 13px;font-size:15px;font-family:inherit;outline:none;}
  input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(46,125,158,.12);}
  .hint{font-size:11px;color:#9AB0C8;margin-top:6px;line-height:1.5;}
  button{width:100%;padding:14px;border:none;border-radius:10px;background:var(--navy);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  button.dl{background:linear-gradient(135deg,var(--teal),var(--navy));margin-top:10px;}
  .progress-wrap{height:10px;background:var(--gray-line);border-radius:6px;overflow:hidden;margin:14px 0 8px;}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--teal),#5BB8D8);transition:width .2s;}
  .stat{display:flex;gap:10px;margin-bottom:10px;}
  .stat div{flex:1;background:var(--gray-bg);border-radius:8px;padding:10px;text-align:center;}
  .stat .num{font-size:22px;font-weight:800;}
  .stat .lbl{font-size:11px;color:#6B7A99;margin-top:2px;}
  .num.ok{color:var(--green);} .num.fail{color:var(--red);} .num.tot{color:var(--navy);}
  .log{max-height:240px;overflow-y:auto;font-size:12px;line-height:1.7;background:#fff;border:1px solid var(--gray-line);border-radius:8px;padding:10px 12px;margin-top:8px;}
  .log .f{color:var(--red);}
  .fail-list{font-size:12px;line-height:1.7;color:var(--red);background:#FBEAE8;border-radius:8px;padding:10px 12px;margin-top:8px;display:none;}
  .done-msg{background:#E8F5EE;color:var(--green);border-radius:8px;padding:12px;font-size:13px;font-weight:700;text-align:center;margin-top:10px;display:none;}
  .warn{background:#E8F5EE;border:1px solid #A8DAB5;border-radius:8px;padding:11px 13px;font-size:12px;color:#137333;line-height:1.6;margin-bottom:14px;}
  #sdkStatus{font-size:12px;margin-top:8px;font-weight:700;}
</style>
</head>
<body>
<h1>BAZ 병원 좌표 변환 도구 <span style="font-size:12px;color:#6B7A99;font-weight:400;">JS SDK 방식</span></h1>
<p class="sub">388개 병원 주소를 카카오 지도 JavaScript SDK로 위경도 변환 → 완료되면 JSON 자동 다운로드.<br>이 파일은 1회용입니다. 변환 후 다운로드된 JSON을 다시 전달해 주세요.</p>

<div class="warn">✓ 이 도구는 <b>JavaScript 키</b>를 사용합니다. JS SDK 도메인에 현재 도메인이 등록되어 있어야 작동합니다 (이미 등록 완료).</div>

<div class="card">
  <label>카카오 JavaScript 키</label>
  <input type="text" id="jsKey" placeholder="44dadb... (JavaScript 키 붙여넣기)" autocomplete="off">

  <button id="loadBtn">SDK 불러오기</button>
  <div id="sdkStatus"></div>
</div>

<div class="card" id="runCard" style="display:none;">
  <button id="startBtn">변환 시작</button>
</div>

<div class="card" id="progressCard" style="display:none;">
  <div class="stat">

    <div><div class="num ok" id="nOk">0</div><div class="lbl">성공</div></div>
    <div><div class="num fail" id="nFail">0</div><div class="lbl">실패</div></div>

  <div class="progress-wrap"><div class="progress-fill" id="pfill"></div></div>
  <div class="hint" id="curMsg">대기 중...</div>
  <button class="dl" id="dlBtn" style="display:none;">결과 JSON 다운로드</button>
  <div class="done-msg" id="doneMsg"></div>
  <div class="fail-list" id="failList"></div>
  <div class="log" id="log" style="display:none;"></div>
</div>

  if(!key){alert('JavaScript 키를 입력하세요.');return;}
  $('loadBtn').disabled=true;
  $('sdkStatus').textContent='SDK 불러오는 중...';
  $('sdkStatus').style.color='#6B7A99';
  const s=document.createElement('script');
  s.src='https://dapi.kakao.com/v2/maps/sdk.js?appkey='+key+'&libraries=services&autoload=false';
  s.onload=()=>{
    kakao.maps.load(()=>{
      try{
        geocoder=new kakao.maps.services.Geocoder();
        places=new kakao.maps.services.Places();
        $('sdkStatus').textContent='✓ SDK 로드 완료. 변환을 시작하세요.';
        $('sdkStatus').style.color='#1E7E4E';
        $('runCard').style.display='block';
      }catch(e){
        $('sdkStatus').textContent='✗ services 라이브러리 로드 실패: '+e.message;
        $('sdkStatus').style.color='#C0392B';
        $('loadBtn').disabled=false;
      }
    });
  };
  s.onerror=()=>{
    $('sdkStatus').textContent='✗ SDK 로드 실패 — 키 또는 도메인 등록을 확인하세요.';
    $('sdkStatus').style.color='#C0392B';
    $('loadBtn').disabled=false;
  };
  document.head.appendChild(s);
});

function addrSearch(addr){
  return new Promise(resolve=>{
    geocoder.addressSearch(addr, (result, status)=>{
      if(status===kakao.maps.services.Status.OK && result.length){
        resolve({lat:parseFloat(result[0].y), lng:parseFloat(result[0].x), via:'address'});
      }else resolve(null);
    });
  });
}
function keywordSearch(q){
  return new Promise(resolve=>{
    places.keywordSearch(q, (data, status)=>{
      if(status===kakao.maps.services.Status.OK && data.length){
        resolve({lat:parseFloat(data[0].y), lng:parseFloat(data[0].x), via:'keyword'});
      }else resolve(null);
    });
  });
}
function simplifyAddr(addr){
  let a=addr.replace(/\s+/g,' ').trim();
  a=a.replace(/\s*(지하)?\d+층.*$/,'').replace(/\s*\d+호.*$/,'');
  return a.trim();
}

$('startBtn').addEventListener('click', async ()=>{
  $('startBtn').disabled=true;
  $('progressCard').style.display='block';
  $('log').style.display='block';
  $('nTot').textContent=HOSPITALS.length;
  results=[]; failed=[];
  const log=$('log');

  for(let i=0;i<HOSPITALS.length;i++){
    const h=HOSPITALS[i];
    $('curMsg').textContent='('+(i+1)+'/'+HOSPITALS.length+') '+h.name;
    let res=null;
    // 1차: 전체 주소
    res=await addrSearch(h.addr);
    // 2차: 간략 주소(층/호 제거)
    if(!res){
      const simp=simplifyAddr(h.addr);
      if(simp && simp!==h.addr) res=await addrSearch(simp);
    }
    // 3차: 키워드(병원명 + 주소 앞부분)
    if(!res){
      res=await keywordSearch(h.name);
    }
    // 4차: 키워드(간략 주소)
    if(!res){
      res=await keywordSearch(simplifyAddr(h.addr));
    }

    if(res){
      results.push({no:h.no, name:h.name, lat:res.lat, lng:res.lng});
      $('nOk').textContent=results.length;
    }else{
      failed.push(h);
      $('nFail').textContent=failed.length;
      log.innerHTML+='<div class="f">✗ '+h.name+' — '+h.addr+'</div>';
      log.scrollTop=log.scrollHeight;
    }
    $('pfill').style.width=((i+1)/HOSPITALS.length*100)+'%';
    await new Promise(r=>setTimeout(r,60));
  }

  $('curMsg').textContent='변환 완료!';
  $('dlBtn').style.display='block';
  const dm=$('doneMsg'); dm.style.display='block';
  dm.textContent='✓ 성공 '+results.length+' / 실패 '+failed.length+' — 아래 버튼으로 JSON을 받아 전달해 주세요.';
  if(failed.length){
    const fl=$('failList'); fl.style.display='block';
    fl.innerHTML='<b>실패 목록 (수동 확인 필요):</b><br>'+failed.map(h=>'• '+h.name+' ('+h.addr+')').join('<br>');
  }
});

$('dlBtn').addEventListener('click', ()=>{
  const out={generated:new Date().toISOString(), success:results, failed:failed.map(h=>({no:h.no,name:h.name,addr:h.addr}))};
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='hospital_coords.json'; a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
